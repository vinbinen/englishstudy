<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>句子结构挑战 - 终极恢复版</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* 完全参照 index2.html 的样式恢复 */
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f3f6fb; padding:20px; display:flex; justify-content:center; }
.app{ width:100%; max-width:850px; background:#fff; border-radius:24px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.08); position: relative; }
h1{ font-size:30px; margin-bottom:16px; color:#16345f; text-align: center; }
.card{ background:#f8fbff; border-radius:20px; padding:24px; margin-bottom:20px; position: relative; transition: all 0.3s ease; }
.list-item{ background:white; border:1px solid #d9e3f2; border-radius:16px; padding:18px; margin-bottom:14px; cursor:pointer; transition:.2s; }
.list-item:hover{ border-color:#2563eb; background:#f8fbff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37,99,235,0.08); }
.sentence-box{ background:white; border-left:5px solid #2563eb; border-radius:14px; padding:18px; line-height:2.4; font-size:20px; color:#0f2744; margin:16px 0; touch-action: none; }
.token{ display:inline-block; border-radius:8px; }
.word{ cursor:pointer; transition:.15s; padding:2px 8px; user-select: none; }
.selected{ background:#ffd966; border-bottom:3px solid #d97706; }
.correct-highlight{ background:#bbf7d0; border-bottom:3px solid #059669; }
.feedback{ margin-top:16px; min-height:28px; font-weight:700; color:#1e3b6b; }
.controls{ display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; }
button{ border:none; border-radius:999px; padding:12px 24px; background:#1f3f72; color:white; font-weight:700; cursor:pointer; transition:.2s; }
button:hover:not(:disabled){ background:#17315b; }
button:disabled { background:#94a3b8; cursor:not-allowed; }
button.secondary{ background:white; color:#1f3f72; border:2px solid #1f3f72; }
textarea{ width:100%; min-height:90px; border:1px solid #cfd9ea; border-radius:14px; padding:14px; font-size:16px; margin-top:8px; }
.detail-table{ width:100%; border-collapse:collapse; margin-top:16px; font-size:15px; background: white; border-radius: 8px; overflow: hidden;}
.detail-table th,.detail-table td{ border:1px solid #e5e7eb; padding:12px; text-align:left; }
.detail-table th{ background:#eef2ff; }
.mode-switch { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding: 12px 18px; background: #f1f5f9; border-radius: 16px; }
.overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:10; display:flex; justify-content:center; align-items:center; border-radius:24px; font-weight:bold; backdrop-filter: blur(2px); }
.audio-btn { background: #e0f2fe; color: #0284c7; border: 1px solid #7dd3fc; border-radius: 50%; width: 42px; height: 42px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
@media(max-width:640px){ .sentence-box{ font-size:18px; line-height: 2.8; } button { width: 100%; } }
</style>
</head>
<body>
<div class="app">
  <h1>📘 句子结构挑战</h1>
  <div id="user-area"></div>
  <div class="mode-switch">
    <input type="checkbox" id="modeToggle">
    <label for="modeToggle">🧠 AI 语义评分 (需在线下载模型)</label>
    <button class="secondary" style="padding: 4px 10px; font-size: 11px; width: auto;" onclick="clearAICache()">清理缓存</button>
  </div>
  <div id="mainView"><div style="text-align:center; padding:40px;">⏳ 正在连接服务器...</div></div>
</div>

<script type="module">
// ================= 配置区 =================
const SB_URL = 'https://vbxjqgbwrlxlpafdiogj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieGpxZ2J3cmx4bHBhZmRpb2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTM5MTksImV4cCI6MjA5NDU4OTkxOX0.SVlWH2Pd5dlfO9jo39t6HmZYNKvU_14zO4Hzx-NcRUw';
const supabase = supabase.createClient(SB_URL, SB_KEY);

let currentUser = null;
let aiWorker = null;
const workerCallbacks = {};
const AppState = {
  questions: [], currentIdx: -1, currentTaskIndex: 0,
  selectedTokens: [], divideResults: [], divideWrongCounts: [],
  partsUserInput: [], partsDetail: [], fullUserInput: '',
  currentTokens: [], lastClickedIdx: -1
};

// ================= 1. 初始化与用户 =================
window.onload = async () => {
  const { data: { user } } = await supabase.auth.getUser();
  currentUser = user;
  renderUserUI();
  if (user) loadQuestions(); else renderLoginPrompt();
};

function renderUserUI() {
  const area = document.getElementById('user-area');
  area.style = 'margin-bottom:20px; padding:12px; background:#eef2ff; border-radius:12px; display:flex; justify-content:space-between; align-items:center; font-size:14px;';
  area.innerHTML = currentUser 
    ? `<span>👤 ${currentUser.email}</span><button onclick="handleLogout()" style="padding:5px 10px; font-size:12px; background:#ef4444;">注销</button>`
    : `<span>🔒 进度未锁定</span><button onclick="handleAuth()" style="padding:5px 10px; font-size:12px;">登录/注册</button>`;
}

window.handleAuth = async () => {
  const email = prompt("邮箱:"), password = prompt("密码:");
  if(!email || !password) return;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    const reg = await supabase.auth.signUp({ email, password });
    if(reg.error) alert(reg.error.message); else location.reload();
  } else location.reload();
};
window.handleLogout = async () => { await supabase.auth.signOut(); location.reload(); };

function renderLoginPrompt() {
  document.getElementById('mainView').innerHTML = `<div class="card" style="text-align:center; padding:40px;"><h2>请先登录</h2><p style="margin:20px 0; color:#64748b;">登录后即可练习云端题库并同步进度。</p><button onclick="handleAuth()">立即前往</button></div>`;
}

// ================= 2. 数据加载 =================
async function loadQuestions() {
  const { data: qs } = await supabase.from('questions').select('*').order('id');
  const { data: pr } = await supabase.from('user_progress').select('*').eq('user_id', currentUser.id);
  AppState.questions = qs;
  document.getElementById('mainView').innerHTML = qs.map((q, i) => {
    const record = pr.find(p => p.question_id === q.id);
    return `<div class="list-item" onclick="startQuestion(${i})">
      <div style="font-weight:bold;">${record ? '✅' : '📝'} ${q.sentence} ${record ? `<span style="color:#10b981;">(${record.score}分)</span>` : ''}</div>
      <div style="font-size:12px; color:#64748b; margin-top:5px;">包含 ${q.tasks.length} 个结构成分</div>
    </div>`;
  }).join('');
}

// ================= 3. 核心阶段 1：划词 (含手指滑动) =================
window.startQuestion = (idx) => {
  AppState.currentIdx = idx; AppState.currentTaskIndex = 0;
  AppState.divideResults = new Array(AppState.questions[idx].tasks.length).fill(null);
  AppState.divideWrongCounts = new Array(AppState.questions[idx].tasks.length).fill(0);
  AppState.partsUserInput = new Array(AppState.questions[idx].tasks.length).fill('');
  AppState.currentTokens = tokenize(AppState.questions[idx].sentence);
  renderDivide();
};

function renderDivide() {
  const q = AppState.questions[AppState.currentIdx], task = q.tasks[AppState.currentTaskIndex];
  const remaining = Math.max(0, 3 - AppState.divideWrongCounts[AppState.currentTaskIndex]);
  const showCorrect = AppState.divideResults[AppState.currentTaskIndex] === false && remaining === 0;

  let html = `<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div class="task-title">请找出：【${task.title}】</div>
      <div class="audio-btn" onclick="playAudio('${q.sentence.replace(/'/g,"")}')">🔊</div>
    </div>
    <p style="color:#64748b; font-size:13px;">剩余尝试机会：${remaining}</p>
    <div class="sentence-box" id="sentenceContainer">`;
  
  AppState.currentTokens.forEach((tok, i) => {
    if(tok.isWord) {
      let cls = 'token word';
      if(showCorrect && task.indices.includes(i)) cls += ' correct-highlight';
      else if(AppState.selectedTokens.includes(i)) cls += ' selected';
      html += `<span class="${cls}" data-index="${i}" onclick="toggleToken(${i}, event)">${tok.text}</span>`;
    } else html += tok.text;
  });

  html += `</div>
    <div id="divideFeedback" class="feedback"></div>
    <div class="controls">
      <button onclick="submitDivide()">提交划分</button>
      <button class="secondary" onclick="AppState.selectedTokens=[]; renderDivide()">清除</button>
    </div>
  </div>`;
  document.getElementById('mainView').innerHTML = html;
  attachTouchSelect();
}

window.toggleToken = (idx, e) => {
  if (e && e.shiftKey && AppState.lastClickedIdx !== -1) {
    const start = Math.min(idx, AppState.lastClickedIdx), end = Math.max(idx, AppState.lastClickedIdx);
    for(let i=start; i<=end; i++) if(AppState.currentTokens[i].isWord && !AppState.selectedTokens.includes(i)) AppState.selectedTokens.push(i);
  } else {
    const pos = AppState.selectedTokens.indexOf(idx);
    if(pos > -1) AppState.selectedTokens.splice(pos, 1); else AppState.selectedTokens.push(idx);
  }
  AppState.lastClickedIdx = idx; renderDivide();
};

// 恢复手指滑动选词
function attachTouchSelect() {
  const container = document.getElementById('sentenceContainer');
  let isMoving = false;
  container.ontouchstart = () => { isMoving = true; };
  container.ontouchmove = (e) => {
    if(!isMoving) return;
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if(el && el.classList.contains('word')) {
      const idx = parseInt(el.dataset.index);
      if(!AppState.selectedTokens.includes(idx)) {
        AppState.selectedTokens.push(idx); el.classList.add('selected');
      }
    }
    e.preventDefault();
  };
  container.ontouchend = () => { isMoving = false; };
}

window.submitDivide = () => {
  const task = AppState.questions[AppState.currentIdx].tasks[AppState.currentTaskIndex];
  const isCorrect = JSON.stringify(AppState.selectedTokens.sort()) === JSON.stringify([...task.indices].sort());
  const fb = document.getElementById('divideFeedback');

  if(isCorrect) {
    fb.innerHTML = '<span style="color:#10b981">✅ 找对了！</span>';
    AppState.divideResults[AppState.currentTaskIndex] = true;
    setTimeout(nextStep, 1000);
  } else {
    AppState.divideWrongCounts[AppState.currentTaskIndex]++;
    if(AppState.divideWrongCounts[AppState.currentTaskIndex] >= 3) {
      fb.innerHTML = '<span style="color:#ef4444">❌ 错误。请看正确位置（绿色标出）。</span>';
      AppState.divideResults[AppState.currentTaskIndex] = false;
      renderDivide(); // 触发绿色高亮
      setTimeout(nextStep, 2500);
    } else {
      fb.innerHTML = '<span style="color:#ef4444">❌ 不太对，再试试。</span>';
      AppState.selectedTokens = []; renderDivide();
    }
  }
};

function nextStep() {
  AppState.currentTaskIndex++; AppState.selectedTokens = [];
  if(AppState.currentTaskIndex < AppState.questions[AppState.currentIdx].tasks.length) renderDivide();
  else renderParts();
}

// ================= 4. 阶段 2 & 3：翻译与评分 =================
function renderParts() {
  const q = AppState.questions[AppState.currentIdx];
  let html = `<div class="card" id="partsCard"><h2>🔤 片段翻译</h2>`;
  q.tasks.forEach((t, i) => {
    const eng = t.indices.map(idx => AppState.currentTokens[idx].text).join(' ');
    html += `<div style="margin-bottom:15px;">
      <label><b>${t.title}</b>: ${eng}</label>
      <textarea id="partInput-${i}" placeholder="输入中文...">${AppState.partsUserInput[i]}</textarea>
    </div>`;
  });
  html += `<button onclick="submitParts()">下一步</button></div>`;
  document.getElementById('mainView').innerHTML = html;
}

window.submitParts = async () => {
  const q = AppState.questions[AppState.currentIdx];
  const card = document.getElementById('partsCard');
  card.innerHTML += `<div class="overlay">⏳ AI 语义评分中...</div>`;
  
  for(let i=0; i<q.tasks.length; i++) {
    AppState.partsUserInput[i] = document.getElementById(`partInput-${i}`).value;
    const sim = await currentSimilarity(AppState.partsUserInput[i], q.tasks[i].translation);
    AppState.partsDetail[i] = sim >= 0.65;
  }
  renderFull();
};

function renderFull() {
  const q = AppState.questions[AppState.currentIdx];
  document.getElementById('mainView').innerHTML = `<div class="card" id="fullCard">
    <h2>📝 全句翻译整合</h2>
    <div class="sentence-box">${q.sentence}</div>
    <div style="margin-bottom:10px;">
      ${AppState.partsUserInput.map(text => `<span class="token" style="background:#dbeafe; padding:4px 8px; margin:2px; cursor:pointer;" onclick="document.getElementById('fullInput').value+='${text}'">${text}</span>`).join('')}
    </div>
    <textarea id="fullInput" placeholder="输入完整翻译..."></textarea>
    <button onclick="finish()">提交并查看报告</button>
  </div>`;
}

async function finish() {
  const q = AppState.questions[AppState.currentIdx];
  const input = document.getElementById('fullInput').value;
  document.getElementById('fullCard').innerHTML += `<div class="overlay">⏳ 正在同步进度...</div>`;

  const fullScore = (await currentSimilarity(input, q.full_translation)) * 100;
  const divScore = (AppState.divideResults.filter(x => x===true).length / q.tasks.length) * 100;
  const partScore = (AppState.partsDetail.filter(x => x===true).length / q.tasks.length) * 100;
  const final = Math.round(divScore * 0.4 + partScore * 0.3 + fullScore * 0.3);

  await supabase.from('user_progress').upsert({ user_id: currentUser.id, question_id: q.id, score: final }, { onConflict: 'user_id,question_id' });

  renderReport(final, input);
}

function renderReport(score, input) {
  const q = AppState.questions[AppState.currentIdx];
  let table = `<table class="detail-table"><tr><th>成分</th><th>划分</th><th>你的翻译</th><th>标准</th></tr>`;
  q.tasks.forEach((t, i) => {
    table += `<tr><td>${t.title}</td><td>${AppState.divideResults[i]?'✅':'❌'}</td><td>${AppState.partsUserInput[i]}</td><td>${t.translation}</td></tr>`;
  });
  table += `</table>`;

  document.getElementById('mainView').innerHTML = `<div class="card">
    <h1 style="font-size:48px; color:#1f3f72;">${score}分</h1>
    <div style="background:#fffbeb; padding:15px; border-radius:12px; margin:15px 0;">
      <b>💡 语法解析：</b><p style="white-space:pre-wrap; margin-top:10px;">${q.grammar || '暂无解析'}</p>
    </div>
    <p><b>标准翻译：</b>${q.full_translation}</p>
    ${table}
    <button onclick="loadQuestions()" style="margin-top:20px; width:100%;">回到列表</button>
  </div>`;
}

// ================= 5. AI 引擎与工具 (核心恢复) =================
const workerBlobCode = `
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
let embedder = null;
env.allowLocalModels = false;
const MIRROR = ['https://hf-mirror.com', 'https://huggingface.co'];
self.onmessage = async (e) => {
  if (e.data.type === 'init') {
    for (const host of MIRROR) {
      try {
        env.remoteHost = host;
        embedder = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', {
          progress_callback: (p) => { if(p.status==='progress') self.postMessage({type:'progress', p:p.progress}); }
        });
        self.postMessage({type:'done'}); return;
      } catch(err) {}
    }
    self.postMessage({type:'error'});
  }
  if (e.data.type === 'compare') {
    const [a, b] = await Promise.all([
      embedder(e.data.a, { pooling: 'mean', normalize: true }),
      embedder(e.data.b, { pooling: 'mean', normalize: true })
    ]);
    let dot = 0; for(let i=0; i<a.data.length; i++) dot += a.data[i]*b.data[i];
    self.postMessage({type:'res', val: dot});
  }
};`;

function initWorker() {
  if (aiWorker) return;
  const blob = new Blob([workerBlobCode], { type: 'text/javascript' });
  aiWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });
  aiWorker.onmessage = (e) => {
    const label = document.querySelector('label[for="modeToggle"]');
    if (e.data.type === 'progress') label.textContent = `⏳ 下载中... ${Math.floor(e.data.p)}%`;
    else if (e.data.type === 'done') { label.textContent = '🧠 AI 评分已就绪'; workerCallbacks.init?.(true); }
    else if (e.data.type === 'error') { label.textContent = '❌ 加载失败'; workerCallbacks.init?.(false); }
    else if (e.data.type === 'res') workerCallbacks.compare?.(e.data.val);
  };
}

document.getElementById('modeToggle').onchange = async (e) => {
  if (e.target.checked) {
    e.target.disabled = true; initWorker();
    aiWorker.postMessage({ type: 'init' });
    const ok = await new Promise(res => workerCallbacks.init = res);
    e.target.disabled = false;
    if (ok) currentSimilarity = aiSim; else e.target.checked = false;
  } else currentSimilarity = basicSim;
};

async function aiSim(a, b) {
  aiWorker.postMessage({ type: 'compare', a, b });
  return new Promise(res => workerCallbacks.compare = res);
}

function basicSim(a, b) {
  const s1 = a.replace(/[^\u4e00-\u9fa5]/g,""), s2 = b.replace(/[^\u4e00-\u9fa5]/g,"");
  if(!s1 || !s2) return 0;
  const m = s1.length, n = s2.length;
  const dp = Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0]=i; for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=s1[i-1]===s2[j-1]?dp[i-1][j-1]:Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1])+1;
  return 1 - dp[m][n] / Math.max(m, n);
}

let currentSimilarity = basicSim;

function tokenize(s) {
  const regex = /([A-Za-z0-9]+(?:[-'][A-Za-z0-9]+)*)|([^\w\s]+)|(\s+)/g;
  const tokens = []; let m;
  while ((m = regex.exec(s)) !== null) {
    if (m[1]) tokens.push({ text: m[1], isWord: true });
    else if (m[2]) tokens.push({ text: m[2], isWord: false });
  }
  return tokens;
}

window.playAudio = (t) => {
  const u = new SpeechSynthesisUtterance(t);
  u.lang = 'en-US'; window.speechSynthesis.speak(u);
};

window.clearAICache = async () => { if(window.caches) { await caches.delete('transformers-cache'); alert('缓存已清理'); location.reload(); } };

</script>
</body>
