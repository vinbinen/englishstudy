window.supabaseClient = supabase.createClient(SB_URL, SB_KEY);

// ==========================================
// 全局状态管理
// ==========================================
const AppState = {
  questions: [], progressData: [], currentIndex: -1, currentTaskIndex: 0,
  selectedTokens: [], divideResults: [], divideWrongCounts: [],
  partsUserInput: [], partsDetail: [], fullUserInput: '',
  currentTokens: [], lastClickedIdx: -1
};

let currentUser = null;
let aiWorker = null;
const workerCallbacks = {};

// 移动端滑动防抖与状态
let touchActive = false;
let touchLastIdx = -1;
let touchTicking = false;

// ==========================================
// 核心修复1：与管理员后台 100% 对齐的分词器
// ==========================================
// 只有使用这个分词算法，你点击的 index 才会和后台录入的一致
function tokenize(sentence) {
  const regex = /([A-Za-z0-9]+(?:[-'][A-Za-z0-9]+)*|[.,!?;:()—-])|(\s+)/g;
  const matches = sentence.match(regex) || [];
  return matches.map(text => ({
    text: text,
    isWord: /[a-zA-Z0-9]/.test(text) // 只要包含字母/数字即为可点击的词
  }));
}

// ==========================================
// 核心修复2：语音播报函数闭包与转义修复
// ==========================================
window.playCurrentAudio = function() {
  const sentence = AppState.questions[AppState.currentIndex].sentence;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel(); 
    const utterance = new SpeechSynthesisUtterance(sentence);
    utterance.lang = 'en-US'; 
    utterance.rate = 0.9;     
    window.speechSynthesis.speak(utterance);
  } else alert('⚠️ 你的浏览器不支持语音播报功能。');
};

// ==========================================
// 2. 账号体系
// ==========================================

  const { data: { user } } = await window.supabaseClient.auth.getUser();
  currentUser = user;
  renderUserUI();
  if (user) loadQuestions(); else renderLoginPrompt();
}

function renderUserUI() {
  const area = document.getElementById('user-area');
  area.style = 'margin-bottom:20px; padding:12px; background:#eef2ff; border-radius:12px; display:flex; justify-content:space-between; align-items:center; font-size:14px;';
  area.innerHTML = currentUser

    : `<span>🔒 你需要登录才能获取题库</span><button onclick="handleAuth()" style="padding:6px 14px; font-size:13px; background:#1f3f72; border-radius:999px; color:white; border:none; cursor:pointer;">登录 / 注册</button>`;
}

window.handleLogout = async () => { await window.supabaseClient.auth.signOut(); location.reload(); };

function renderLoginPrompt() {

    <div class="card" style="text-align:center; padding:50px 20px;">
      <div style="font-size:50px; margin-bottom:20px;">🔒</div>

      <p style="color:#64748b; margin-bottom:24px;">本系统采用云端同步，请登录账号解锁题库，你的每一次练习都会被永久记录。</p>
      <button onclick="window.handleAuth()">立即登录 / 免费注册</button>
    </div>`;
}

// ==========================================
// 3. 加载云端数据
// ==========================================
async function loadQuestions() {
  try {
    const [{ data: qs }, { data: pr }] = await Promise.all([
      window.supabaseClient.from('questions').select('*').order('id', { ascending: true }),
      window.supabaseClient.from('user_progress').select('question_id, score').eq('user_id', currentUser.id)
    ]);
    AppState.questions = qs || [];
    AppState.progressData = pr || [];
    renderQuestionList();
  } catch (err) {
    document.getElementById('mainView').innerHTML = `<div class="card" style="color:red;">❌ 加载失败: ${err.message}</div>`;
  }
}

function renderQuestionList() {
  if (AppState.questions.length === 0) {
    document.getElementById('mainView').innerHTML = `<div class="card" style="text-align:center;color:#64748b;">📭 云端题库为空。</div>`; return;
  }
  let html = '';
  AppState.questions.forEach((q, i) => {
    const record = AppState.progressData.find(p => p.question_id === q.id);
    html += `
      <div class="list-item" onclick="window.startQuestion(${i})">
        <div class="list-title">${record ? '✅' : '📝'} ${escapeHtml(q.sentence)} ${record ? `<span style="color:#10b981; font-weight:bold;">(${record.score}分)</span>` : ''}</div>
        <div class="list-sub">包含 ${q.tasks.length} 个成分</div>
      </div>`;
  });
  document.getElementById('mainView').innerHTML = html;
}

// ==========================================
// 4. 第一阶段：划分逻辑与滑动交互
// ==========================================
window.startQuestion = function(idx) {
  AppState.currentIndex = idx; AppState.currentTaskIndex = 0; AppState.selectedTokens = [];
  const q = AppState.questions[idx];
  AppState.divideResults = new Array(q.tasks.length).fill(null);
  AppState.divideWrongCounts = new Array(q.tasks.length).fill(0);
  AppState.partsUserInput = new Array(q.tasks.length).fill('');
  AppState.partsDetail = []; AppState.fullUserInput = '';
  AppState.currentTokens = tokenize(q.sentence); 
  AppState.lastClickedIdx = -1;
  renderDivide();
};

function renderDivide() {
  const q = AppState.questions[AppState.currentIndex], task = q.tasks[AppState.currentTaskIndex];
  const remaining = Math.max(0, 3 - AppState.divideWrongCounts[AppState.currentTaskIndex]);
  const showCorrect = AppState.divideResults[AppState.currentTaskIndex] === false && remaining === 0;

  let html = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 12px;">
        <div class="task-title" style="margin-bottom:0;">第 ${AppState.currentTaskIndex + 1} 步：圈出【${escapeHtml(task.title)}】</div>
        <button class="audio-btn" onclick="window.playCurrentAudio()">🔊</button>
      </div>
      <div style="color: #64748b;">剩余尝试：${remaining} / 3</div>
      <div class="sentence-box" id="sentenceContainer">`;

  AppState.currentTokens.forEach((tok, idx) => {
    if(tok.isWord) {
      let cls = 'token word';
      if (showCorrect && task.indices.includes(idx)) cls += ' correct-highlight';
      else if (AppState.selectedTokens.includes(idx)) cls += ' selected';
      html += `<span class="${cls}" data-index="${idx}" onclick="window.toggleToken(${idx}, event)">${escapeHtml(tok.text)}</span>`;
    } else {
      html += escapeHtml(tok.text);
    }
  });

  const disableSubmit = AppState.divideResults[AppState.currentTaskIndex] !== null;
  html += `</div>
      <div class="controls">
        <button class="secondary" onclick="window.cancelSelection()">清除选择</button>
        <button onclick="window.submitDivide()" ${disableSubmit ? 'disabled' : ''}>提交答案</button>
        <button class="secondary" onclick="window.renderQuestionList()">放弃返回</button>
      </div>
      <div id="divideFeedback" class="feedback"></div>
    </div>`;
    
  document.getElementById('mainView').innerHTML = html;
  attachTouchSelect();
}

window.renderQuestionList = renderQuestionList;

window.toggleToken = function(idx, event) {
  if (AppState.divideResults[AppState.currentTaskIndex] !== null) return;
  // 支持 Shift 连选
  if (event && event.shiftKey && AppState.lastClickedIdx !== -1) {
    const from = Math.min(AppState.lastClickedIdx, idx), to = Math.max(AppState.lastClickedIdx, idx);
    for (let i = from; i <= to; i++) {
      if (AppState.currentTokens[i]?.isWord && !AppState.selectedTokens.includes(i)) {
        AppState.selectedTokens.push(i);
      }
    }
  } else {
    const pos = AppState.selectedTokens.indexOf(idx);
    if (pos >= 0) AppState.selectedTokens.splice(pos, 1);
    else AppState.selectedTokens.push(idx);
  }
  AppState.lastClickedIdx = idx; updateTokenUI(); 
};

function updateTokenUI() {
  document.querySelectorAll('#sentenceContainer .token.word').forEach(span => {
    const idx = parseInt(span.getAttribute('data-index'), 10);
    span.classList.toggle('selected', AppState.selectedTokens.includes(idx));
  });
}

window.cancelSelection = function() { AppState.selectedTokens = []; updateTokenUI(); };

// ================= 核心修复3：安全、精准的移动端滑动 =================
function getWordIdxAtTouch(touch) {
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (!el) return -1;
  const wordEl = el.closest('.token.word');
  if (wordEl) return parseInt(wordEl.getAttribute('data-index'), 10);
  return -1;
}

function attachTouchSelect() {
  const container = document.getElementById('sentenceContainer');
  if(!container) return;

  container.addEventListener('touchstart', (e) => {
    if (AppState.divideResults[AppState.currentTaskIndex] !== null) return;
    const idx = getWordIdxAtTouch(e.touches[0]);
    if (idx !== -1) { touchActive = true; touchLastIdx = idx; }
  }, { passive: false });

  container.addEventListener('touchmove', (e) => {
    if (!touchActive || touchTicking || AppState.divideResults[AppState.currentTaskIndex] !== null) return;
    touchTicking = true;
    requestAnimationFrame(() => {
      const idx = getWordIdxAtTouch(e.touches[0]);
      if (idx !== -1 && idx !== touchLastIdx) {
        const from = Math.min(touchLastIdx, idx), to = Math.max(touchLastIdx, idx);
        for (let i = from; i <= to; i++) {
          if (AppState.currentTokens[i]?.isWord && !AppState.selectedTokens.includes(i)) AppState.selectedTokens.push(i);
        }
        updateTokenUI(); touchLastIdx = idx;
      }
      touchTicking = false; 
    });
    e.preventDefault(); 
  }, { passive: false });

  container.addEventListener('touchend', () => { touchActive = false; touchLastIdx = -1; });
}

window.submitDivide = function() {
  if (AppState.divideResults[AppState.currentTaskIndex] !== null) return;
  const task = AppState.questions[AppState.currentIndex].tasks[AppState.currentTaskIndex];
  
  // 严格比对索引
  const correct = [...task.indices].sort((a,b) => a - b);
  const user = [...AppState.selectedTokens].sort((a,b) => a - b);
  const isCorrect = JSON.stringify(correct) === JSON.stringify(user);
  
  const fb = document.getElementById('divideFeedback');

  if(isCorrect){
    AppState.divideResults[AppState.currentTaskIndex] = true;
    fb.innerHTML = '<span class="pass">✅ 划分正确！</span>';
    renderDivide(); setTimeout(()=>{ proceedNextTask(); }, 800);
  } else {
    AppState.divideWrongCounts[AppState.currentTaskIndex]++;
    const left = 3 - AppState.divideWrongCounts[AppState.currentTaskIndex];
    if(left <= 0){
      AppState.divideResults[AppState.currentTaskIndex] = false; 
      fb.innerHTML = '<span class="fail">❌ 机会用完，正确答案已用绿色标出。</span>';
      renderDivide(); setTimeout(()=>{ proceedNextTask(); }, 2500);
    } else {
      fb.innerHTML = `<span class="fail">❌ 划分不准确，还剩 ${left} 次机会。</span>`;
      AppState.selectedTokens = []; updateTokenUI();
    }
  }
};

function proceedNextTask() {
  AppState.currentTaskIndex++; AppState.selectedTokens = [];
  if(AppState.currentTaskIndex < AppState.questions[AppState.currentIndex].tasks.length) renderDivide();
  else renderParts();
}

// ==========================================
// 5. 第二/三阶段与评分
// ==========================================
function renderParts() {
  const q = AppState.questions[AppState.currentIndex], tokens = AppState.currentTokens;
  let html = `<div class="card" id="partsCard"><h2>🔤 第二阶段：翻译成分</h2><div class="sentence-box">${escapeHtml(q.sentence)}</div>`;
  q.tasks.forEach((task, idx) => {
    const englishPart = task.indices
  .map(i => tokens[i]?.text || '')
  .join(' ') // 先用空格连接
  .replace(/\s+([.,!?;:])/g, '$1') // 移除标点符号（如逗号、句号）前面的多余空格
  .trim();
    html += `
      <div style="margin-bottom:24px;">
        <label style="font-weight:700; color:#1e3b8a;">${escapeHtml(task.title)}</label>
        <div style="background:#eef2ff;padding:10px 14px;border-radius:10px;margin:8px 0; font-size:18px;">${escapeHtml(englishPart)}</div>
        <textarea id="partInput-${idx}" placeholder="输入该片段的中文翻译" oninput="AppState.partsUserInput[${idx}]=this.value">${escapeHtml(AppState.partsUserInput[idx])}</textarea>
      </div>`;
  });
  html += `<div class="controls"><button id="btnSubmitParts" onclick="window.submitParts()">提交翻译</button></div></div>`;
  document.getElementById('mainView').innerHTML = html;
}

window.submitParts = async function() {
  const q = AppState.questions[AppState.currentIndex]; 

  // 1. 【核心修复】先收集所有输入框的数据，保存到内存中
  for (let idx = 0; idx < q.tasks.length; idx++) {
    const inputEl = document.getElementById(`partInput-${idx}`);
    if (inputEl) {
      AppState.partsUserInput[idx] = inputEl.value.trim();
    }
  }

  // 2. 数据收集完毕后，再禁用按钮和显示遮罩层
  const btn = document.getElementById('btnSubmitParts');
  if (btn) btn.disabled = true;
  document.getElementById('partsCard').innerHTML += '<div class="overlay">⏳ AI 语义评分中...</div>';

  // 3. 清空旧的评分详情，开始新评分
  AppState.partsDetail = []; 
  for (let idx = 0; idx < q.tasks.length; idx++) {
    const userInput = AppState.partsUserInput[idx];
    if (!userInput) { 
      AppState.partsDetail.push(false); 
      continue; 
    }
    // 进行相似度计算
    const sim = await currentSimilarity(userInput, q.tasks[idx].translation);
    AppState.partsDetail.push(sim >= 0.65);
  }

  // 4. 进入最终阶段
  setTimeout(renderFull, 500);
};

function renderFull() {  
  const q = AppState.questions[AppState.currentIndex];  
  
  // 1. 开始构建 HTML
  let html = `<div class="card" id="fullCard">
    <h2>📝 最终阶段：整句整合</h2>
    <div class="sentence-box">${escapeHtml(q.sentence)}</div>
    <p style="font-size:13px; color:#64748b; margin-bottom:8px;">点击下方成分可直接填入：</p>
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;">`;  

  // 2. 循环生成点击词块
  AppState.partsUserInput.forEach(text => {     
    if(text && text.trim()) {    
      html += `<span class="token" 
        style="background:#dbeafe;cursor:pointer;padding:8px 16px;border-radius:99px;margin-right:8px;display:inline-block;" 
        data-text="${escapeHtml(text)}" 
        onclick="window.appendSnippet(this)">${escapeHtml(text)}</span>`;   
    }
  }); 

  // 3. 【关键：补全缺失的部分】添加输入框、按钮和收尾标签
  html += `</div>
    <textarea id="fullTranslationInput" placeholder="点击上方词块或在此输入完整翻译..." oninput="AppState.fullUserInput=this.value"></textarea>
    <div class="controls">
      <button id="btnSubmitFull" onclick="window.submitFull()">完成并生成报告</button>
    </div>
  </div>`;

  // 4. 【关键：执行渲染】将构建好的 HTML 插入到页面中
  document.getElementById('mainView').innerHTML = html;

  // 5. 恢复之前可能输入的内容（防止页面刷新丢失）
  if(AppState.fullUserInput) {
    document.getElementById('fullTranslationInput').value = AppState.fullUserInput;
  }
}

window.appendSnippet = function(el) { 
  const text = el.getAttribute('data-text'); // 从 data-text 属性获取文字内容
  const input = document.getElementById('fullTranslationInput'); // 获取上面 html 里的 textarea
  
  if (input) {
    const startPos = input.selectionStart;
    const endPos = input.selectionEnd;
    const currentVal = input.value;

    // 在光标所在位置插入文本，如果没有光标则追加到最后
    input.value = currentVal.substring(0, startPos) + text + currentVal.substring(endPos);
    
    // 更新全局变量，确保提交时数据正确
    AppState.fullUserInput = input.value; 
    
    // 重新聚焦输入框，方便用户继续编辑
    input.focus();
    const newPos = startPos + text.length;
    input.setSelectionRange(newPos, newPos);
  } else {
    console.error("找不到 ID 为 fullTranslationInput 的输入框，请检查 renderFull 是否正确执行。");
  }
};

window.submitFull = async function() {
  const q = AppState.questions[AppState.currentIndex], input = document.getElementById('fullTranslationInput').value.trim();
  if(!input){ alert('译文不能为空！'); return; }
  document.getElementById('btnSubmitFull').disabled = true;
  document.getElementById('fullCard').innerHTML += '<div class="overlay">⏳ 正在同步云端报告...</div>';

  const fullScore = Math.round((await currentSimilarity(input, q.full_translation)) * 100);
  const divideScore = Math.round((AppState.divideResults.filter(x => x === true).length / q.tasks.length) * 100);
  const partScore = Math.round((AppState.partsDetail.filter(Boolean).length / q.tasks.length) * 100);
  const finalScore = Math.round(divideScore * 0.4 + partScore * 0.3 + fullScore * 0.3);

  if(currentUser) {
    await window.supabaseClient.from('user_progress').upsert({
      user_id: currentUser.id, question_id: q.id, score: finalScore
    }, { onConflict: 'user_id, question_id' });
  }

  let tableHtml = `<table class="detail-table"><tr><th>结构成分</th><th>划分</th><th>你的翻译</th><th>参考答案</th><th>评价</th></tr>`;
  q.tasks.forEach((task,idx)=>{ 
    tableHtml += `<tr><td>${escapeHtml(task.title)}</td><td><span class="${AppState.divideResults[idx] ? 'pass' : 'fail'}">${AppState.divideResults[idx] ? '✅' : '❌'}</span></td><td>${escapeHtml(AppState.partsUserInput[idx])}</td><td>${escapeHtml(task.translation)}</td><td><span class="${AppState.partsDetail[idx] ? 'pass' : 'fail'}">${AppState.partsDetail[idx] ? '✅ 及格' : '❌ 偏差'}</span></td></tr>`; 
  });
  tableHtml += '</table>';

  document.getElementById('mainView').innerHTML = `<div class="card">
      <div class="score" style="color:#1e3b8a; font-size:40px;">综合得分：${finalScore} 分</div>
      <div style="background: white; padding: 16px; border-radius: 12px; margin-bottom: 16px; border-left: 4px solid #10b981;">
        <div style="margin-bottom:8px;"><strong style="color:#059669;">✅ 标准答案：</strong>${escapeHtml(q.full_translation)}</div>
        <div><strong style="color:#2563eb;">✍️ 你的翻译：</strong>${escapeHtml(input)}</div>
      </div>
      ${q.grammar ? `<div style="background: #fffbeb; padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid #fde68a;"><strong style="color:#92400e; display:block; margin-bottom:8px;">💡 语法解析：</strong><div style="color:#78350f; font-size:15px; white-space:pre-wrap;">${escapeHtml(q.grammar)}</div></div>` : ''}
      <div style="overflow-x:auto;">${tableHtml}</div>
      <div class="controls" style="margin-top: 24px;"><button onclick="window.renderQuestionList()">返回题库列表</button></div>
    </div>`;
};

// ==========================================
// 6. AI Semantic Worker 与算法
// ==========================================
const workerBlobCode = `
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
let embedder = null;
env.allowLocalModels = false;
const MIRROR_HOSTS = ['https://hf-mirror.com', 'https://huggingface.co'];
self.onmessage = async (e) => {
  const { type, textA, textB } = e.data;
  if (type === 'init') {
    let success = false;
    for (let i = 0; i < MIRROR_HOSTS.length; i++) {
      try {
        env.remoteHost = MIRROR_HOSTS[i];
        embedder = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', {
          progress_callback: (p) => {
            if (p.status === 'progress' && p.progress !== undefined) self.postMessage({ type: 'progress', progress: p.progress });
            else if (p.status === 'done') self.postMessage({ type: 'done' });
          }
        });
        success = true; break; 
      } catch (err) {}
    }
    if (!success) self.postMessage({ type: 'error' });
  }
  if (type === 'compare') {
    if (!embedder) { self.postMessage({ type: 'res', similarity: 0 }); return; }
    try {
      const [embA, embB] = await Promise.all([embedder(textA, { pooling: 'mean', normalize: true }), embedder(textB, { pooling: 'mean', normalize: true })]);
      let dot = 0; for (let i = 0; i < embA.data.length; i++) dot += embA.data[i] * embB.data[i];
      self.postMessage({ type: 'res', similarity: dot });
    } catch (err) { self.postMessage({ type: 'res', similarity: 0 }); }
  }
};`;

function levenshteinRatio(a, b) {
  if (!a || !b) return 0; if (a === b) return 1; if (a.length < b.length) [a, b] = [b, a]; 
  let prevRow = Array.from({ length: b.length + 1 }, (_, i) => i);
  let currRow = new Array(b.length + 1).fill(0);
  for (let i = 1; i <= a.length; i++) {
    currRow[0] = i;
    for (let j = 1; j <= b.length; j++) currRow[j] = Math.min(currRow[j - 1] + 1, prevRow[j] + 1, prevRow[j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
    [prevRow, currRow] = [currRow, prevRow]; 
  }
  return 1 - (prevRow[b.length] / Math.max(a.length, b.length)); 
}
function basicSimilarity(a, b) { return levenshteinRatio(a.replace(/[，。！？、“”‘’：；\s]/g,''), b.replace(/[，。！？、“”‘’：；\s]/g,'')); }

let currentSimilarity = basicSimilarity;

async function aiSimilarity(a, b) {
  const cleanA = a.replace(/[，。！？、“”‘’：；\s]/g,''), cleanB = b.replace(/[，。！？、“”‘’：；\s]/g,'');
  if (!aiWorker) return basicSimilarity(cleanA, cleanB);
  const seqSim = levenshteinRatio(cleanA, cleanB), avgLen = (cleanA.length + cleanB.length) / 2;
  aiWorker.postMessage({ type: 'compare', textA: a, textB: b });
  return new Promise((resolve) => {
    workerCallbacks.compare = (semanticSim) => resolve((semanticSim * (avgLen <= 5 ? 0.9 : 0.8)) + (seqSim * (1 - (avgLen <= 5 ? 0.9 : 0.8))));
  });
}

function initWorker() {
  if (aiWorker) return;
  const blob = new Blob([workerBlobCode], { type: 'text/javascript' });
  aiWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });
  aiWorker.onmessage = (e) => {
    const label = document.querySelector('label[for="modeToggle"]');
    if (e.data.type === 'progress') label.textContent = `⏳ 下载模型中... ${Math.floor(e.data.progress)}%`;
    else if (e.data.type === 'done') { label.textContent = '🧠 AI 语义评分 (已启用)'; if (workerCallbacks.init) workerCallbacks.init(true); }
    else if (e.data.type === 'error') { label.textContent = '❌ 加载失败，回退基础评分'; if (workerCallbacks.init) workerCallbacks.init(false); }
    else if (e.data.type === 'res') { if (workerCallbacks.compare) workerCallbacks.compare(e.data.similarity); }
  };
}

document.getElementById('modeToggle').addEventListener('change', async (e) => {
  if (e.target.checked) {
    e.target.disabled = true; initWorker();
    document.querySelector('label[for="modeToggle"]').textContent = '⏳ 正在连接 AI (首次需下载约125MB)...';
    aiWorker.postMessage({ type: 'init' });
    const success = await new Promise(res => workerCallbacks.init = res);
    e.target.disabled = false;
    if (!success) { e.target.checked = false; currentSimilarity = basicSimilarity; } else currentSimilarity = aiSimilarity;
  } else {
    currentSimilarity = basicSimilarity; document.querySelector('label[for="modeToggle"]').textContent = '🧠 AI 语义评分 (需在线下载模型)';
  }
});

window.clearAICache = async function() {
  try { if ('caches' in window && await caches.delete('transformers-cache')) { alert('🧼 AI 模型缓存清理成功！'); location.reload(); } } catch (err) {}
};

function escapeHtml(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// 启动入口
window.onload = checkUser;
</script>
