<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>英语句子成分闯关 - 练习端</title>
<style>
  :root { --primary: #1f3f72; --accent: #2563eb; --success: #10b981; --bg: #f3f6fb; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:#16345f; padding:20px; line-height:1.6; }
  .container { max-width:800px; margin:auto; }
  
  /* 头部卡片 */
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .card { background:white; border-radius:20px; padding:24px; margin-bottom:20px; box-shadow:0 10px 30px rgba(0,0,0,.06); }
  
  /* 题目列表样式 */
  .q-item { display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #edf2f7; cursor:pointer; transition: .2s; }
  .q-item:hover { background: #f8fbff; }
  .status-badge { font-size:12px; padding:2px 8px; border-radius:99px; background:#e2e8f0; }

  /* 练习区样式 */
  .sentence-display { background:#f8fbff; border-radius:16px; padding:25px; line-height:2.5; font-size:22px; border-left:5px solid var(--accent); margin:20px 0; }
  .token { display:inline-block; padding:0 6px; border-radius:6px; cursor:pointer; transition:.15s; user-select:none; }
  .token:hover { background:#e0ebff; }
  .token.selected { background:#ffd966; border-bottom:3px solid #d97706; }
  
  .task-prompt { font-size:18px; font-weight:bold; color:var(--primary); margin-bottom:15px; padding:10px; background:#fff7ed; border-radius:10px; }
  
  /* 按钮 */
  button { border:none; background:var(--primary); color:white; padding:12px 24px; border-radius:999px; cursor:pointer; font-size:16px; font-weight:700; transition:.2s; }
  button:hover { opacity:0.9; transform:translateY(-1px); }
  button.secondary { background:white; color:var(--primary); border:2px solid var(--primary); }
  
  /* 语法解析区 */
  .grammar-box { background:#f0fdf4; border:1px solid #bbf7d0; padding:20px; border-radius:15px; margin-top:20px; display:none; }
  .translation { color:#64748b; font-style:italic; margin-bottom:10px; }
  
  .loading { text-align:center; padding:50px; color:#94a3b8; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📝 句子成分挑战</h1>
    <div id="authStatus" class="small">加载中...</div>
  </div>

  <div id="mainView">
    <div class="loading">正在加载题库，请稍候...</div>
  </div>
</div>

<script>
// --- 配置区 ---
const SUPABASE_URL = 'https://vbxjqgbwrlxlpafdiogj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieGpxZ2J3cmx4bHBhZmRpb2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTM5MTksImV4cCI6MjA5NDU4OTkxOX0.SVlWH2Pd5dlfO9jo39t6HmZYNKvU_14zO4Hzx-NcRUw';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --- 状态管理 ---
let AppState = {
  questions: [],
  currentQIndex: -1,
  currentTaskIndex: 0,
  selectedIndices: [],
  lastClickedIdx: -1,
  score: 0
};

// --- 初始化 ---
window.onload = async () => {
  checkUser();
  await loadQuestions();
};

async function checkUser() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  const statusEl = document.getElementById('authStatus');
  if (user) {
    statusEl.innerHTML = `👤 已登录 | <a href="#" onclick="logout()">退出</a>`;
  } else {
    statusEl.innerHTML = `<button onclick="login()" style="padding:5px 12px; font-size:12px;">登录以保存成绩</button>`;
  }
}

// --- 数据加载 ---
async function loadQuestions() {
  const mainView = document.getElementById('mainView');
  try {
    const { data, error } = await supabaseClient
      .from('questions')
      .select('*')
      .order('created_at', { ascending: true });

    if (error) throw error;

    // 核心修复：适配数据库下划线字段
    AppState.questions = (data || []).map(q => ({
      ...q,
      fullTranslation: q.full_translation // 映射到前端习惯的驼峰命名
    }));

    renderQuestionList();
  } catch (err) {
    mainView.innerHTML = `<div class="card">❌ 加载失败: ${err.message}</div>`;
  }
}

// --- 渲染题目列表 ---
function renderQuestionList() {
  let html = `<div class="card"><h2>选择关卡</h2><div style="margin-top:15px;">`;
  AppState.questions.forEach((q, index) => {
    html += `
      <div class="q-item" onclick="startExercise(${index})">
        <span>第 ${index + 1} 关：${q.sentence.substring(0, 40)}...</span>
        <span class="status-badge">进入</span>
      </div>`;
  });
  html += `</div></div>`;
  document.getElementById('mainView').innerHTML = html;
}

// --- 开始练习 ---
function startExercise(index) {
  AppState.currentQIndex = index;
  AppState.currentTaskIndex = 0;
  AppState.selectedIndices = [];
  AppState.score = 0;
  renderExercise();
}

function renderExercise() {
  const q = AppState.questions[AppState.currentQIndex];
  const task = q.tasks[AppState.currentTaskIndex];
  
  // 分词逻辑 (需与生成器一致)
  const tokens = tokenize(q.sentence);
  
  let tokensHtml = '';
  tokens.forEach((tok, idx) => {
    if (tok.isWord) {
      const isSel = AppState.selectedIndices.includes(idx);
      tokensHtml += `<span class="token ${isSel?'selected':''}" onclick="toggleToken(${idx}, event)">${tok.text}</span>`;
    } else {
      tokensHtml += tok.text;
    }
  });

  const html = `
    <button class="secondary" onclick="renderQuestionList()" style="margin-bottom:15px;">← 返回列表</button>
    <div class="card">
      <div class="task-prompt">🎯 请点击选出：<strong>${task.title}</strong></div>
      <div class="sentence-display">${tokensHtml}</div>
      <div style="display:flex; gap:10px;">
        <button onclick="checkAnswer()">提交回答</button>
        <button class="secondary" onclick="clearSelection()">重选</button>
      </div>
      <div id="feedback" style="margin-top:15px; font-weight:bold;"></div>
      
      <div id="grammarSection" class="grammar-box">
        <div class="translation"><strong>整句翻译：</strong>${q.fullTranslation}</div>
        <hr style="margin:10px 0; border:0; border-top:1px solid #bbf7d0;">
        <strong>💡 语法解析：</strong><br>
        <div style="white-space:pre-wrap;">${q.grammar || '暂无详细解析'}</div>
        <button onclick="nextTaskOrFinish()" style="margin-top:15px; width:100%;">下一关</button>
      </div>
    </div>
  `;
  document.getElementById('mainView').innerHTML = html;
}

// --- 交互逻辑 ---
function tokenize(sentence) {
  const regex = /([A-Za-z0-9]+(?:[-'][A-Za-z0-9]+)*|[.,!?;:()—-])|(\s+)/g;
  const arr = [];
  let match;
  while((match = regex.exec(sentence)) !== null){
    if(match[1]) arr.push({ text:match[1], isWord:true, index:arr.length });
    else if(match[2]) arr.push({ text:match[2], isWord:false, index:arr.length });
  }
  return arr;
}

function toggleToken(idx, event) {
  const pos = AppState.selectedIndices.indexOf(idx);
  if (event.shiftKey && AppState.lastClickedIdx !== -1) {
    const from = Math.min(AppState.lastClickedIdx, idx);
    const to = Math.max(AppState.lastClickedIdx, idx);
    for (let i = from; i <= to; i++) {
      if (!AppState.selectedIndices.includes(i)) AppState.selectedIndices.push(i);
    }
  } else {
    if (pos >= 0) AppState.selectedIndices.splice(pos, 1);
    else AppState.selectedIndices.push(idx);
  }
  AppState.lastClickedIdx = idx;
  renderExercise();
}

function clearSelection() {
  AppState.selectedIndices = [];
  renderExercise();
}

// --- 核心判断逻辑 ---
async function checkAnswer() {
  const q = AppState.questions[AppState.currentQIndex];
  const task = q.tasks[AppState.currentTaskIndex];
  const feedback = document.getElementById('feedback');
  
  // 排序并转为字符串比对
  const userAns = [...AppState.selectedIndices].sort((a,b)=>a-b).join(',');
  const correctAns = [...task.indices].sort((a,b)=>a-b).join(',');

  if (userAns === correctAns) {
    feedback.innerHTML = `<span style="color:var(--success)">✅ 正确！</span>`;
    AppState.score += 10;
    document.getElementById('grammarSection').style.display = 'block';
  } else {
    feedback.innerHTML = `<span style="color:#dc2626">❌ 选错啦，请再试一次。</span>`;
  }
}

async function nextTaskOrFinish() {
  const q = AppState.questions[AppState.currentQIndex];
  if (AppState.currentTaskIndex < q.tasks.length - 1) {
    AppState.currentTaskIndex++;
    AppState.selectedIndices = [];
    renderExercise();
  } else {
    // 完成题目，尝试保存成绩
    await saveScore();
    alert(`恭喜！你已完成本题挑战。得分：${AppState.score}`);
    renderQuestionList();
  }
}

async function saveScore() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) return; // 没登录就不存

  try {
    await supabaseClient.from('user_progress').upsert({
      user_id: user.id,
      question_id: AppState.questions[AppState.currentQIndex].id,
      score: AppState.score
    });
  } catch (err) { console.error("成绩保存失败", err); }
}

// --- 基础认证函数 (示例) ---
async function login() {
  const email = prompt("请输入邮箱:");
  const password = prompt("请输入密码:");
  if(!email || !password) return;
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) alert(error.message);
  else location.reload();
}
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}
</script>
</body>
</html>
