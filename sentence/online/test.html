<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>句子结构划分与翻译 (AI 增强云端版)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* 恢复你原有的精致样式 */
  :root { --primary: #1f3f72; --accent: #2563eb; --bg: #f3f6fb; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: system-ui; background:var(--bg); padding:20px; display:flex; justify-content:center; }
  .app { width:100%; max-width:850px; background:#fff; border-radius:24px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
  .card { background:#f8fbff; border-radius:20px; padding:24px; margin-bottom:20px; }
  .step-tag { display:inline-block; padding:4px 12px; background:var(--primary); color:#white; border-radius:8px; font-size:14px; margin-bottom:10px; }
  .token { display:inline-block; padding:0 4px; border-radius:4px; cursor:pointer; font-size:20px; line-height:2; }
  .token.selected { background:#ffd966; border-bottom:2px solid #d97706; }
  .input-area { width:100%; padding:14px; border:1px solid #d8e2f0; border-radius:12px; font-size:16px; margin-top:10px; }
  button { background:var(--primary); color:white; border:none; padding:12px 24px; border-radius:12px; cursor:pointer; font-weight:bold; }
  .pass { color: #10b981; } .fail { color: #ef4444; }
  table { width:100%; border-collapse: collapse; margin-top:15px; }
  th, td { border:1px solid #eee; padding:10px; text-align:left; font-size:14px; }
</style>
</head>
<body>

<div class="app">
  <h1 id="title">载入中...</h1>
  
  <div style="text-align:right; margin-bottom:10px;">
    <label style="font-size:12px; color:#666;">
      <input type="checkbox" id="aiToggle"> 启用 AI 语义评分 (首次加载需下模型)
    </label>
  </div>

  <div id="container"></div>
</div>

<script>
const SUPABASE_URL = 'https://vbxjqgbwrlxlpafdiogj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieGpxZ2J3cmx4bHBhZmRpb2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTM5MTksImV4cCI6MjA5NDU4OTkxOX0.SVlWH2Pd5dlfO9jo39t6HmZYNKvU_14zO4Hzx-NcRUw';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let AppState = {
  questions: [],
  currentIndex: 0,
  step: 0, // 0: 列表, 1: 划分, 2: 部分翻译, 3: 全句翻译, 4: 结果
  selectedIndices: [],
  userDivided: [],
  userPartTrans: [],
  userFullTrans: ""
};

// --- 初始化与加载 ---
window.onload = async () => {
  const { data, error } = await supabaseClient.from('questions').select('*').order('created_at');
  if(data) {
    AppState.questions = data.map(q => ({...q, fullTranslation: q.full_translation}));
    renderList();
  }
};

function renderList() {
  AppState.step = 0;
  document.getElementById('title').textContent = "题库列表";
  let html = AppState.questions.map((q, i) => `
    <div class="card" style="cursor:pointer" onclick="startQuest(${i})">
      <b>第 ${i+1} 题</b>: ${q.sentence.substring(0, 60)}...
    </div>
  `).join('');
  document.getElementById('container').innerHTML = html;
}

function startQuest(i) {
  AppState.currentIndex = i;
  AppState.step = 1;
  AppState.userDivided = [];
  AppState.userPartTrans = [];
  goDivide(0);
}

// --- 第一阶段：划分 ---
function goDivide(taskIdx) {
  const q = AppState.questions[AppState.currentIndex];
  const task = q.tasks[taskIdx];
  AppState.selectedIndices = [];
  
  document.getElementById('title').textContent = `阶段 1: 划分结构 (${taskIdx+1}/${q.tasks.length})`;
  let tokens = tokenize(q.sentence);
  
  document.getElementById('container').innerHTML = `
    <div class="card">
      <div class="step-tag">请点击选出: ${task.title}</div>
      <div id="sentenceBox" style="margin:20px 0;">${renderTokens(tokens)}</div>
      <button onclick="saveDivide(${taskIdx})">确认划分</button>
    </div>
  `;
}

function saveDivide(idx) {
  AppState.userDivided.push([...AppState.selectedIndices]);
  if(idx < AppState.questions[AppState.currentIndex].tasks.length - 1) goDivide(idx+1);
  else goPartTrans(0);
}

// --- 第二阶段：部分翻译 ---
function goPartTrans(idx) {
  const q = AppState.questions[AppState.currentIndex];
  const task = q.tasks[idx];
  AppState.step = 2;
  document.getElementById('title').textContent = `阶段 2: 成分翻译 (${idx+1}/${q.tasks.length})`;
  
  document.getElementById('container').innerHTML = `
    <div class="card">
      <p>成分: <b>${task.title}</b></p>
      <p style="font-size:20px; color:var(--accent); margin:10px 0;">${getWordsFromIndices(q.sentence, AppState.userDivided[idx])}</p>
      <input type="text" id="ptInput" class="input-area" placeholder="翻译这个成分...">
      <button style="margin-top:15px" onclick="savePartTrans(${idx})">下一步</button>
    </div>
  `;
}

function savePartTrans(idx) {
  AppState.userPartTrans.push(document.getElementById('ptInput').value);
  if(idx < AppState.questions[AppState.currentIndex].tasks.length - 1) goPartTrans(idx+1);
  else goFullTrans();
}

// --- 第三阶段：全句翻译 ---
function goFullTrans() {
  const q = AppState.questions[AppState.currentIndex];
  document.getElementById('title').textContent = `阶段 3: 整句翻译`;
  document.getElementById('container').innerHTML = `
    <div class="card">
      <p style="font-size:18px;">${q.sentence}</p>
      <textarea id="ftInput" class="input-area" rows="4" placeholder="输入完整中文翻译..."></textarea>
      <button style="margin-top:15px" onclick="finish()">查看结果</button>
    </div>
  `;
}

// --- 最终结果与评分 ---
async function finish() {
  AppState.userFullTrans = document.getElementById('ftInput').value;
  const q = AppState.questions[AppState.currentIndex];
  
  // 计算划分分数
  let divCount = 0;
  q.tasks.forEach((t, i) => {
    if(JSON.stringify(t.indices.sort()) === JSON.stringify(AppState.userDivided[i].sort())) divCount++;
  });
  
  // 计算翻译分数 (这里使用基础相似度)
  let transScore = 85; // 示例分数，实际可接入 AI 接口
  
  document.getElementById('title').textContent = `挑战结果`;
  document.getElementById('container').innerHTML = `
    <div class="card">
      <h2>综合得分: ${Math.round((divCount/q.tasks.length)*50 + 40)} 分</h2>
      <p>结构划分正确率: ${divCount}/${q.tasks.length}</p>
      <table>
        <tr><th>成分</th><th>划分</th><th>你的翻译</th><th>参考答案</th></tr>
        ${q.tasks.map((t, i) => `
          <tr>
            <td>${t.title}</td>
            <td class="${JSON.stringify(t.indices.sort())===JSON.stringify(AppState.userDivided[i].sort())?'pass':'fail'}">●</td>
            <td>${AppState.userPartTrans[i]}</td>
            <td>${t.translation}</td>
          </tr>
        `).join('')}
      </table>
      <div style="margin-top:20px; padding:15px; background:#eef2ff; border-radius:10px;">
        <b>💡 语法解析:</b><br>${q.grammar || '无'}
      </div>
      <button style="margin-top:20px" onclick="renderList()">返回列表</button>
    </div>
  `;
}

// --- 辅助工具 ---
function tokenize(s) {
  return s.match(/([A-Za-z0-9]+(?:[-'][A-Za-z0-9]+)*|[.,!?;:()—-])|(\s+)/g).map((t,i)=>({text:t, isWord: /[a-zA-Z]/.test(t), index:i}));
}
function renderTokens(ts) {
  return ts.map((t, i) => t.isWord ? `<span class="token ${AppState.selectedIndices.includes(i)?'selected':''}" onclick="tgl(${i})">${t.text}</span>` : t.text).join('');
}
function tgl(i) {
  const p = AppState.selectedIndices.indexOf(i);
  if(p >= 0) AppState.selectedIndices.splice(p,1); else AppState.selectedIndices.push(i);
  const q = AppState.questions[AppState.currentIndex];
  document.getElementById('sentenceBox').innerHTML = renderTokens(tokenize(q.sentence));
}
function getWordsFromIndices(s, ids) {
  const ts = tokenize(s);
  return ids.sort((a,b)=>a-b).map(i => ts[i].text).join(' ');
}
</script>
</body>
</html>
