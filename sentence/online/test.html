<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>句子结构划分与翻译 (云端版)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* 1:1 还原你 index2.html 的所有样式 */
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f3f6fb; padding:20px; display:flex; justify-content:center; }
.app{ width:100%; max-width:850px; background:#fff; border-radius:24px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
h1{ font-size:30px; margin-bottom:16px; color:#16345f; text-align: center; }
.card{ background:#f8fbff; border-radius:20px; padding:24px; margin-bottom:20px; position: relative; transition: all 0.3s ease; }
.list-item{ background:white; border:1px solid #d9e3f2; border-radius:16px; padding:18px; margin-bottom:14px; cursor:pointer; transition:.2s; }
.list-item:hover{ border-color:#2563eb; background:#f8fbff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37,99,235,0.08); }
.list-title{ font-size:17px; line-height:1.8; color:#16345f; font-weight: 500; }
.list-sub{ margin-top:8px; color:#64748b; font-size:14px; }
.task-title{ font-size:20px; font-weight:700; color:#173860; margin-bottom:16px; }
.sentence-box{ background:white; border-left:5px solid #2563eb; border-radius:14px; padding:18px; line-height:2; font-size:20px; color:#0f2744; margin:16px 0; touch-action: pan-y pinch-zoom; }
.token{ display:inline-block; border-radius:8px; }
.word{ cursor:pointer; transition:.15s; padding:6px 10px; min-height:36px; user-select: none; }
.word:hover{ background:#e8f0ff; }
.selected{ background:#ffd966; border-bottom:3px solid #d97706; }
.correct-highlight{ background:#bbf7d0; border-bottom:3px solid #059669; }
.feedback{ margin-top:16px; min-height:28px; font-weight:700; color:#1e3b6b; }
.controls{ display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; }
button{ border:none; border-radius:999px; padding:12px 24px; background:#1f3f72; color:white; font-weight:700; cursor:pointer; transition:.2s; font-size:15px; }
button:hover:not(:disabled){ background:#17315b; }
button:disabled { background:#94a3b8; cursor:not-allowed; }
button.secondary{ background:white; color:#1f3f72; border:2px solid #1f3f72; }
textarea{ width:100%; min-height:90px; border:1px solid #cfd9ea; border-radius:14px; padding:14px; font-size:16px; margin-top:8px; }
.detail-table{ width:100%; border-collapse:collapse; margin-top:16px; font-size:15px; background: white; border-radius: 8px; overflow: hidden;}
.detail-table th,.detail-table td{ border:1px solid #e5e7eb; padding:12px; text-align:left; }
.detail-table th{ background:#eef2ff; color: #1e3b8a; }
.mode-switch { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding: 12px 18px; background: #f1f5f9; border-radius: 16px; }
.overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:10; display:flex; justify-content:center; align-items:center; border-radius:20px; font-weight:bold; backdrop-filter: blur(2px); }
.audio-btn { background: #e0f2fe; color: #0284c7; border: 1px solid #7dd3fc; border-radius: 50%; width: 42px; height: 42px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
@media(max-width:640px){
  .sentence-box{ font-size:19px; line-height: 2.6; }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button { width: 100%; }
}
</style>
</head>
<body>
<div class="app">
  <h1>📘 句子结构划分与翻译</h1>
  <div id="user-area"></div>
  <div class="mode-switch">
    <input type="checkbox" id="modeToggle">
    <label for="modeToggle">🧠 AI 语义评分 (需在线下载模型)</label>
    <button class="secondary" style="padding: 6px 12px; font-size: 12px; width: auto;" onclick="clearAICache()">清理缓存</button>
  </div>
  <div id="mainView">
    <div style="text-align:center; padding:40px;">⏳ 正在连接云端服务器...</div>
  </div>
</div>

<script type="module">
// ================= 1. 核心修复：防止变量名冲突 =================
const SB_URL = 'https://vbxjqgbwrlxlpafdiogj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieGpxZ2J3cmx4bHBhZmRpb2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTM5MTksImV4cCI6MjA5NDU4OTkxOX0.SVlWH2Pd5dlfO9jo39t6HmZYNKvU_14zO4Hzx-NcRUw';

// 这里将变量名改为 sb，防止与全局的 supabase 对象冲突
const sb = supabase.createClient(SB_URL, SB_KEY);

let currentUser = null;
let aiWorker = null;
const workerCallbacks = {};

// 移动端滑动变量
let touchActive = false;
let touchStartPos = { x: 0, y: 0 };
let touchLastIdx = -1;
let touchTicking = false;

const AppState = {
  questions: [], progressData: [], currentIndex: -1, currentTaskIndex: 0,
  selectedTokens: [], divideResults: [], divideWrongCounts: [],
  partsUserInput: [], partsDetail: [], fullUserInput: '',
  currentTokens: [], lastClickedIdx: -1
};

// ================= 2. 用户系统 =================
async function checkUser() {
  const { data: { user } } = await sb.auth.getUser();
  currentUser = user;
  renderUserUI();
  if (user) loadQuestions(); else renderLoginPrompt();
}

function renderUserUI() {
  const area = document.getElementById('user-area');
  area.style = 'margin-bottom:20px; padding:12px; background:#eef2ff; border-radius:12px; display:flex; justify-content:space-between; align-items:center; font-size:14px;';
  area.innerHTML = currentUser 
    ? `<span>👤 <b>${currentUser.email}</b></span><button onclick="handleLogout()" style="background:#ef4444; color:white; border:none; padding:5px 12px; border-radius:999px;">注销</button>`
    : `<span>🔒 请登录以同步进度</span><button onclick="handleAuth()" style="background:#1f3f72; color:white; border:none; padding:5px 12px; border-radius:999px;">登录/注册</button>`;
}

window.handleAuth = async () => {
  const email = prompt("邮箱:"), password = prompt("密码:");
  if(!email || !password) return;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    const reg = await sb.auth.signUp({ email, password });
    if(reg.error) alert(reg.error.message); else location.reload();
  } else location.reload();
};
window.handleLogout = async () => { await sb.auth.signOut(); location.reload(); };

function renderLoginPrompt() {
  document.getElementById('mainView').innerHTML = `<div class="card" style="text-align:center; padding:50px 20px;"><h2>🔒 学习进度已锁定</h2><button onclick="handleAuth()">立即登录 / 注册</button></div>`;
}

// ================= 3. 数据加载 =================
async function loadQuestions() {
  const { data: qs } = await sb.from('questions').select('*').order('id');
  const { data: pr } = await sb.from('user_progress').select('*').eq('user_id', currentUser.id);
  AppState.questions = qs || [];
  AppState.progressData = pr || [];
  renderQuestionList();
}

function renderQuestionList() {
  let html = '';
  AppState.questions.forEach((q, i) => {
    const record = AppState.progressData.find(p => p.question_id === q.id);
    html += `<div class="list-item" onclick="window.startQuestion(${i})">
      <div class="list-title">${record ? '✅' : '📝'} ${escapeHtml(q.sentence)} ${record ? `<span style="color:#10b981;">(${record.score}分)</span>` : ''}</div>
    </div>`;
  });
  document.getElementById('mainView').innerHTML = html || '题库为空';
}

// ================= 4. 核心答题逻辑 (1:1 还原分词与划分) =================
window.startQuestion = function(idx) {
  AppState.currentIndex = idx; AppState.currentTaskIndex = 0; AppState.selectedTokens = [];
  const q = AppState.questions[idx];
  AppState.divideResults = new Array(q.tasks.length).fill(null);
  AppState.divideWrongCounts = new Array(q.tasks.length).fill(0);
  AppState.partsUserInput = new Array(q.tasks.length).fill('');
  // 必须使用你 index2.html 的原始 tokenize 逻辑，否则索引会错位
  AppState.currentTokens = tokenize(q.sentence); 
  renderDivide();
};

function renderDivide() {
  const q = AppState.questions[AppState.currentIndex], task = q.tasks[AppState.currentTaskIndex];
  const remaining = Math.max(0, 3 - AppState.divideWrongCounts[AppState.currentTaskIndex]);
  const showCorrect = AppState.divideResults[AppState.currentTaskIndex] === false && remaining === 0;

  let html = `<div class="card">
    <div style="display:flex; justify-content:space-between;">
      <div class="task-title">请圈出：【${escapeHtml(task.title)}】</div>
      <div class="audio-btn" onclick="window.playAudio('${q.sentence.replace(/'/g,"\\'")}')">🔊</div>
    </div>
    <div style="color:#64748b; margin-bottom:10px;">剩余机会：${remaining}/3</div>
    <div class="sentence-box" id="sentenceContainer">`;
  
  AppState.currentTokens.forEach((tok, i) => {
    if(tok.isWord) {
      let cls = 'token word';
      if(showCorrect && task.indices.includes(i)) cls += ' correct-highlight';
      else if(AppState.selectedTokens.includes(i)) cls += ' selected';
      html += `<span class="${cls}" data-index="${i}" onclick="window.toggleToken(${i}, event)">${escapeHtml(tok.text)}</span>`;
    } else html += escapeHtml(tok.text);
  });

  html += `</div>
    <div id="divideFeedback" class="feedback"></div>
    <div class="controls">
      <button onclick="window.submitDivide()">提交答案</button>
      <button class="secondary" onclick="window.cancelSelection()">清除</button>
    </div>
  </div>`;
  document.getElementById('mainView').innerHTML = html;
  attachTouchHandlers();
}

// 还原分词逻辑 (核心：必须为标点符号也分配 token 占位，且保持 index 属性)
function tokenize(sentence){
  const regex = /([A-Za-z]+(?:[-'][A-Za-z]+)*|\d+|[.,!?;:()—-])|(\s+)/g;
  const tokens = [];
  let match;
  while((match = regex.exec(sentence)) !== null){
    if(match[1]) tokens.push({ text:match[1], isWord:true, index:tokens.length });
    else if(match[2]) tokens.push({ text:match[2], isWord:false, index:tokens.length });
  }
  return tokens;
}

window.toggleToken = (idx, e) => {
  if (e && e.shiftKey && AppState.lastClickedIdx !== -1) {
    const start = Math.min(idx, AppState.lastClickedIdx), end = Math.max(idx, AppState.lastClickedIdx);
    for(let i=start; i<=end; i++) if(AppState.currentTokens[i]?.isWord && !AppState.selectedTokens.includes(i)) AppState.selectedTokens.push(i);
  } else {
    const pos = AppState.selectedTokens.indexOf(idx);
    if(pos > -1) AppState.selectedTokens.splice(pos, 1); else AppState.selectedTokens.push(idx);
  }
  AppState.lastClickedIdx = idx; updateTokenUI();
};

function updateTokenUI() {
  document.querySelectorAll('.token.word').forEach(el => {
    const idx = parseInt(el.dataset.index);
    el.classList.toggle('selected', AppState.selectedTokens.includes(idx));
  });
}

window.submitDivide = () => {
  const task = AppState.questions[AppState.currentIndex].tasks[AppState.currentTaskIndex];
  // 排序后比较索引数组
  const isCorrect = arraysEqual([...AppState.selectedTokens].sort((a,b)=>a-b), [...task.indices].sort((a,b)=>a-b));
  const fb = document.getElementById('divideFeedback');

  if(isCorrect) {
    fb.innerHTML = '<span style="color:#10b981">✅ 正确！</span>';
    AppState.divideResults[AppState.currentTaskIndex] = true;
    setTimeout(proceed, 800);
  } else {
    AppState.divideWrongCounts[AppState.currentTaskIndex]++;
    if(AppState.divideWrongCounts[AppState.currentTaskIndex] >= 3) {
      fb.innerHTML = '<span style="color:#ef4444">❌ 错误，已显示正确位置。</span>';
      AppState.divideResults[AppState.currentTaskIndex] = false;
      renderDivide(); setTimeout(proceed, 1800);
    } else {
      fb.innerHTML = `<span style="color:#ef4444">❌ 不对，还剩 ${3-AppState.divideWrongCounts[AppState.currentTaskIndex]} 次。</span>`;
      AppState.selectedTokens = []; updateTokenUI();
    }
  }
};

function proceed() {
  AppState.currentTaskIndex++; AppState.selectedTokens = [];
  if(AppState.currentTaskIndex < AppState.questions[AppState.currentIndex].tasks.length) renderDivide();
  else renderParts();
}

// ================= 5. 翻译与报告 (还原评分逻辑) =================
function renderParts() {
  const q = AppState.questions[AppState.currentIndex];
  let html = `<div class="card" id="partsCard"><h2>🔤 片段翻译</h2>`;
  q.tasks.forEach((t, i) => {
    const eng = t.indices.map(idx => AppState.currentTokens[idx].text).join(' ');
    html += `<div style="margin-bottom:15px;"><label><b>${t.title}</b>: ${eng}</label><textarea id="part-${i}">${AppState.partsUserInput[i]}</textarea></div>`;
  });
  html += `<button onclick="window.submitParts()">下一步</button></div>`;
  document.getElementById('mainView').innerHTML = html;
}

window.submitParts = async () => {
  const q = AppState.questions[AppState.currentIndex];
  document.getElementById('partsCard').innerHTML += `<div class="overlay">⏳ AI 评分中...</div>`;
  for(let i=0; i<q.tasks.length; i++) {
    AppState.partsUserInput[i] = document.getElementById(`part-${i}`).value;
    const sim = await currentSimilarity(AppState.partsUserInput[i], q.tasks[i].translation);
    AppState.partsDetail[i] = sim >= 0.68;
  }
  renderFull();
};

function renderFull() {
  const q = AppState.questions[AppState.currentIndex];
  document.getElementById('mainView').innerHTML = `<div class="card" id="fullCard">
    <h2>📝 全句翻译</h2>
    <div class="sentence-box">${q.sentence}</div>
    <textarea id="fullInp" placeholder="请整合翻译..."></textarea>
    <button onclick="window.finish()">生成报告</button>
  </div>`;
}

window.finish = async () => {
  const q = AppState.questions[AppState.currentIndex];
  const input = document.getElementById('fullInp').value;
  document.getElementById('fullCard').innerHTML += `<div class="overlay">⏳ 同步中...</div>`;
  
  const fScore = Math.round((await currentSimilarity(input, q.full_translation)) * 100);
  const dScore = (AppState.divideResults.filter(x => x===true).length / q.tasks.length) * 100;
  const pScore = (AppState.partsDetail.filter(Boolean).length / q.tasks.length) * 100;
  const final = Math.round(dScore*0.4 + pScore*0.3 + fScore*0.3);

  await sb.from('user_progress').upsert({ user_id: currentUser.id, question_id: q.id, score: final }, { onConflict: 'user_id,question_id' });
  
  document.getElementById('mainView').innerHTML = `<div class="card">
    <h1>得分：${final}</h1>
    <p><b>解析：</b>${q.grammar || '无'}</p>
    <button onclick="renderQuestionList()">返回</button>
  </div>`;
};

// ================= 6. 辅助工具 =================
function attachTouchHandlers() {
  const container = document.getElementById('sentenceContainer');
  if(!container) return;
  container.addEventListener('touchstart', (e) => {
    const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
    if(el?.classList.contains('word')) {
        touchActive = true; touchLastIdx = parseInt(el.dataset.index);
    }
  });
  container.addEventListener('touchmove', (e) => {
    if(!touchActive || touchTicking) return;
    touchTicking = true;
    requestAnimationFrame(() => {
      const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
      if(el?.classList.contains('word')) {
        const idx = parseInt(el.dataset.index);
        if(!AppState.selectedTokens.includes(idx)) { AppState.selectedTokens.push(idx); updateTokenUI(); }
      }
      touchTicking = false;
    });
    e.preventDefault();
  }, {passive:false});
  container.addEventListener('touchend', () => touchActive = false);
}

const workerBlobCode = `
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
let embedder = null;
env.allowLocalModels = false;
self.onmessage = async (e) => {
  if (e.data.type === 'init') {
    env.remoteHost = 'https://hf-mirror.com';
    embedder = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2');
    self.postMessage({type:'done'});
  }
  if (e.data.type === 'compare') {
    const [a, b] = await Promise.all([
      embedder(e.data.a, { pooling: 'mean', normalize: true }),
      embedder(e.data.b, { pooling: 'mean', normalize: true })
    ]);
    let dot = 0; for(let i=0; i<a.data.length; i++) dot += a.data[i]*b.data[i];
    self.postMessage({type:'res', val: dot});
  }
};`;

function initWorker() {
  if (aiWorker) return;
  const blob = new Blob([workerBlobCode], { type: 'text/javascript' });
  aiWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });
  aiWorker.onmessage = (e) => {
    if (e.data.type === 'done') workerCallbacks.init?.(true);
    else if (e.data.type === 'res') workerCallbacks.compare?.(e.data.val);
  };
}

document.getElementById('modeToggle').onchange = async (e) => {
  if (e.target.checked) {
    initWorker(); aiWorker.postMessage({ type: 'init' });
    await new Promise(res => workerCallbacks.init = res);
    currentSimilarity = async (a, b) => {
      aiWorker.postMessage({ type: 'compare', a, b });
      const sem = await new Promise(res => workerCallbacks.compare = res);
      return (sem * 0.8) + (levenshteinRatio(a, b) * 0.2);
    };
  } else currentSimilarity = basicSimilarity;
};

function levenshteinRatio(s1, s2) {
  const a = s1.replace(/[^\u4e00-\u9fa5]/g,""), b = s2.replace(/[^\u4e00-\u9fa5]/g,"");
  if(!a || !b) return 0;
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0]=i; for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1])+1;
  return 1 - dp[m][n] / Math.max(m, n);
}
const basicSimilarity = (a, b) => levenshteinRatio(a, b);
let currentSimilarity = basicSimilarity;

function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function arraysEqual(a, b) { return JSON.stringify(a) === JSON.stringify(b); }
window.playAudio = (t) => {
  const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u);
};

window.onload = checkUser;
</script>
