<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>句子结构挑战 - 终极恢复版</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --p: #1e40af; --bg: #f8fafc; --success: #10b981; --error: #ef4444; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system; background: var(--bg); padding: 20px; color: #1e293b; }
  .app { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; }
  
  /* 导航与状态 */
  .user-bar { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 12px 20px; border-radius: 14px; margin-bottom: 20px; font-size: 14px; }
  .mode-switch { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding: 10px; background: #eff6ff; border-radius: 12px; font-size: 13px; }
  
  /* 列表卡片 */
  .card { border: 1px solid #e2e8f0; border-radius: 18px; padding: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; }
  .card:hover { border-color: var(--p); background: #f0f7ff; }
  
  /* 核心交互区 */
  .sentence-box { font-size: 22px; line-height: 2.2; margin: 20px 0; padding: 20px; background: #fff; border-left: 5px solid var(--p); border-radius: 12px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); touch-action: none; }
  .token { display: inline-block; padding: 2px 8px; cursor: pointer; border-radius: 6px; border: 1px solid transparent; transition: 0.1s; user-select: none; }
  .token.selected { background: #fde047; border-color: #ca8a04; font-weight: bold; }
  .token.correct-highlight { background: #bbf7d0; border-bottom: 3px solid #059669; }
  
  /* 按钮与输入 */
  button { border: none; background: var(--p); color: white; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; }
  button.secondary { background: #e2e8f0; color: #475569; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  textarea { width: 100%; border: 1px solid #cbd5e1; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 16px; }
  
  /* 动画与反馈 */
  .feedback { margin: 15px 0; font-weight: bold; min-height: 24px; }
  .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); z-index:10; display:flex; justify-content:center; align-items:center; border-radius:24px; font-weight:bold; backdrop-filter: blur(2px); }
  
  @media(max-width:640px) { .sentence-box { font-size: 19px; line-height: 2.8; } }
</style>
</head>
<body>
<div class="app">
  <div id="user-area" class="user-bar">加载中...</div>

  <div class="mode-switch">
    <input type="checkbox" id="modeToggle">
    <label for="modeToggle">🧠 AI 语义评分 (首次开启需下载约 120MB 模型)</label>
  </div>

  <div id="content"></div>
</div>

<script>
// ================= 配置区 =================
const SB_URL = "https://vbxjqgbwrlxlpafdiogj.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieGpxZ2J3cmx4bHBhZmRpb2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTM5MTksImV4cCI6MjA5NDU4OTkxOX0.SVlWH2Pd5dlfO9jo39t6HmZYNKvU_14zO4Hzx-NcRUw";
const sb = supabase.createClient(SB_URL, SB_KEY);

// ================= 状态管理 =================
let user = null, questions = [], scores = [], curIdx = -1;
let AppState = {
  currentTaskIndex: 0,
  selectedTokens: [],
  divideResults: [],    // 记录每一步是否通过
  divideWrongCounts: [], // 记录每一步错了几次
  partsUserInput: [],
  partsDetail: [],      // 记录片段翻译是否及格
  fullUserInput: "",
  lastClickedIdx: -1
};

// ================= 初始化 =================
window.onload = checkUser;

async function checkUser() {
  const { data } = await sb.auth.getUser();
  user = data.user;
  const area = document.getElementById('user-area');
  if(user) {
    area.innerHTML = `<span>👤 ${user.email}</span> <button onclick="logout()" class="secondary" style="padding:5px 10px; font-size:12px;">注销</button>`;
    loadData();
  } else {
    area.innerHTML = `<span>🔒 请先登录以保存进度</span> <button onclick="login()" style="padding:5px 10px; font-size:12px;">登录/注册</button>`;
    document.getElementById('content').innerHTML = `<div style="text-align:center; padding:50px;"><h2>欢迎回来</h2><p>登录后即可开始挑战云端题库</p></div>`;
  }
}

async function login() {
  const e = prompt("邮箱:"), p = prompt("密码(至少6位):");
  if(!e || !p) return;
  const { error } = await sb.auth.signInWithPassword({email:e, password:p});
  if(error) {
    const reg = await sb.auth.signUp({email:e, password:p});
    if(reg.error) alert(reg.error.message); else location.reload();
  } else location.reload();
}
async function logout() { await sb.auth.signOut(); location.reload(); }

async function loadData() {
  const { data: q } = await sb.from('questions').select('*').order('created_at');
  const { data: s } = await sb.from('user_progress').select('*').eq('user_id', user.id);
  questions = q; scores = s;
  renderList();
}

function renderList() {
  document.getElementById('content').innerHTML = questions.map((q, i) => {
    const s = scores.find(x => x.question_id === q.id);
    return `<div class="card" onclick="startQuestion(${i})">
      <div style="font-weight:bold;">${s ? '✅' : '📝'} 挑战 ${i+1} ${s ? `<span style="float:right; color:var(--success)">${s.score}分</span>` : ''}</div>
      <div style="color:#64748b; font-size:14px; margin-top:8px;">${q.sentence}</div>
    </div>`;
  }).join('');
}

// ================= 第一阶段：划分成分 (核心逻辑恢复) =================
window.startQuestion = function(index) {
  curIdx = index;
  const q = questions[index];
  AppState = {
    currentTaskIndex: 0,
    selectedTokens: [],
    divideResults: new Array(q.tasks.length).fill(null),
    divideWrongCounts: new Array(q.tasks.length).fill(0),
    partsUserInput: new Array(q.tasks.length).fill(''),
    partsDetail: [],
    fullUserInput: "",
    lastClickedIdx: -1
  };
  renderDivide();
};

function renderDivide() {
  const q = questions[curIdx], task = q.tasks[AppState.currentTaskIndex];
  const tokens = tokenize(q.sentence);
  const wrongCount = AppState.divideWrongCounts[AppState.currentTaskIndex];
  const remaining = Math.max(0, 3 - wrongCount);
  const showCorrect = AppState.divideResults[AppState.currentTaskIndex] === false && remaining === 0;

  let html = `
    <div style="color:#64748b; margin-bottom:10px;">阶段 1：拆解成分 (${AppState.currentTaskIndex + 1}/${q.tasks.length})</div>
    <h3>请圈出：<span style="color:var(--p)">【${task.title}】</span></h3>
    <p style="font-size:13px; color:${remaining < 2 ? 'red' : '#64748b'}">剩余尝试机会：${remaining}</p>
    
    <div class="sentence-box" id="sentenceContainer">
      ${tokens.map((t, i) => {
        if(!t.isWord) return t.text;
        let cls = "token";
        if(showCorrect && task.indices.includes(i)) cls += " correct-highlight";
        else if(AppState.selectedTokens.includes(i)) cls += " selected";
        return `<span class="${cls}" data-index="${i}" onclick="handleTokenClick(${i}, event)">${t.text}</span>`;
      }).join('')}
    </div>
    
    <div style="display:flex; gap:10px;">
      <button onclick="submitDivide()">提交划分</button>
      <button class="secondary" onclick="AppState.selectedTokens=[]; renderDivide()">清除</button>
    </div>
    <div id="feedback" class="feedback"></div>
  `;
  document.getElementById('content').innerHTML = html;
  attachTouchEvents(); // 恢复滑动选词
}

// 辅助：分词逻辑 (不包含标点)
function tokenize(sentence) {
  const regex = /([A-Za-z0-9]+(?:[-'][A-Za-z0-9]+)*)|([^\w\s]+)|(\s+)/g;
  const tokens = []; let match;
  while ((match = regex.exec(sentence)) !== null) {
    if (match[1]) tokens.push({ text: match[1], isWord: true });
    else if (match[2]) tokens.push({ text: match[2], isWord: false });
    else if (match[3]) tokens.push({ text: match[3], isWord: false });
  }
  return tokens;
}

window.handleTokenClick = function(idx, event) {
  if (event && event.shiftKey && AppState.lastClickedIdx !== -1) {
    const from = Math.min(AppState.lastClickedIdx, idx), to = Math.max(AppState.lastClickedIdx, idx);
    for (let i = from; i <= to; i++) if (!AppState.selectedTokens.includes(i)) AppState.selectedTokens.push(i);
  } else {
    const p = AppState.selectedTokens.indexOf(idx);
    p > -1 ? AppState.selectedTokens.splice(p, 1) : AppState.selectedTokens.push(idx);
  }
  AppState.lastClickedIdx = idx;
  renderDivide();
};

// 滑动选词逻辑恢复
let isTouching = false;
function attachTouchEvents() {
  const container = document.getElementById('sentenceContainer');
  container.addEventListener('touchstart', (e) => { isTouching = true; });
  container.addEventListener('touchmove', (e) => {
    if(!isTouching) return;
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if(el && el.classList.contains('token')) {
      const idx = parseInt(el.getAttribute('data-index'));
      if(!AppState.selectedTokens.includes(idx)) {
        AppState.selectedTokens.push(idx);
        el.classList.add('selected');
      }
    }
    e.preventDefault();
  }, {passive: false});
  container.addEventListener('touchend', () => { isTouching = false; });
}

window.submitDivide = function() {
  const q = questions[curIdx], task = q.tasks[AppState.currentTaskIndex];
  const isCorrect = JSON.stringify(AppState.selectedTokens.sort()) === JSON.stringify([...task.indices].sort());
  const fb = document.getElementById('feedback');

  if(isCorrect) {
    fb.innerHTML = `<span style="color:var(--success)">✅ 太棒了！找对了。</span>`;
    AppState.divideResults[AppState.currentTaskIndex] = true;
    setTimeout(nextTask, 1000);
  } else {
    AppState.divideWrongCounts[AppState.currentTaskIndex]++;
    if(AppState.divideWrongCounts[AppState.currentTaskIndex] >= 3) {
      fb.innerHTML = `<span style="color:var(--error)">❌ 机会用完。绿色高亮为正确答案。</span>`;
      AppState.divideResults[AppState.currentTaskIndex] = false;
      renderDivide(); // 重新渲染以显示绿色高亮
      setTimeout(nextTask, 2500);
    } else {
      fb.innerHTML = `<span style="color:var(--error)">❌ 划分不完整或不对，再试试。</span>`;
      AppState.selectedTokens = [];
      setTimeout(renderDivide, 1000);
    }
  }
};

function nextTask() {
  AppState.currentTaskIndex++;
  if(AppState.currentTaskIndex < questions[curIdx].tasks.length) renderDivide();
  else renderStep2();
}

// ================= 第二阶段：片段翻译 =================
function renderStep2() {
  const q = questions[curIdx];
  const tokens = tokenize(q.sentence);
  let html = `<h3>阶段 2：翻译刚才的成分</h3>`;
  q.tasks.forEach((t, i) => {
    const english = t.indices.map(idx => tokens[idx].text).join(' ');
    html += `
      <div class="card" style="cursor:default">
        <p><b>${t.title}</b>: <span style="color:var(--p)">${english}</span></p>
        <textarea id="part-${i}" placeholder="输入中文翻译...">${AppState.partsUserInput[i] || ''}</textarea>
      </div>
    `;
  });
  html += `<button onclick="submitStep2()">进入整句翻译</button>`;
  document.getElementById('content').innerHTML = html;
}

window.submitStep2 = function() {
  questions[curIdx].tasks.forEach((_, i) => {
    AppState.partsUserInput[i] = document.getElementById(`part-${i}`).value;
  });
  renderStep3();
};

// ================= 第三阶段：全句评分 (包含 AI) =================
function renderStep3() {
  const q = questions[curIdx];
  document.getElementById('content').innerHTML = `
    <h3>最终阶段：整句翻译</h3>
    <div class="sentence-box">${q.sentence}</div>
    <div style="margin-bottom:10px;">
      ${AppState.partsUserInput.map(t => `<span style="background:#e2e8f0; padding:4px 8px; border-radius:6px; margin:2px; display:inline-block; font-size:13px;">${t}</span>`).join('')}
    </div>
    <textarea id="fullInput" rows="4" placeholder="结合上面的片段，写出完整的中文翻译..."></textarea>
    <button id="finishBtn" onclick="calculateFinalScore()">提交并查看报告</button>
  `;
}

// 核心打分算法 (Levenshtein)
function getSim(a, b) {
  const s1 = a.replace(/[^\u4e00-\u9fa5]/g, "");
  const s2 = b.replace(/[^\u4e00-\u9fa5]/g, "");
  if(!s1 || !s2) return 0;
  const m = s1.length, n = s2.length;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for(let i=0; i<=m; i++) dp[i][0] = i;
  for(let j=0; j<=n; j++) dp[0][j] = j;
  for(let i=1; i<=m; i++) {
    for(let j=1; j<=n; j++) {
      dp[i][j] = s1[i-1] === s2[j-1] ? dp[i-1][j-1] : Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]) + 1;
    }
  }
  return 1 - dp[m][n] / Math.max(m, n);
}

async function calculateFinalScore() {
  const btn = document.getElementById('finishBtn');
  btn.disabled = true;
  const q = questions[curIdx];
  const fullInput = document.getElementById('fullInput').value;
  
  // 增加加载遮罩
  const loader = document.createElement('div');
  loader.className = 'overlay';
  loader.innerHTML = '智能评分中...';
  document.querySelector('.app').appendChild(loader);

  // 1. 划分分
  const divideScore = (AppState.divideResults.filter(x => x === true).length / q.tasks.length) * 100;
  
  // 2. 片段翻译分
  let partSum = 0;
  for(let i=0; i<q.tasks.length; i++) {
    const sim = await getSemanticSim(AppState.partsUserInput[i], q.tasks[i].translation);
    partSum += sim;
    AppState.partsDetail.push(sim >= 0.6);
  }
  const partScore = (partSum / q.tasks.length) * 100;

  // 3. 全句翻译分
  const fullSim = await getSemanticSim(fullInput, q.full_translation);
  const fullScore = fullSim * 100;

  // 综合得分
  const final = Math.round(divideScore * 0.4 + partScore * 0.3 + fullScore * 0.3);

  // 上传 Supabase
  await sb.from('user_progress').upsert({
    user_id: user.id, question_id: q.id, score: final
  }, {onConflict: 'user_id,question_id'});

  renderReport(final, fullInput);
}

function renderReport(score, userInput) {
  const q = questions[curIdx];
  document.querySelector('.overlay').remove();
  document.getElementById('content').innerHTML = `
    <div style="text-align:center">
      <h1 style="font-size:48px; color:var(--p)">${score}分</h1>
      <p>挑战完成！</p>
    </div>
    
    <div class="card" style="background:#fffbeb; border-color:#fef08a; cursor:default">
      <b style="color:#92400e">💡 老师的语法解析：</b>
      <div style="white-space:pre-wrap; margin-top:10px; font-size:15px;">${q.grammar || '暂无解析'}</div>
    </div>

    <div class="card" style="cursor:default">
      <p><b>你的翻译：</b>${userInput}</p>
      <p style="color:var(--success); margin-top:8px;"><b>标准答案：</b>${q.full_translation}</p>
    </div>

    <button onclick="renderList()">回到题库</button>
  `;
}

// ================= AI 语义引擎 (恢复 Transformers.js Worker) =================
let aiWorker = null;
const workerCode = `
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
env.allowLocalModels = false;
let pipe = null;
self.onmessage = async (e) => {
  if(e.data.type === 'init') {
    pipe = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2');
    self.postMessage({type: 'ready'});
  } else if(e.data.type === 'compare') {
    const out1 = await pipe(e.data.t1, { pooling: 'mean', normalize: true });
    const out2 = await pipe(e.data.t2, { pooling: 'mean', normalize: true });
    let dot = 0;
    for(let i=0; i<out1.data.length; i++) dot += out1.data[i] * out2.data[i];
    self.postMessage({type: 'res', val: dot});
  }
}
`;

async function getSemanticSim(t1, t2) {
  if(!document.getElementById('modeToggle').checked) return getSim(t1, t2);
  
  return new Promise((resolve) => {
    if(!aiWorker) {
      const blob = new Blob([workerCode], {type: 'application/javascript'});
      aiWorker = new Worker(URL.createObjectURL(blob), {type: 'module'});
      aiWorker.postMessage({type: 'init'});
      aiWorker.onmessage = (e) => {
        if(e.data.type === 'ready') {
          document.querySelector('label[for="modeToggle"]').innerText = "🧠 AI 语义评分 (已启用)";
          aiWorker.postMessage({type: 'compare', t1, t2});
        } else if(e.data.type === 'res') resolve(e.data.val);
      };
    } else {
      aiWorker.postMessage({type: 'compare', t1, t2});
      aiWorker.onmessage = (e) => { if(e.data.type === 'res') resolve(e.data.val); };
    }
  });
}
</script>
</body>
</html>
