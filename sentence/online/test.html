<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>句子结构练习</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --p: #1e40af; --bg: #f1f5f9; }
  body { font-family: system-ui; background: var(--bg); padding: 20px; display:flex; justify-content:center; }
  .app { width:100%; max-width:600px; background:white; padding:25px; border-radius:24px; box-shadow:0 10px 25px rgba(0,0,0,0.05); }
  .card { border:1px solid #e2e8f0; border-radius:16px; padding:15px; margin-bottom:12px; cursor:pointer; transition:0.2s; }
  .card:hover { border-color: var(--p); background: #f8fbff; }
  .token { display:inline-block; padding:4px 8px; cursor:pointer; border-radius:6px; border:1px solid transparent; }
  .selected { background:#fde047; border-color:#ca8a04; font-weight:bold; }
  button { width:100%; border:none; background:var(--p); color:white; padding:14px; border-radius:12px; cursor:pointer; font-size:16px; font-weight:600; margin-top:15px; }
  .grammar-box { background:#f8fafc; border-radius:12px; padding:15px; border-left:4px solid var(--p); white-space: pre-wrap; font-size:14px; margin-top:20px; }
</style>
</head>
<body>
<div class="app">
  <div id="header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2>📝 句子解析挑战</h2>
    <div id="userStat"></div>
  </div>
  <div id="main">正在加载题库...</div>
</div>

<script>
const SB_URL = "https://your-project.supabase.co";
const SB_KEY = "your-anon-key";
const sb = supabase.createClient(SB_URL, SB_KEY);

let user = null, questions = [], curIdx = 0;

window.onload = async () => {
  const { data } = await sb.auth.getUser();
  user = data.user;
  if(!user) {
    document.getElementById('main').innerHTML = `<button onclick="login()">登录以开始练习</button>`;
  } else {
    loadQuestions();
  }
};

async function login() {
  const email = prompt("邮箱:"), password = prompt("密码:");
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error) await sb.auth.signUp({ email, password });
  location.reload();
}

async function loadQuestions() {
  const { data } = await sb.from('questions').select('*').order('created_at');
  questions = data;
  renderList();
}

function renderList() {
  document.getElementById('main').innerHTML = questions.map((q,i)=>`
    <div class="card" onclick="startQuestion(${i})">
      <div style="font-weight:bold; color:var(--p);">挑战 ${i+1}</div>
      <div style="font-size:14px; color:#64748b;">${q.sentence}</div>
    </div>
  `).join('');
}

function startQuestion(idx) {
  curIdx = idx;
  const q = questions[idx];
  const ts = q.sentence.match(/([A-Za-z0-9]+(?:[-'][A-Za-z0-9]+)*|[.,!?;:()—-])|(\s+)/g).map(t => ({t, isW:/[a-zA-Z0-9]/.test(t)}));
  let userSelected = [];

  const renderTask = (taskIdx) => {
    const task = q.tasks[taskIdx];
    document.getElementById('main').innerHTML = `
      <p style="color:#64748b;">第 ${taskIdx+1} / ${q.tasks.length} 步</p>
      <h3>请找出句中的：<span style="color:var(--p);">${task.title}</span></h3>
      <div style="font-size:20px; line-height:2.5; margin:20px 0;">
        ${ts.map((t,i) => t.isW ? `<span class="token" id="t-${i}" onclick="tgl(${i})">${t.t}</span>` : t.t).join('')}
      </div>
      <button onclick="nextTask(${taskIdx})">下一步</button>
    `;
    window.tgl = (i) => {
      const el = document.getElementById(`t-${i}`);
      el.classList.toggle('selected');
      userSelected.includes(i) ? userSelected.splice(userSelected.indexOf(i),1) : userSelected.push(i);
    };
  };

  window.nextTask = (tIdx) => {
    // 这里可以添加逻辑比较 userSelected 和 q.tasks[tIdx].indices 给出即时反馈
    userSelected = [];
    if(tIdx < q.tasks.length - 1) renderTask(tIdx + 1);
    else showResult();
  };

  const showResult = () => {
    document.getElementById('main').innerHTML = `
      <h2 style="text-align:center;">🎉 挑战完成！</h2>
      <div class="grammar-box">
        <b>💡 语法干货：</b><br>${q.grammar}
      </div>
      <button onclick="renderList()">回到题目列表</button>
    `;
  };

  renderTask(0);
}
</script>
</body>
</html>
