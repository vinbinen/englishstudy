<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>句子结构挑战 (数据看板版)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style>
  :root { --primary: #1f3f72; --accent: #2563eb; --bg: #f3f6fb; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); padding:20px; display:flex; justify-content:center; }
  .app { width:100%; max-width:850px; background:#fff; border-radius:24px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
  h1 { font-size:30px; margin-bottom:16px; color:#16345f; text-align:center;}
  #user-area { margin-bottom:20px; padding:12px 18px; background:#eef2ff; border-radius:16px; font-size:14px; display:flex; justify-content:space-between; align-items:center; }
  .card { background:#f8fbff; border-radius:20px; padding:24px; margin-bottom:20px; }
  .list-item { background:white; border:1px solid #d9e3f2; border-radius:16px; padding:18px; margin-bottom:14px; cursor:pointer; transition:.2s; }
  .list-item:hover { border-color:var(--accent); background:#f8fbff; transform: translateY(-2px); }
  .sentence-box { background:white; border-left:5px solid var(--accent); border-radius:14px; padding:18px; line-height:2; font-size:20px; margin:16px 0; touch-action: pan-y pinch-zoom; }
  .token { display:inline-block; border-radius:6px; cursor:pointer; padding:4px 8px; user-select:none; }
  .token:hover { background:#e8f0ff; }
  .selected { background:#ffd966; border-bottom:3px solid #d97706; }
  button { border:none; border-radius:12px; padding:12px 24px; background:var(--primary); color:white; font-weight:bold; cursor:pointer; font-size:15px; }
  button:hover { opacity: 0.9; }
  button.secondary { background:white; color:var(--primary); border:2px solid var(--primary); }
  .input-area { width:100%; border:1px solid #d8e2f0; border-radius:12px; padding:12px; font-size:16px; font-family:inherit; margin-top:10px; }
  table { width:100%; border-collapse:collapse; margin-top:16px; font-size:14px; }
  th, td { border:1px solid #e2e8f0; padding:10px; text-align:left; }
  th { background:#eef2ff; }
  .pass { color: #10b981; font-weight:bold; } .fail { color: #ef4444; font-weight:bold; }
  
  /* 模态框样式 */
  .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center; }
  .modal-content { background:white; width:90%; max-width:600px; border-radius:20px; padding:24px; }
</style>
</head>
<body>
<div class="app">
  <h1 id="mainTitle">📘 英语句子成分训练</h1>
  <div id="user-area"><span>⏳ 正在验证连接...</span></div>

  <div id="mainView">
    <div style="text-align: center; padding: 40px; color:#64748b;">📡 正在连接云端服务器...</div>
  </div>
</div>

<div id="dashboardModal" class="modal">
  <div class="modal-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2>📊 我的学习档案</h2>
      <button class="secondary" style="padding:6px 12px;" onclick="document.getElementById('dashboardModal').style.display='none'">关闭</button>
    </div>
    <canvas id="scoreChart" width="400" height="250"></canvas>
  </div>
</div>

<script>
// ==========================================
// 配置区 (替换为你自己的)
// ==========================================
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let chartInstance = null; // 用于图表

const AppState = {
  questions: [], progressData: [], step: 0, currentIndex: 0, currentTaskIndex: 0,
  selectedIndices: [], userDivided: [], userPartTrans: [], userFullTrans: ""
};

window.onload = async () => { await checkUser(); };

async function checkUser() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  currentUser = user;
  if(user) {
    document.getElementById('user-area').innerHTML = `
      <span>👤 <b>${user.email}</b></span>
      <div>
        <button onclick="showDashboard()" style="padding:6px 12px; font-size:12px; background:#10b981;">📊 看看板</button>
        <button onclick="logout()" style="padding:6px 12px; font-size:12px; background:#ef4444;">退出</button>
      </div>`;
    await loadQuestions();
  } else {
    document.getElementById('user-area').innerHTML = `<span>🔒 请登录获取最新题库</span> <button onclick="login()" style="padding:6px 12px; font-size:12px;">登录/注册</button>`;
    document.getElementById('mainView').innerHTML = `<div class="card" style="text-align:center; padding:40px;"><h2>🔒 系统锁定</h2><p>请登录后解锁学习进度同步功能。</p></div>`;
  }
}

async function login() {
  const email = prompt("邮箱:"); const password = prompt("密码(至少6位):");
  if(!email || !password) return;
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) {
    if(confirm(`登录失败: ${error.message}\n直接注册此账号？`)) {
      const { error: regErr } = await supabaseClient.auth.signUp({ email, password });
      if(!regErr) { alert("注册成功！"); location.reload(); }
    }
  } else location.reload();
}
async function logout() { await supabaseClient.auth.signOut(); location.reload(); }

// --- 加载数据 ---
async function loadQuestions() {
  try {
    const { data: qData } = await supabaseClient.from('questions').select('*').order('created_at');
    const { data: pData } = await supabaseClient.from('user_progress').select('*').eq('user_id', currentUser.id);
    
    AppState.questions = (qData||[]).map(q => ({...q, fullTranslation: q.full_translation}));
    AppState.progressData = pData || [];
    renderList();
  } catch(e) { document.getElementById('mainView').innerHTML = '❌ 加载失败'; }
}

// --- 📊 数据看板展示逻辑 ---
function showDashboard() {
  document.getElementById('dashboardModal').style.display = 'flex';
  
  const ctx = document.getElementById('scoreChart').getContext('2d');
  if(chartInstance) chartInstance.destroy(); // 销毁旧图表防止重叠
  
  // 准备数据：X轴是题目简写，Y轴是分数
  const labels = AppState.progressData.map(p => `题目 ID:${p.question_id}`);
  const scores = AppState.progressData.map(p => p.score);

  if(scores.length === 0) {
    alert("暂无答题数据，先去完成一道题吧！");
    document.getElementById('dashboardModal').style.display = 'none';
    return;
  }

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '历史最高得分',
        data: scores,
        backgroundColor: '#3b82f6',
        borderRadius: 4
      }]
    },
    options: { scales: { y: { beginAtZero: true, max: 100 } } }
  });
}

// ==========================================
// 业务流程：列表 -> 划分 -> 翻译 -> 结果
// ==========================================
function renderList() {
  document.getElementById('mainTitle').textContent = "📚 题库列表";
  let html = AppState.questions.map((q, i) => {
    const record = AppState.progressData.find(p => p.question_id === q.id);
    return `
    <div class="list-item" onclick="startQuest(${i})">
      <div style="font-weight:bold; color:#1e293b; margin-bottom:4px;">${record ? '✅' : '📝'} 第 ${i+1} 题 ${record? `<span style="color:#10b981; font-size:12px;">(得分: ${record.score})</span>`:''}</div>
      <div style="color:#64748b; font-size:14px;">${q.sentence}</div>
    </div>`;
  }).join('');
  document.getElementById('mainView').innerHTML = html || '<div class="card">题库空空如也，请管理员去添加吧！</div>';
}

function startQuest(i) {
  AppState.currentIndex = i; AppState.userDivided = []; AppState.userPartTrans = [];
  goDivide(0);
}

// --- 阶段 1：成分划分 ---
function goDivide(taskIdx) {
  const q = AppState.questions[AppState.currentIndex], task = q.tasks[taskIdx];
  AppState.currentTaskIndex = taskIdx; AppState.selectedIndices = [];
  document.getElementById('mainTitle').textContent = `1. 结构划分 (${taskIdx+1}/${q.tasks.length})`;
  
  document.getElementById('mainView').innerHTML = `
    <div class="card">
      <div style="font-size:18px; color:#2563eb; font-weight:bold; margin-bottom:15px;">👉 圈出：${task.title}</div>
      <div class="sentence-box" id="sBox">${renderTokens(q.sentence)}</div>
      <div style="display:flex; gap:10px;">
        <button onclick="saveDivide(${taskIdx})">确认划分</button>
        <button class="secondary" onclick="renderList()">退出练习</button>
      </div>
    </div>`;
}

function renderTokens(s) {
  const ts = tokenize(s);
  return ts.map((t, i) => t.isWord ? 
    `<span class="token ${AppState.selectedIndices.includes(i)?'selected':''}" onclick="tgl(${i})">${t.text}</span>` : t.text).join('');
}

function tgl(i) {
  const p = AppState.selectedIndices.indexOf(i);
  if(p >= 0) AppState.selectedIndices.splice(p,1); else AppState.selectedIndices.push(i);
  document.getElementById('sBox').innerHTML = renderTokens(AppState.questions[AppState.currentIndex].sentence);
}

function tokenize(s) { return s.match(/([A-Za-z0-9]+(?:[-'][A-Za-z0-9]+)*|[.,!?;:()—-])|(\s+)/g).map((t,i)=>({text:t, isWord: /[a-zA-Z0-9]/.test(t)})); }

function saveDivide(idx) {
  AppState.userDivided.push([...AppState.selectedIndices]);
  if(idx < AppState.questions[AppState.currentIndex].tasks.length - 1) goDivide(idx+1);
  else goPartTrans(0);
}

// --- 阶段 2：部分翻译 ---
function goPartTrans(idx) {
  const q = AppState.questions[AppState.currentIndex], task = q.tasks[idx];
  document.getElementById('mainTitle').textContent = `2. 翻译片段 (${idx+1}/${q.tasks.length})`;
  
  const ts = tokenize(q.sentence);
  const englishText = AppState.userDivided[idx].sort((a,b)=>a-b).map(i => ts[i].text).join(' ');

  document.getElementById('mainView').innerHTML = `
    <div class="card">
      <div style="font-weight:bold; color:#64748b;">成分：${task.title}</div>
      <div style="font-size:22px; color:#1e293b; margin:15px 0; background:#f1f5f9; padding:10px; border-radius:8px;">${englishText}</div>
      <input type="text" id="ptInput" class="input-area" placeholder="请输入你的翻译...">
      <button style="margin-top:20px;" onclick="savePartTrans(${idx})">下一步</button>
    </div>`;
}
function savePartTrans(idx) {
  AppState.userPartTrans.push(document.getElementById('ptInput').value);
  if(idx < AppState.questions[AppState.currentIndex].tasks.length - 1) goPartTrans(idx+1);
  else goFullTrans();
}

// --- 阶段 3：全句翻译 ---
function goFullTrans() {
  const q = AppState.questions[AppState.currentIndex];
  document.getElementById('mainTitle').textContent = `3. 合并全句`;
  document.getElementById('mainView').innerHTML = `
    <div class="card">
      <div style="font-size:18px; margin-bottom:15px;">${q.sentence}</div>
      <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px;">
        ${AppState.userPartTrans.map(t => `<span class="token" style="background:#dbeafe; padding:6px 12px; border-radius:99px;" onclick="document.getElementById('ftInput').value += '${t}'">${t}</span>`).join('')}
      </div>
      <textarea id="ftInput" class="input-area" rows="3" placeholder="结合上述词块，输入最终完整翻译..."></textarea>
      <button style="margin-top:20px;" onclick="finishQuest()">提交并生成报告</button>
    </div>`;
}

// --- 生成报告与存分 ---
function levenshtein(a, b) {
  if(!a || !b) return 0; if(a===b) return 1; if(a.length<b.length) [a,b]=[b,a];
  let p=Array.from({length:b.length+1},(_,i)=>i), c=new Array(b.length+1).fill(0);
  for(let i=1;i<=a.length;i++){ c[0]=i; for(let j=1;j<=b.length;j++) c[j]=Math.min(c[j-1]+1, p[j]+1, p[j-1]+(a[i-1]===b[j-1]?0:1)); [p,c]=[c,p]; }
  return 1 - (p[b.length]/Math.max(a.length, b.length));
}

async function finishQuest() {
  const q = AppState.questions[AppState.currentIndex];
  AppState.userFullTrans = document.getElementById('ftInput').value;
  
  let divCount = 0;
  q.tasks.forEach((t, i) => { if(JSON.stringify(t.indices.sort()) === JSON.stringify(AppState.userDivided[i].sort())) divCount++; });
  const divScore = (divCount / q.tasks.length) * 100;
  
  let transSum = 0;
  q.tasks.forEach((t, i) => { transSum += levenshtein(t.translation, AppState.userPartTrans[i]); });
  const partScore = (transSum / q.tasks.length) * 100;
  
  const fullScore = levenshtein(q.fullTranslation, AppState.userFullTrans) * 100;
  
  const finalScore = Math.round(divScore * 0.4 + partScore * 0.3 + fullScore * 0.3);

  // 云端同步成绩
  await supabaseClient.from('user_progress').upsert({ user_id: currentUser.id, question_id: q.id, score: finalScore }, { onConflict: 'user_id, question_id' });
  
  // 更新本地数组，让返回列表立刻生效
  const existing = AppState.progressData.find(p=>p.question_id === q.id);
  if(existing) existing.score = Math.max(existing.score, finalScore); else AppState.progressData.push({question_id: q.id, score: finalScore});

  document.getElementById('mainTitle').textContent = `🎉 挑战完成`;
  document.getElementById('mainView').innerHTML = `
    <div class="card">
      <h1 style="color:#2563eb; font-size:40px;">${finalScore} 分</h1>
      
      <div style="background:#f0fdf4; padding:15px; border-radius:10px; margin:20px 0; border:1px solid #bbf7d0;">
        <strong style="color:#166534;">✅ 参考译文：</strong>${q.fullTranslation}<br>
        <strong style="color:#1e40af; margin-top:8px; display:inline-block;">✍️ 你的译文：</strong>${AppState.userFullTrans}
      </div>

      ${q.grammar ? `<div style="background:#fffbeb; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid #fde68a;">
        <strong style="color:#92400e;">💡 语法解析：</strong><br><span style="white-space:pre-wrap; font-size:14px;">${q.grammar}</span>
      </div>` : ''}

      <table>
        <tr><th>成分</th><th>划分</th><th>你的翻译</th><th>标准翻译</th></tr>
        ${q.tasks.map((t, i) => `<tr>
            <td>${t.title}</td>
            <td class="${JSON.stringify(t.indices.sort())===JSON.stringify(AppState.userDivided[i].sort())?'pass':'fail'}">●</td>
            <td>${AppState.userPartTrans[i]}</td>
            <td>${t.translation}</td>
          </tr>`).join('')}
      </table>
      
      <button style="margin-top:20px; width:100%;" onclick="renderList()">返回列表</button>
    </div>`;
}
</script>
</body>
</html>
