<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>句子挑战 - 学习看板版</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --p: #1e3a8a; --bg: #f8fafc; }
  body { font-family:system-ui; background:var(--bg); padding:20px; color:#1e293b; }
  .app { max-width:800px; margin:auto; background:white; padding:25px; border-radius:24px; box-shadow:0 10px 25px rgba(0,0,0,0.05); }
  .user-bar { display:flex; justify-content:space-between; align-items:center; background:#f1f5f9; padding:12px 20px; border-radius:14px; margin-bottom:20px; }
  .card { border:1px solid #e2e8f0; border-radius:18px; padding:20px; margin-bottom:15px; cursor:pointer; }
  .card:hover { border-color: #3b82f6; background:#f0f7ff; }
  .sentence-box { font-size:22px; line-height:1.8; margin:20px 0; padding:15px; background:#f8fafc; border-left:4px solid var(--p); }
  .token { display:inline-block; padding:4px 8px; cursor:pointer; border-radius:6px; }
  .selected { background:#fde047; box-shadow: 0 2px 0 #ca8a04; }
  button { border:none; background:var(--p); color:white; padding:12px 24px; border-radius:12px; cursor:pointer; font-weight:600; }
  input { width:100%; border:1px solid #cbd5e1; padding:12px; border-radius:10px; margin-top:10px; }
  .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
  .modal-box { background:white; padding:30px; border-radius:20px; width:90%; max-width:600px; }
</style>
</head>
<body>
<div class="app">
  <h1 style="text-align:center; margin-bottom:20px;">📘 句子结构挑战</h1>
  <div id="user-area" class="user-bar">加载中...</div>
  <div id="content"></div>
</div>

<div id="chartModal" class="modal">
  <div class="modal-box">
    <h2>📊 我的成长曲线</h2>
    <canvas id="myChart" style="margin:20px 0;"></canvas>
    <button onclick="document.getElementById('chartModal').style.display='none'">关闭</button>
  </div>
</div>

<script>
// --- 填入你的 Supabase 配置 ---
const SB_URL = "https://vbxjqgbwrlxlpafdiogj.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieGpxZ2J3cmx4bHBhZmRpb2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTM5MTksImV4cCI6MjA5NDU4OTkxOX0.SVlWH2Pd5dlfO9jo39t6HmZYNKvU_14zO4Hzx-NcRUw";
const sb = supabase.createClient(SB_URL, SB_KEY);

let user = null, questions = [], scores = [], curIdx = 0, state = { div:[], trans:[], full:"" };

window.onload = checkUser;

async function checkUser() {
  const { data } = await sb.auth.getUser();
  user = data.user;
  if(user) {
    document.getElementById('user-area').innerHTML = `<span>👤 ${user.email}</span> <div><button onclick="showChart()" style="background:#10b981; margin-right:5px;">看板</button><button onclick="sb.auth.signOut().then(()=>location.reload())">退出</button></div>`;
    loadData();
  } else {
    document.getElementById('user-area').innerHTML = `请先登录 <button onclick="login()">登录/注册</button>`;
  }
}

async function login() {
  const e = prompt("邮箱:"), p = prompt("密码(至少6位):");
  if(!e || !p) return;
  const { error } = await sb.auth.signInWithPassword({email:e, password:p});
  if(error) await sb.auth.signUp({email:e, password:p});
  location.reload();
}

async function loadData() {
  const { data: q } = await sb.from('questions').select('*').order('created_at');
  const { data: s } = await sb.from('user_progress').select('*').eq('user_id', user.id);
  questions = q; scores = s;
  renderList();
}

function renderList() {
  document.getElementById('content').innerHTML = questions.map((q,i) => {
    const s = scores.find(x => x.question_id === q.id);
    return `<div class="card" onclick="start(${i})">
      <div style="font-weight:bold;">第 ${i+1} 题 ${s ? `<span style="color:#10b981;">(最高分: ${s.score})</span>` : ''}</div>
      <div style="color:#64748b; font-size:14px;">${q.sentence}</div>
    </div>`;
  }).join('') || "题库建设中...";
}

// 练习逻辑
function start(i) {
  curIdx = i; state = { div:[], trans:[], full:"" };
  goStep1(0);
}

function goStep1(ti) {
  const q = questions[curIdx], t = q.tasks[ti];
  const ts = q.sentence.match(/([A-Za-z0-9]+(?:[-'][A-Za-z0-9]+)*|[.,!?;:()—-])|(\s+)/g).map(x=>({t:x, isW:/[a-zA-Z0-9]/.test(x)}));
  let sel = [];
  
  const render = () => {
    document.getElementById('content').innerHTML = `
      <h3>阶段 1: 找出 【${t.title}】</h3>
      <div class="sentence-box">${ts.map((x,idx)=> x.isW ? `<span class="token ${sel.includes(idx)?'selected':''}" onclick="this.classList.toggle('selected'); toggleSel(${idx})">${x.t}</span>` : x.t).join('')}</div>
      <button onclick="saveStep1(${ti})">确定</button>
    `;
  };
  window.toggleSel = (idx) => { sel.includes(idx) ? sel.splice(sel.indexOf(idx),1) : sel.push(idx); };
  window.saveStep1 = (idx) => { 
    state.div.push([...sel]); 
    if(idx < q.tasks.length-1) goStep1(idx+1); else goStep2(0); 
  };
  render();
}

function goStep2(ti) {
  const q = questions[curIdx], t = q.tasks[ti];
  const ts = q.sentence.match(/([A-Za-z0-9]+(?:[-'][A-Za-z0-9]+)*|[.,!?;:()—-])|(\s+)/g);
  const eng = state.div[ti].sort((a,b)=>a-b).map(i=>ts[i]).join(' ');
  
  document.getElementById('content').innerHTML = `
    <h3>阶段 2: 翻译片段</h3>
    <div style="font-size:20px; margin:20px 0;">"${eng}"</div>
    <input type="text" id="pIn" placeholder="输入中文翻译...">
    <button style="margin-top:20px;" onclick="state.trans.push(document.getElementById('pIn').value); ${ti < q.tasks.length-1 ? `goStep2(${ti+1})` : `goStep3()`}">下一步</button>
  `;
}

function goStep3() {
  const q = questions[curIdx];
  document.getElementById('content').innerHTML = `
    <h3>阶段 3: 组合全句翻译</h3>
    <div style="margin:15px 0;">${q.sentence}</div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">
      ${state.trans.map(x => `<span style="background:#e0f2fe; padding:5px 10px; border-radius:20px;">${x}</span>`).join('')}
    </div>
    <textarea id="fIn" style="width:100%; border-radius:12px; padding:12px;" rows="3"></textarea>
    <button style="margin-top:20px;" onclick="finish()">提交并评分</button>
  `;
}

// 评分与看板
function lev(a, b) {
  if(!a || !b) return 0;
  const res = Array.from({length:a.length+1},()=>[]);
  for(let i=0;i<=a.length;i++) res[i][0]=i; for(let j=0;j<=b.length;j++) res[0][j]=j;
  for(let i=1;i<=a.length;i++) for(let j=1;j<=b.length;j++) res[i][j]=Math.min(res[i-1][j]+1, res[i][j-1]+1, res[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return 1 - res[a.length][b.length] / Math.max(a.length, b.length);
}

async function finish() {
  const q = questions[curIdx];
  state.full = document.getElementById('fIn').value;
  
  let dS = 0; q.tasks.forEach((t,i) => { if(JSON.stringify(t.indices.sort())===JSON.stringify(state.div[i].sort())) dS++; });
  const divScore = (dS/q.tasks.length)*100;
  
  let tS = 0; q.tasks.forEach((t,i) => tS += lev(t.translation, state.trans[i]));
  const partScore = (tS/q.tasks.length)*100;
  
  const fullScore = lev(q.full_translation, state.full)*100;
  const final = Math.round(divScore*0.4 + partScore*0.3 + fullScore*0.3);

  await sb.from('user_progress').upsert({user_id:user.id, question_id:q.id, score:final}, {onConflict:'user_id,question_id'});
  
  document.getElementById('content').innerHTML = `
    <div style="text-align:center;">
      <h1 style="font-size:50px; color:#2563eb;">${final} 分</h1>
      <div class="card" style="text-align:left; background:#fefce8;">
        <b>💡 AI 语法解析：</b><br>${q.grammar || '暂无解析'}
      </div>
      <button onclick="loadData()">返回列表</button>
    </div>
  `;
}

function showChart() {
  document.getElementById('chartModal').style.display='flex';
  const ctx = document.getElementById('myChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: scores.map((_,i)=>`第${i+1}次`),
      datasets: [{ label: '历史得分', data: scores.map(s=>s.score), borderColor: '#3b82f6', tension: 0.3 }]
    }
  });
}
</script>
</body>
</html>
