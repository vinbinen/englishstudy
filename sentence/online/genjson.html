<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>句子成分 JSON 索引生成器 (安全配置版)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f3f6fb; padding:20px; color:#16345f; }
  .container{ max-width:1200px; margin:auto; }
  h1{ font-size:32px; margin-bottom:24px; }
  .card{ background:white; border-radius:20px; padding:24px; margin-bottom:24px; box-shadow:0 10px 30px rgba(0,0,0,.06); }
  label{ display:block; font-weight:700; margin-bottom:10px; }
  input[type="text"], input[type="password"], textarea { width:100%; border:1px solid #d8e2f0; border-radius:14px; padding:14px; font-size:16px; margin-bottom:18px; font-family:inherit; }
  textarea{ min-height:100px; resize:vertical; }
  button{ border:none; background:#1f3f72; color:white; padding:12px 22px; border-radius:999px; cursor:pointer; font-size:15px; font-weight:700; transition:.2s; }
  button:hover:not(:disabled){ background:#17315a; }
  button:disabled { background:#94a3b8; cursor:not-allowed; }
  button.secondary{ background:white; color:#1f3f72; border:2px solid #1f3f72; }
  button.danger { background:white; color:#dc2626; border:2px solid #dc2626; }
  .controls{ display:flex; flex-wrap:wrap; gap:12px; margin-top:16px; }
  .token-box{ background:#f8fbff; border-radius:16px; padding:20px; line-height:2.2; font-size:20px; border-left:5px solid #2563eb; }
  .token{ display:inline-block; padding:4px 8px; border-radius:8px; transition:.15s; user-select:none;}
  .word{ cursor:pointer; }
  .word:hover{ background:#e0ebff; }
  .selected{ background:#ffd966; border-bottom:3px solid #d97706; }
  .task-card{ border:1px solid #dbe5f4; border-radius:16px; padding:18px; margin-top:16px; background:#fafcff; }
  .preview{ background:#eef5ff; border-radius:10px; padding:10px 14px; margin-top:10px; color:#334155; line-height:1.8; }
  .output{ background:#0f172a; color:#d1fae5; padding:20px; border-radius:16px; overflow:auto; font-family:Consolas,monospace; white-space:pre-wrap; line-height:1.7; max-height:400px;}
  .small{ font-size:14px; color:#64748b; }
  .part-list{ margin-top:18px; }
  .part-item{ background:white; border:1px solid #d9e3f2; border-radius:12px; padding:12px; margin-bottom:12px; }
  .part-head{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; }
  .part-actions{ display:flex; gap:8px; }
  .config-box { background:#f8fafc; border:1px solid #cbd5e1; border-radius:16px; padding:20px; margin-bottom:24px; }
  .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:700px){ .token-box{ font-size:17px; } h1{ font-size:24px; } .config-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="container">
  <h1>📘 句子成分在线生成器 (安全同步版)</h1>

  <div class="config-box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h3 style="color:#0f172a;">⚙️ 数据库连接配置 (仅保存在本地)</h3>
      <span id="configStatus" style="font-size:13px; color:#64748b;">未配置</span>
    </div>
    <div class="config-grid">
      <div>
        <label style="font-size:14px;">Supabase URL</label>
        <input type="text" id="dbUrl" placeholder="https://xxx.supabase.co" style="margin-bottom:0;" onchange="saveConfig()">
      </div>
      <div>
        <label style="font-size:14px;">Supabase Anon Key</label>
        <input type="password" id="dbKey" placeholder="eyJhbGci..." style="margin-bottom:0;" onchange="saveConfig()">
      </div>
    </div>
  </div>

  <div class="card">
    <label>1. 英文句子</label>
    <textarea id="sentenceInput" placeholder="请输入英文句子..."></textarea>
    <label>2. 整句中文翻译</label>
    <textarea id="fullTranslationInput" placeholder="请输入整句翻译..."></textarea>
    <label>3. 语法知识点讲解 (支持换行，选填)</label>
    <textarea id="grammarInput" placeholder="例如：本句中 states 引导宾语从句..."></textarea>

    <div class="controls">
      <button onclick="generateTokens()">生成词块</button>
      <button class="secondary" onclick="addPart()">添加选中为句子成分</button>
      <button class="secondary" style="border-color:#10b981; color:#10b981;" onclick="saveToQuestionBank()">加入本地待同步列表</button>
      <button class="danger" onclick="clearCurrentEditor()">清空当前输入</button>
    </div>
  </div>

  <div class="card">
    <label>点击单词选择成分 (支持 Shift 键多选)</label>
    <div id="tokenBox" class="token-box">请先输入句子并点击“生成词块”</div>
  </div>

  <div class="card">
    <label>句子成分列表</label>
    <div id="partsContainer" class="part-list"></div>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
      <h2>📦 待同步列表 (<span id="qCount">0</span> 题)</h2>
      <button class="danger" style="padding:6px 12px; font-size:13px;" onclick="clearQuestionBank()">清空列表</button>
    </div>
    
    <div class="controls">
      <button id="syncBtn" style="background:#059669; width:100%; padding:16px; font-size:18px;" onclick="syncToSupabase()">🚀 一键同步到 Supabase 数据库</button>
      <button class="secondary" onclick="generateJSON()">生成完整题库 JSON 预览</button>
      <button class="secondary" onclick="copyJSON()">复制 JSON</button>
    </div>
    <div id="copyInfo" style="color:#10b981; font-weight:bold; margin-top:12px;"></div>
    <div id="jsonOutput" class="output" style="margin-top:18px; display:none;">等待生成...</div>
  </div>
</div>

<script>
// ==========================================
// ✨ 数据库动态配置逻辑
// ==========================================
function saveConfig() {
  const url = document.getElementById('dbUrl').value.trim();
  const key = document.getElementById('dbKey').value.trim();
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  updateConfigStatus();
}

function loadConfig() {
  const url = localStorage.getItem('sb_url') || '';
  const key = localStorage.getItem('sb_key') || '';
  document.getElementById('dbUrl').value = url;
  document.getElementById('dbKey').value = key;
  updateConfigStatus();
}

function updateConfigStatus() {
  const url = document.getElementById('dbUrl').value.trim();
  const key = document.getElementById('dbKey').value.trim();
  const status = document.getElementById('configStatus');
  if (url && key) {
    status.innerHTML = '✅ <span style="color:#10b981;">已配置</span>';
  } else {
    status.innerHTML = '⚠️ <span style="color:#f59e0b;">缺少配置</span>';
  }
}

// 提取动态创建 Supabase 实例的函数
function getSupabaseClient() {
  const url = document.getElementById('dbUrl').value.trim();
  const key = document.getElementById('dbKey').value.trim();
  if (!url || !key) {
    throw new Error('请先在顶部配置 Supabase URL 和 Key！');
  }
  return supabase.createClient(url, key);
}

// ==========================================
// 业务逻辑区
// ==========================================
let tokens = [];
let selectedIndices = [];
let parts = [];
let questionBank = [];
let lastClickedIdx = -1;

window.onload = () => {
  loadConfig(); // 加载配置
  const saved = localStorage.getItem('sentenceBuilderBank');
  if (saved) { questionBank = JSON.parse(saved); document.getElementById('qCount').textContent = questionBank.length; }
};

function saveBankLocally() {
  localStorage.setItem('sentenceBuilderBank', JSON.stringify(questionBank));
  document.getElementById('qCount').textContent = questionBank.length;
}

function escapeHtml(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function tokenize(sentence){
  const regex = /([A-Za-z]+(?:[-'][A-Za-z]+)*|\d+|[.,!?;:()—-])|(\s+)/g;
  const arr = []; let match;
  while((match = regex.exec(sentence)) !== null){
    if(match[1]) arr.push({ text:match[1], isWord:true, index:arr.length });
    else if(match[2]) arr.push({ text:match[2], isWord:false, index:arr.length });
  }
  return arr;
}

function generateTokens(){
  const sentence = document.getElementById('sentenceInput').value.trim();
  if(!sentence){ alert('请输入英文句子'); return; }
  tokens = tokenize(sentence); selectedIndices = []; lastClickedIdx = -1; renderTokens();
}

function renderTokens(){
  let html = '';
  tokens.forEach((tok,idx)=>{
    if(tok.isWord){
      let cls = 'token word';
      if(selectedIndices.includes(idx)) cls += ' selected';
      html += `<span class="${cls}" onclick="toggleToken(${idx}, event)" title="索引: ${idx}">${escapeHtml(tok.text)}</span>`;
    } else { html += escapeHtml(tok.text); }
  });
  document.getElementById('tokenBox').innerHTML = html;
}

window.toggleToken = function(idx, event){
  if (event && event.shiftKey && lastClickedIdx !== -1) {
    const from = Math.min(lastClickedIdx, idx), to = Math.max(lastClickedIdx, idx);
    for (let i = from; i <= to; i++) if (tokens[i]?.isWord && !selectedIndices.includes(i)) selectedIndices.push(i);
  } else {
    const pos = selectedIndices.indexOf(idx);
    if(pos >= 0) selectedIndices.splice(pos,1); else selectedIndices.push(idx);
  }
  lastClickedIdx = idx; renderTokens();
};

window.addPart = function(){
  if(selectedIndices.length === 0){ alert('请先选择单词'); return; }
  const title = prompt('请输入成分名称（例如：主语 / 谓语 / 宾从主语）'); if(!title) return;
  const translation = prompt('请输入该成分的中文翻译');
  const sorted = [...selectedIndices].sort((a,b)=>a-b);
  const englishText = sorted.map(i=>tokens[i]?.text || '').join(' ');
  parts.push({ title, indices:sorted, translation:translation || '', text:englishText });
  selectedIndices = []; lastClickedIdx = -1; renderTokens(); renderParts();
};

function renderParts(){
  const container = document.getElementById('partsContainer');
  if(parts.length === 0){ container.innerHTML = '<div class="small">暂无成分</div>'; return; }
  let html = '';
  parts.forEach((part,index)=>{
    html += `
      <div class="part-item">
        <div style="flex:1;">
          <div style="font-weight:700;">${escapeHtml(part.title)} <span class="small" style="margin-left:10px;">[${part.indices.join(',')}]</span></div>
          <div class="preview"><strong>英文：</strong>${escapeHtml(part.text)}<br><strong>中文：</strong>${escapeHtml(part.translation)}</div>
        </div>
        <div class="part-actions">
          <button class="secondary" onclick="editPart(${index})" style="padding:6px 12px; font-size:13px;">编辑</button>
          <button class="danger" onclick="deletePart(${index})" style="padding:6px 12px; font-size:13px;">删除</button>
        </div>
      </div>`;
  });
  container.innerHTML = html;
}

window.deletePart = function(index){ parts.splice(index,1); renderParts(); };
window.editPart = function(index){
  const part = parts[index];
  const newTitle = prompt('修改成分名称',part.title); if(!newTitle) return;
  const newTranslation = prompt('修改中文翻译',part.translation);
  part.title = newTitle; part.translation = newTranslation || ''; renderParts();
};

window.saveToQuestionBank = function() {
  const sentence = document.getElementById('sentenceInput').value.trim();
  const fullTranslation = document.getElementById('fullTranslationInput').value.trim();
  const grammar = document.getElementById('grammarInput').value.trim();
  
  if(!sentence || !fullTranslation) { alert('请输入英文句子和整句中文翻译'); return; }
  if(parts.length === 0) { alert('请至少添加一个句子成分'); return; }

  const newQuestion = {
    id: Date.now(), 
    sentence: sentence,
    tasks: parts.map(p => ({ title: p.title, indices: p.indices, translation: p.translation })),
    full_translation: fullTranslation, 
    grammar: grammar
  };

  questionBank.push(newQuestion); saveBankLocally(); clearCurrentEditor();
  alert('✅ 题目已加入本地列表！你可以继续添加下一题。');
};

window.clearCurrentEditor = function(){
  tokens = []; selectedIndices = []; parts = []; lastClickedIdx = -1;
  document.getElementById('sentenceInput').value = '';
  document.getElementById('fullTranslationInput').value = '';
  document.getElementById('grammarInput').value = '';
  document.getElementById('tokenBox').innerHTML = '请先输入句子并点击“生成词块”';
  document.getElementById('partsContainer').innerHTML = '';
};

window.clearQuestionBank = function(){
  if(!confirm('🚨 确定要清空所有临时列表数据吗？(不会影响云端已有数据)')) return;
  questionBank = []; saveBankLocally(); document.getElementById('jsonOutput').style.display = 'none';
};

window.generateJSON = function(){
  const out = document.getElementById('jsonOutput'); out.style.display = 'block';
  out.textContent = JSON.stringify(questionBank, null, 2);
};

window.copyJSON = async function(){
  const text = document.getElementById('jsonOutput').textContent;
  if(!text || text === '等待生成...'){ alert('请先生成 JSON'); return; }
  try{ await navigator.clipboard.writeText(text); document.getElementById('copyInfo').innerHTML = '✅ JSON 已复制'; setTimeout(()=>{ document.getElementById('copyInfo').innerHTML = ''; },2000); } catch(err){ alert('复制失败'); }
};

// ==========================================
// 🚀 一键同步逻辑 (使用动态 Client)
// ==========================================
window.syncToSupabase = async function() {
  if (questionBank.length === 0) { alert("列表为空，请先添加题目！"); return; }
  
  let sbClient;
  try {
    sbClient = getSupabaseClient(); // 尝试获取连接
  } catch(e) {
    alert(e.message); return;
  }

  const btn = document.getElementById('syncBtn');
  btn.textContent = "⏳ 正在同步..."; btn.disabled = true;

  try {
    const { data, error } = await sbClient.from('questions').upsert(questionBank, { onConflict: 'id' });
    if (error) throw error;

    alert(`✅ 成功！已将 ${questionBank.length} 道题目同步到云端数据库。`);
    questionBank = []; saveBankLocally();
  } catch (err) { 
    alert("❌ 同步失败：" + err.message); 
  } finally { 
    btn.textContent = "🚀 一键同步到 Supabase 数据库"; btn.disabled = false; 
  }
};
</script>
</body>
</html>
