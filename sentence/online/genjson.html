<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>句子成分 JSON 索引生成器 (云端增强版)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f3f6fb; padding:20px; color:#16345f; }
  .container { max-width:1200px; margin:auto; }
  h1 { font-size:32px; margin-bottom:24px; }
  .card { background:white; border-radius:20px; padding:24px; margin-bottom:24px; box-shadow:0 10px 30px rgba(0,0,0,.06); }
  label { display:block; font-weight:700; margin-bottom:10px; }
  textarea, input { width:100%; border:1px solid #d8e2f0; border-radius:14px; padding:14px; font-size:16px; margin-bottom:18px; font-family: inherit; }
  textarea { min-height:80px; resize:vertical; }
  button { border:none; background:#1f3f72; color:white; padding:12px 22px; border-radius:999px; cursor:pointer; font-size:15px; font-weight:700; transition:.2s; }
  button:hover { background:#17315a; transform: translateY(-1px); }
  button.secondary { background:white; color:#1f3f72; border:2px solid #1f3f72; }
  button.danger { background:white; color:#dc2626; border:2px solid #dc2626; }
  .token-box { background:#f8fbff; border-radius:16px; padding:20px; line-height:2.2; font-size:20px; border-left:5px solid #2563eb; min-height: 80px; margin-bottom: 20px; }
  .token { display:inline-block; padding:4px 8px; border-radius:8px; transition:.15s; user-select: none; }
  .word { cursor:pointer; }
  .selected { background:#ffd966; border-bottom:3px solid #d97706; }
  .output { background:#0f172a; color:#d1fae5; padding:20px; border-radius:16px; overflow:auto; font-family:Consolas,monospace; white-space:pre-wrap; font-size: 14px; max-height: 400px; }
  .part-item { background:#fff; border:1px solid #d9e3f2; border-radius:12px; padding:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
  <h1>📘 题目生成与云端同步</h1>

  <div class="card">
    <label>1. 输入句子并生成词块</label>
    <textarea id="sentenceInput" placeholder="Enter the English sentence here..."></textarea>
    <button onclick="generateTokens()">生成词块</button>
    <div id="tokenBox" class="token-box" style="margin-top:15px;">等待生成...</div>
    
    <label>2. 划分成分</label>
    <div id="partsContainer"></div>
    <button class="secondary" onclick="addPart()">添加选中为成分</button>
  </div>

  <div class="card">
    <label>3. 翻译与解析</label>
    <textarea id="fullTranslationInput" placeholder="输入整句中文翻译..."></textarea>
    <textarea id="grammarInput" placeholder="输入语法解析内容..."></textarea>
    <div style="display:flex; gap:10px;">
      <button style="background:#10b981;" onclick="saveToBank()">加入本地列表</button>
      <button id="syncBtn" style="background:#2563eb;" onclick="syncToSupabase()">🚀 同步到云端题库</button>
      <button class="danger" onclick="clearBank()">清空列表</button>
    </div>
  </div>

  <div class="card">
    <label>JSON 预览 (待同步题目: <span id="qCount">0</span>)</label>
    <div id="jsonOutput" class="output">[]</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vbxjqgbwrlxlpafdiogj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieGpxZ2J3cmx4bHBhZmRpb2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTM5MTksImV4cCI6MjA5NDU4OTkxOX0.SVlWH2Pd5dlfO9jo39t6HmZYNKvU_14zO4Hzx-NcRUw';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let tokens = [], selectedIndices = [], parts = [], questionBank = [];

window.onload = () => {
  const saved = localStorage.getItem('sentenceBuilderBank');
  if (saved) { questionBank = JSON.parse(saved); updateUI(); }
};

function generateTokens() {
  const s = document.getElementById('sentenceInput').value.trim();
  const regex = /([A-Za-z0-9]+(?:[-'][A-Za-z0-9]+)*|[.,!?;:()—-])|(\s+)/g;
  tokens = []; let match;
  while((match = regex.exec(s)) !== null) {
    if(match[1]) tokens.push({ text:match[1], isWord:true, index:tokens.length });
    else if(match[2]) tokens.push({ text:match[2], isWord:false, index:tokens.length });
  }
  renderTokens();
}

function renderTokens() {
  const box = document.getElementById('tokenBox');
  box.innerHTML = tokens.map((t, i) => t.isWord ? 
    `<span class="token word ${selectedIndices.includes(i)?'selected':''}" onclick="toggle(${i})">${t.text}</span>` : t.text).join('');
}

function toggle(i) {
  const p = selectedIndices.indexOf(i);
  if(p >= 0) selectedIndices.splice(p,1); else selectedIndices.push(i);
  renderTokens();
}

function addPart() {
  if(selectedIndices.length === 0) return;
  const title = prompt("成分名称 (如: 主语)");
  const trans = prompt("该成分翻译");
  if(!title) return;
  parts.push({ title, indices: [...selectedIndices].sort((a,b)=>a-b), translation: trans || "" });
  selectedIndices = []; renderTokens(); renderParts();
}

function renderParts() {
  document.getElementById('partsContainer').innerHTML = parts.map((p, i) => 
    `<div class="part-item"><span><b>${p.title}</b>: ${p.indices.join(',')}</span><button class="danger" onclick="parts.splice(${i},1);renderParts()">删除</button></div>`).join('');
}

function saveToBank() {
  const q = {
    id: Date.now(),
    sentence: document.getElementById('sentenceInput').value,
    full_translation: document.getElementById('fullTranslationInput').value,
    grammar: document.getElementById('grammarInput').value,
    tasks: parts
  };
  questionBank.push(q);
  localStorage.setItem('sentenceBuilderBank', JSON.stringify(questionBank));
  parts = []; renderParts(); updateUI();
  alert("已存入本地列表");
}

function updateUI() {
  document.getElementById('qCount').textContent = questionBank.length;
  document.getElementById('jsonOutput').textContent = JSON.stringify(questionBank, null, 2);
}

async function syncToSupabase() {
  if(!questionBank.length) return;
  const btn = document.getElementById('syncBtn');
  btn.textContent = "⏳ 同步中...";
  const { error } = await supabaseClient.from('questions').upsert(questionBank);
  if(error) alert("失败: " + error.message);
  else alert("🚀 同步成功！");
  btn.textContent = "🚀 同步到云端题库";
}

function clearBank() { if(confirm("清空？")) { questionBank = []; updateUI(); localStorage.removeItem('sentenceBuilderBank'); } }
</script>
</body>
</html>
