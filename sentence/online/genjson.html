<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>题库系统管理后台 (完整版)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --primary: #2563eb; --accent: #8b5cf6; --bg: #f8fafc; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: system-ui; background: var(--bg); color: #1e293b; padding: 20px; }
  .container { max-width: 900px; margin: auto; }
  .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
  h2 { margin-bottom: 16px; color: #0f172a; display: flex; align-items: center; gap: 8px; }
  label { display: block; font-weight: 600; margin: 15px 0 8px; font-size: 14px; }
  textarea, input { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; font-size: 15px; transition: border 0.2s; }
  textarea:focus, input:focus { outline: none; border-color: var(--primary); }
  .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  button { border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-ai { background: linear-gradient(135deg, #8b5cf6, #d946ef); color: white; }
  .btn-outline { background: white; border: 1px solid #e2e8f0; color: #475569; }
  .btn-danger { background: #ef4444; color: white; }
  button:hover { opacity: 0.9; transform: translateY(-1px); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .token-box { background: #f1f5f9; border-radius: 12px; padding: 15px; min-height: 50px; line-height: 2.2; }
  .token { display: inline-block; padding: 2px 8px; border-radius: 6px; cursor: pointer; background: white; border: 1px solid #e2e8f0; margin-right: 4px; user-select: none;  -webkit-user-select: none; /* 禁用系统长按选词 */  touch-action: none;        /* 关键：禁用浏览器触摸默认行为 */ }
  .token.selected { background: #fde047; border-color: #ca8a04; font-weight: bold; }
  #authStatus { font-size: 13px; color: #64748b; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
  .part-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>
<div class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h1>👑 题库系统管理后台</h1>
    <div id="authStatus">检查权限中...</div>
  </div>

  <div id="loginPanel" class="card" style="display:none; text-align:center;">
    <h3>请以管理员身份登录</h3>
    <p style="margin:10px 0; color:#64748b;">仅限管理员邮箱操作</p>
    <button class="btn-primary" onclick="login()">立即登录</button>
  </div>

  <div id="mainEditor" style="display:none;">
    <div class="card" style="background:#eff6ff; border:1px solid #bfdbfe;">
      <h2>⚙️ API 配置</h2>
      <label>Cloudflare Worker URL</label>
      <input type="text" id="cfUrl" placeholder="https://your-worker-name.workers.dev" />
    </div>

    <div class="card">
      <h2>✍️ 题目编辑器</h2>
      <label>1. 英文原句</label>
      <textarea id="sInput" placeholder="输入英文句子..."></textarea>
      
      <label>2. 全句中文翻译</label>
      <input type="text" id="tInput" placeholder="输入全句中文翻译...">

      <label>3. 语法深度解析 (AI 赋能)</label>
      <button class="btn-ai" id="aiBtn" onclick="generateAI()">✨ AI 自动生成解析</button>
      <textarea id="gInput" rows="5" placeholder="AI 解析结果将出现在这里..." style="margin-top:10px;"></textarea>

      <div class="btn-group">
        <button class="btn-primary" onclick="makeTokens()">第一步：生成词块</button>
        <button class="btn-outline" onclick="addPart()">第二步：划定选中部分</button>
        <button class="btn-primary" style="background:#10b981;" onclick="saveToCloud()">💾 第三步：同步到云端</button>
        <button class="btn-outline" onclick="resetForm()">重置清空</button>
      </div>
    </div>

    <div class="card">
      <label>点击词块进行划分 (支持 Shift 键连选):</label>
      <div id="tBox" class="token-box"></div>
      <label style="margin-top:15px;">已划定的句子成分:</label>
      <div id="pBox"></div>
    </div>

    <div class="card">
      <h2>☁️ 云端题库状态</h2>
      <table id="qTable">
        <thead><tr><th>ID</th><th>句子预览</th><th>操作</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ================= 请填入你的 Supabase 信息 =================
const SB_URL = "https://vbxjqgbwrlxlpafdiogj.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieGpxZ2J3cmx4bHBhZmRpb2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTM5MTksImV4cCI6MjA5NDU4OTkxOX0.SVlWH2Pd5dlfO9jo39t6HmZYNKvU_14zO4Hzx-NcRUw";
// ==========================================================

const sb = supabase.createClient(SB_URL, SB_KEY);
const ADMIN_EMAIL = "3100925625@qq.com";

let user = null, curId = null, tokens = [], selected = [], parts = [], lastIdx = -1, isDragging = false,let dragMode = 'add';

// 1. 权限控制
async function checkUser() {
  const { data } = await sb.auth.getUser();
  if (data.user && data.user.email === ADMIN_EMAIL) {
    user = data.user;
    document.getElementById('authStatus').innerHTML = `✅ 已登录: ${user.email} <button onclick="logout()" style="margin-left:10px; padding:4px 8px; font-size:12px;">退出</button>`;
    document.getElementById('mainEditor').style.display = 'block';
    document.getElementById('loginPanel').style.display = 'none';
    
    // 恢复上次填写的 Worker URL
    const savedUrl = localStorage.getItem('cfWorkerUrl');
    if(savedUrl) document.getElementById('cfUrl').value = savedUrl;
    
    loadList();
  } else {
    document.getElementById('mainEditor').style.display = 'none';
    document.getElementById('loginPanel').style.display = 'block';
    document.getElementById('authStatus').innerText = "未授权";
  }
}

async function login() {
  const email = prompt("请输入管理员邮箱:"), password = prompt("请输入密码:");
  if(email !== ADMIN_EMAIL) return alert("账号错误，拒绝访问");
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error) alert("登录失败: " + error.message);
  else location.reload();
}
async function logout() { await sb.auth.signOut(); location.reload(); }

// 2. AI 调用逻辑
async function generateAI() {
  let url = document.getElementById('cfUrl').value.trim();
  const s = document.getElementById('sInput').value.trim();
  const t = document.getElementById('tInput').value.trim();
  
  if(!url || !s) return alert("请填写 Worker URL 和英文句子");
  
  localStorage.setItem('cfWorkerUrl', url); // 记住配置
  if(!url.startsWith('http')) url = 'https://' + url;
  url = url.replace(/\/$/, ""); 

  const btn = document.getElementById('aiBtn');
  btn.disabled = true; btn.innerText = "⏳ 正在连接 AI...";

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: `你是一位深耕中国教育系统的英语专家。请严格遵守以下指令：
           1. 针对句子 \"${s}\" (翻译: \"${t}\") 进行深度解析。
           2. 【强制要求】：解析的所有具体内容（包括对语法点、词汇和结构的描述）必须全部使用中文。
           3. 【严禁】：禁止在解释说明中使用英文，除非是引用原句中的单词。
           4. 格式要求：
              - ### 1. 语法要点 (用中文详细解释时态、从句等)
              - ### 2. 核心词汇 (中文解释单词含义及用法)
              - ### 3. 结构拆解 (中文说明主谓宾等成分)`, adminEmail: ADMIN_EMAIL })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('gInput').value = data.response || "生成失败";
  } catch (err) {
    alert("AI 调用失败: " + err.message);
  } finally {
    btn.disabled = false; btn.innerText = "✨ AI 自动生成解析";
  }
}

// 3. 词块划分与编辑 (恢复 Shift 连选和修改功能)
function makeTokens() {
  const s = document.getElementById('sInput').value;
  tokens = s.match(/([A-Za-z0-9]+(?:[-'][A-Za-z0-9]+)*|[.,!?;:()—-])|(\s+)/g).map(t => ({t, isW:/[a-zA-Z0-9]/.test(t)}));
  selected = []; lastIdx = -1; renderTokens();
}

 // 约第 142 行替换为以下代码
function renderTokens() {
  document.getElementById('tBox').innerHTML = tokens.map((t, i) => 
    t.isW ? `<span class="token ${selected.includes(i)?'selected':''}" 
                   id="tk-${i}"
                   onpointerdown="pDown(${i}, event)" 
                   onpointerenter="pEnter(${i})" 
                   onpointerup="pUp()">${t.t}</span>` : t.t
  ).join('');
}

  // 替换原有的 tgl 函数
function pDown(i, event) {
  isDragging = true;
  // 处理 Shift 连选逻辑
  if (event.shiftKey && lastIdx !== -1) {
    let start = Math.min(i, lastIdx), end = Math.max(i, lastIdx);
    for (let j = start; j <= end; j++) {
      if (tokens[j].isW && !selected.includes(j)) selected.push(j);
    }
  } else {
    // 普通点击：切换选中状态
    if (selected.includes(i)) {
      selected.splice(selected.indexOf(i), 1);
    } else {
      selected.push(i);
    }
  }
  lastIdx = i;
  renderTokens();
  // 阻止默认事件，防止移动端触发长按菜单
  if(event.pointerType === 'touch') event.target.releasePointerCapture(event.pointerId);
}

function pEnter(i) {
  // 如果正在滑动划过，则直接添加为选中（ additive selection ）
  if (isDragging) {
    if (tokens[i].isW && !selected.includes(i)) {
      selected.push(i);
      renderTokens();
    }
  }
}

function pUp() {
  isDragging = false;
}

// 增加全局抬起监听，防止手指划出区域后状态卡死
window.addEventListener('pointerup', () => { isDragging = false; });




function pEnter(i) {
  // 如果正在滑动划过，则直接添加为选中（ additive selection ）
  if (isDragging) {
    if (tokens[i].isW && !selected.includes(i)) {
      selected.push(i);
      renderTokens();
    }
  }
}

function pUp() {
  isDragging = false;
}

// 增加全局抬起监听，防止手指划出区域后状态卡死
window.addEventListener('pointerup', () => { isDragging = false; });

function addPart() {
  const title = prompt("该成分名称 (如: 主语):"), trans = prompt("该部分对应的中文:");
  if(!title) return;
  const s = [...selected].sort((a,b)=>a-b);
  parts.push({ title, translation: trans, indices: s, text: s.map(i=>tokens[i].t).join(' ') });
  selected = []; lastIdx = -1; renderTokens(); renderParts();
}

// 恢复：编辑已存在的成分
window.editPart = (idx) => {
  const p = parts[idx];
  const newTitle = prompt("修改成分名称:", p.title);
  if(newTitle !== null) p.title = newTitle;
  const newTrans = prompt("修改对应的中文:", p.translation);
  if(newTrans !== null) p.translation = newTrans;
  renderParts();
}

window.deletePart = (idx) => { parts.splice(idx, 1); renderParts(); }

function renderParts() {
  document.getElementById('pBox').innerHTML = parts.map((p,i)=>`
    <div class="part-item">
      <div>✅ <b>${p.title}</b>: ${p.text} <br><span style="color:#64748b;font-size:13px;">译: ${p.translation}</span></div>
      <div>
        <button class="btn-outline" style="padding:4px 8px; font-size:12px;" onclick="editPart(${i})">编辑</button>
        <button class="btn-danger" style="padding:4px 8px; font-size:12px;" onclick="deletePart(${i})">删除</button>
      </div>
    </div>`).join('');
}

// 4. 云端操作 (恢复删除题目功能)
async function saveToCloud() {
  const data = {
    id: curId || Date.now(),
    sentence: document.getElementById('sInput').value,
    full_translation: document.getElementById('tInput').value,
    grammar: document.getElementById('gInput').value,
    tasks: parts
  };
  const { error } = await sb.from('questions').upsert(data);
  if(error) alert("保存错误: " + error.message);
  else { alert("🎉 已同步到云端！"); resetForm(); loadList(); }
}

async function loadList() {
  const { data } = await sb.from('questions').select('id, sentence').order('created_at', {ascending:false});
  document.querySelector('#qTable tbody').innerHTML = data.map(q => `
    <tr>
      <td>${q.id}</td><td>${q.sentence.slice(0,30)}...</td>
      <td>
        <button class="btn-outline" style="padding:6px 10px;" onclick='loadQuestion(${q.id})'>编辑</button>
        <button class="btn-danger" style="padding:6px 10px;" onclick='delQuestion(${q.id})'>删除</button>
      </td>
    </tr>`).join('');
}

window.loadQuestion = async (id) => {
  const { data: q } = await sb.from('questions').select('*').eq('id', id).single();
  curId = q.id; document.getElementById('sInput').value = q.sentence; document.getElementById('tInput').value = q.full_translation;
  document.getElementById('gInput').value = q.grammar; parts = q.tasks; makeTokens(); renderParts();
};

window.delQuestion = async (id) => {
  if(!confirm("确定要删除这道题吗？")) return;
  await sb.from('questions').delete().eq('id', id);
  loadList();
}

function resetForm() { curId=null; document.getElementById('sInput').value=''; document.getElementById('tInput').value=''; document.getElementById('gInput').value=''; parts=[]; document.getElementById('tBox').innerHTML=''; renderParts(); }

window.onload = checkUser;
</script>
</body>
</html>
