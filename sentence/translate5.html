<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0">
<title>句子结构划分与翻译 - 优化版</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#f3f6fb; padding:20px; display:flex; justify-content:center;
}
.app{
  width:100%; max-width:850px; background:#fff; border-radius:24px;
  padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.08);
}
h1{ font-size:26px; margin-bottom:16px; color:#16345f; text-align: center; }
.card{ background:#f8fbff; border-radius:20px; padding:20px; margin-bottom:20px; }
.list-item{
  background:white; border:1px solid #d9e3f2; border-radius:16px;
  padding:18px; margin-bottom:14px; cursor:pointer; transition:.2s;
}
.list-item:hover{ border-color:#2563eb; background:#f8fbff; }
.sentence-box{
  background:white; border-left:5px solid #2563eb; border-radius:14px;
  padding:18px; line-height:2.6; font-size:20px; color:#0f2744; margin:16px 0;
  touch-action: pan-y; /* 允许纵向滚动，防止误触 */
}
.token{ display:inline-block; padding:2px 6px; border-radius:6px; margin: 0 1px; transition: .1s; }
.word{ cursor:pointer; background: rgba(37,99,235,0.04); }
.selected{ background:#ffd966; border-bottom:2px solid #d97706; }
.correct-highlight{ background:#bbf7d0; border-bottom:2px solid #059669; }
.feedback{ margin-top:12px; min-height:24px; font-weight:700; color:#2563eb; }
.controls{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:18px; }
button{
  border:none; border-radius:12px; padding:14px;
  background:#1f3f72; color:white; font-weight:700; cursor:pointer;
  transition:.2s; font-size:15px; width:100%;
}
button:disabled{ background:#94a3b8; cursor:not-allowed; }
button.secondary{ background:white; color:#1f3f72; border:2px solid #1f3f72; }
textarea{
  width:100%; min-height:100px; border:1px solid #cfd9ea;
  border-radius:14px; padding:14px; font-size:16px; margin-top:8px;
}
.detail-table { width:100%; border-collapse:collapse; margin-top:16px; font-size:14px; display: block; overflow-x: auto; }
.detail-table th, .detail-table td { border:1px solid #e2e8f0; padding:10px; text-align:left; min-width: 80px; }
.detail-table th { background:#f1f5f9; }
.pass{ color:#10b981; } .fail{ color:#ef4444; }

.mode-switch {
  display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
  padding: 12px; background: #f1f5f9; border-radius: 12px; font-size: 14px;
}

@media(max-width:640px){
  body{ padding:10px; }
  .sentence-box{ font-size:18px; line-height: 2.8; }
}
</style>
</head>
<body>
<div class="app">
  <h1>📘 句子结构划分与翻译</h1>
  <div class="mode-switch">
    <input type="checkbox" id="modeToggle">
    <label for="modeToggle" id="modeLabel">🧠 AI 语义评分（更精准，首次需下载模型）</label>
  </div>
  <div id="mainView">
    <div style="text-align:center; padding:40px; color:#64748b;">数据加载中...</div>
  </div>
  <div style="text-align: center; margin-top: 15px;">
    <button style="width:auto; padding:8px 16px; font-size:12px;" class="secondary" onclick="clearAICache()">清理 AI 缓存</button>
  </div>
</div>

<script type="module">
// ========== Web Worker 代码 (优化跨域与环境隔离) ==========
const workerBlobCode = `
import { pipeline, env } from 'https://esm.sh/@xenova/transformers@2.17.2';

let embedder = null;
env.allowLocalModels = false;
env.useBrowserCache = true;

self.onmessage = async (e) => {
  const { type, textA, textB } = e.data;
  
  if (type === 'init') {
    try {
      // 默认使用 HuggingFace 源，如果国内访问慢，建议在宿主环境提示用户开启加速
      embedder = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', {
        progress_callback: (p) => {
          if (p.status === 'progress') self.postMessage({ type: 'progress', progress: p.progress });
        }
      });
      self.postMessage({ type: 'done' });
    } catch (err) {
      self.postMessage({ type: 'error', error: err.message });
    }
  }

  if (type === 'compare') {
    if (!embedder) return self.postMessage({ type: 'res', similarity: 0 });
    try {
      const [embA, embB] = await Promise.all([
        embedder(textA, { pooling: 'mean', normalize: true }),
        embedder(textB, { pooling: 'mean', normalize: true })
      ]);
      let dot = 0;
      for (let i = 0; i < embA.data.length; i++) { dot += embA.data[i] * embB.data[i]; }
      self.postMessage({ type: 'res', similarity: dot });
    } catch (err) {
      self.postMessage({ type: 'res', similarity: 0 });
    }
  }
};
`;

// ========== 全局变量与逻辑 ==========
let questions = [];
let currentIndex = -1;
let currentTaskIndex = 0;
let selectedTokens = [];
let divideResults = [];
let divideWrongCounts = [];
let partsUserInput = [];
let partsDetail = [];
let fullUserInput = '';

let aiWorker = null;
let workerCallbacks = {};
let currentTokens = [];

// 初始化数据
async function initApp() {
  // 模拟数据加载，实际应用中可以 fetch('./questions.json')
  questions = [
    {
      "id": 1,
      "sentence": "The United Nations, in its first Digital Economy Report, states the US and China are leading the digital economy.",
      "tasks": [
        { "title": "主语", "indices": [2,4], "translation": "联合国" },
        { "title": "谓语", "indices": [20], "translation": "指出" },
        { "title": "宾从主语", "indices": [24,26,28], "translation": "美国和中国" },
        { "title": "宾从谓语", "indices": [30,32], "translation": "正在引领" },
        { "title": "宾从宾语", "indices": [36,38], "translation": "数字经济" },
        { "title": "插入语", "indices": [7,9,11,13,15,17], "translation": "在其首份《数字经济报告》中" }
      ],
      "fullTranslation": "联合国在其首份《数字经济报告》中指出，美国和中国正在引领数字经济。"
    }
  ];
  renderQuestionList();
}

// 编辑距离计算 (用于语序匹配)
function levenshteinRatio(a, b) {
  const matrix = Array(b.length + 1).fill(null).map(() => Array(a.length + 1).fill(null));
  for (let i = 0; i <= a.length; i++) matrix[0][i] = i;
  for (let j = 0; j <= b.length; j++) matrix[j][0] = j;
  for (let j = 1; j <= b.length; j++) {
    for (let i = 1; i <= a.length; i++) {
      const sub = a[i - 1] === b[j - 1] ? 0 : 1;
      matrix[j][i] = Math.min(matrix[j][i-1]+1, matrix[j-1][i]+1, matrix[j-1][i-1]+sub);
    }
  }
  return 1 - (matrix[b.length][a.length] / Math.max(a.length, b.length));
}

// 综合评分逻辑
async function getSimilarity(a, b) {
  const cleanA = a.replace(/[，。！？、“”‘’：；\s]/g,'');
  const cleanB = b.replace(/[，。！？、“”‘’：；\s]/g,'');
  if (cleanA === cleanB) return 1.0;

  const seqSim = levenshteinRatio(cleanA, cleanB);
  
  if (!aiWorker || !document.getElementById('modeToggle').checked) {
    return seqSim;
  }

  return new Promise((resolve) => {
    workerCallbacks.compare = (semanticSim) => {
      const avgLen = (cleanA.length + cleanB.length) / 2;
      // 动态权重：短语更依赖语义，长句兼顾字符匹配
      const weight = avgLen < 5 ? 0.9 : 0.7;
      const final = (semanticSim * weight) + (seqSim * (1 - weight));
      console.log(`[Score] ${cleanA} vs ${cleanB} | Semantic: ${semanticSim.toFixed(2)} | Final: ${final.toFixed(2)}`);
      resolve(final);
    };
    aiWorker.postMessage({ type: 'compare', textA: a, textB: b });
  });
}

// Worker 初始化
function initWorker() {
  if (aiWorker) return;
  const blob = new Blob([workerBlobCode], { type: 'text/javascript' });
  aiWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });
  
  aiWorker.onmessage = (e) => {
    const label = document.getElementById('modeLabel');
    if (e.data.type === 'progress') {
      label.textContent = `⏳ 模型下载中... ${Math.floor(e.data.progress)}%`;
    } else if (e.data.type === 'done') {
      label.textContent = '🧠 AI 评分已就绪';
      workerCallbacks.init?.(true);
    } else if (e.data.type === 'res') {
      workerCallbacks.compare?.(e.data.similarity);
    } else if (e.data.type === 'error') {
      label.textContent = '❌ 加载失败 (请检查网络)';
      workerCallbacks.init?.(false);
    }
  };
}

document.getElementById('modeToggle').addEventListener('change', async (e) => {
  if (e.target.checked) {
    initWorker();
    aiWorker.postMessage({ type: 'init' });
  } else {
    document.getElementById('modeLabel').textContent = '🧠 AI 语义评分';
  }
});

// UI 渲染逻辑 (列表、划分、翻译等)
function renderQuestionList() {
  let html = '<h1>📘 选择练习题目</h1>';
  questions.forEach((q, i) => {
    html += `
      <div class="list-item" onclick="startQuestion(${i})">
        <div style="font-weight:700; color:#16345f;">${q.sentence}</div>
        <div style="font-size:13px; color:#64748b; margin-top:5px;">共 ${q.tasks.length} 个分析任务</div>
      </div>`;
  });
  document.getElementById('mainView').innerHTML = html;
}

window.startQuestion = (index) => {
  currentIndex = index;
  currentTaskIndex = 0;
  selectedTokens = [];
  divideResults = new Array(questions[index].tasks.length).fill(null);
  divideWrongCounts = new Array(questions[index].tasks.length).fill(0);
  partsUserInput = new Array(questions[index].tasks.length).fill('');
  currentTokens = tokenize(questions[index].sentence);
  renderDivide();
};

function tokenize(s) {
  const regex = /([A-Za-z0-9\-']+)|([.,!?;:()—-])|(\s+)/g;
  let m, res = [];
  while ((m = regex.exec(s)) !== null) {
    if (m[1]) res.push({ text: m[1], isWord: true, index: res.length });
    else if (m[2]) res.push({ text: m[2], isWord: true, index: res.length });
    else if (m[3]) res.push({ text: m[3], isWord: false, index: res.length });
  }
  return res;
}

function renderDivide() {
  const q = questions[currentIndex];
  const task = q.tasks[currentTaskIndex];
  const showCorrect = divideWrongCounts[currentTaskIndex] >= 3;

  let html = `
    <div class="card">
      <div style="font-weight:700; margin-bottom:10px;">请选出：<span style="color:#2563eb;font-size:20px;">${task.title}</span></div>
      <div class="sentence-box">`;
  
  currentTokens.forEach((tok, idx) => {
    if (tok.isWord) {
      let cls = 'token word';
      if (selectedTokens.includes(idx)) cls += ' selected';
      if (showCorrect && task.indices.includes(idx)) cls += ' correct-highlight';
      html += `<span class="${cls}" onclick="toggleToken(${idx})">${tok.text}</span>`;
    } else {
      html += tok.text;
    }
  });

  html += `</div>
      <div class="controls">
        <button class="secondary" onclick="selectedTokens=[] || renderDivide()">清空</button>
        <button onclick="submitDivide()">提交划分</button>
      </div>
    </div>`;
  document.getElementById('mainView').innerHTML = html;
}

window.toggleToken = (idx) => {
  const i = selectedTokens.indexOf(idx);
  if (i > -1) selectedTokens.splice(i, 1);
  else selectedTokens.push(idx);
  renderDivide();
};

window.submitDivide = () => {
  const task = questions[currentIndex].tasks[currentTaskIndex];
  const isOk = JSON.stringify(selectedTokens.sort()) === JSON.stringify([...task.indices].sort());
  
  if (isOk) {
    divideResults[currentTaskIndex] = true;
    currentTaskIndex++;
    selectedTokens = [];
    if (currentTaskIndex >= questions[currentIndex].tasks.length) renderParts();
    else renderDivide();
  } else {
    divideWrongCounts[currentTaskIndex]++;
    if (divideWrongCounts[currentTaskIndex] >= 3) {
      divideResults[currentTaskIndex] = false;
      renderDivide();
      setTimeout(() => {
        currentTaskIndex++;
        selectedTokens = [];
        if (currentTaskIndex >= questions[currentIndex].tasks.length) renderParts();
        else renderDivide();
      }, 2000);
    } else {
      alert(`划分错误，还剩 ${3 - divideWrongCounts[currentTaskIndex]} 次机会`);
    }
  }
};

function renderParts() {
  let html = '<div class="card"><h3>🔤 成分翻译</h3>';
  questions[currentIndex].tasks.forEach((t, i) => {
    const eng = t.indices.map(idx => currentTokens[idx].text).join(' ');
    html += `
      <div style="margin:15px 0;">
        <div style="font-size:12px; color:#64748b;">${t.title}: ${eng}</div>
        <textarea id="part-${i}" placeholder="输入中文翻译">${partsUserInput[i]}</textarea>
      </div>`;
  });
  html += `<button onclick="submitParts()">下一步</button></div>`;
  document.getElementById('mainView').innerHTML = html;
}

window.submitParts = async () => {
  const btn = document.querySelector('button');
  btn.disabled = true;
  btn.textContent = '评分中...';
  
  partsDetail = [];
  for (let i = 0; i < questions[currentIndex].tasks.length; i++) {
    const val = document.getElementById(`part-${i}`).value;
    partsUserInput[i] = val;
    const sim = await getSimilarity(val, questions[currentIndex].tasks[i].translation);
    partsDetail.push(sim >= 0.65);
  }
  renderFull();
};

function renderFull() {
  let html = `
    <div class="card">
      <h3>📝 整句翻译</h3>
      <div style="margin:10px 0; font-style:italic;">${questions[currentIndex].sentence}</div>
      <textarea id="fullInput" placeholder="请输入整句中文翻译">${fullUserInput}</textarea>
      <button onclick="submitFull()">查看最终报告</button>
    </div>`;
  document.getElementById('mainView').innerHTML = html;
}

window.submitFull = async () => {
  const input = document.getElementById('fullInput').value;
  const btn = document.querySelector('button');
  btn.disabled = true;
  btn.textContent = '生成报告中...';

  const sim = await getSimilarity(input, questions[currentIndex].fullTranslation);
  const score = Math.round(sim * 100);
  
  let table = '<table class="detail-table"><tr><th>成分</th><th>划分</th><th>翻译匹配</th></tr>';
  questions[currentIndex].tasks.forEach((t, i) => {
    table += `<tr><td>${t.title}</td><td class="${divideResults[i]?'pass':'fail'}">${divideResults[i]?'✅':'❌'}</td><td class="${partsDetail[i]?'pass':'fail'}">${partsDetail[i]?'✅':'❌'}</td></tr>`;
  });
  table += '</table>';

  document.getElementById('mainView').innerHTML = `
    <div class="card">
      <h2 style="text-align:center; color:#1f3f72;">得分: ${score}</h2>
      <div style="margin:15px 0;">${table}</div>
      <div style="font-size:14px; background:#fff; padding:10px; border-radius:10px;">
        <strong>标准答案：</strong><br>${questions[currentIndex].fullTranslation}
      </div>
      <div class="controls">
        <button onclick="location.reload()">重新练习</button>
        <button class="secondary" onclick="renderQuestionList()">返回题库</button>
      </div>
    </div>`;
};

window.clearAICache = async () => {
  if ('caches' in window) {
    const keys = await caches.keys();
    for (let key of keys) await caches.delete(key);
    alert('已清理模型缓存');
    location.reload();
  }
};

initApp();
</script>
</body>
</html>
