<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>英语长难句结构专家 - 最终全量版</title>
<style>
/* 继承 translate6.html 的所有 UI 样式 */
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#f3f6fb; padding:20px; display:flex; justify-content:center;
}
.app{
  width:100%; max-width:850px; background:#fff; border-radius:24px;
  padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.08);
}
h1{ font-size:28px; margin-bottom:16px; color:#16345f; text-align:center;}
.card{ background:#f8fbff; border-radius:20px; padding:24px; margin-bottom:20px; position: relative;}

/* AI 状态栏样式 */
.ai-status-bar {
  background: #f1f5f9; border-radius: 16px; padding: 12px 18px;
  margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
}
.status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
.status-dot.active { background: #10b981; box-shadow: 0 0 8px #10b981; }

.list-item{
  background:white; border:1px solid #d9e3f2; border-radius:16px;
  padding:18px; margin-bottom:14px; cursor:pointer; transition:.2s;
  display: flex; justify-content: space-between; align-items: center;
}
.list-item:hover{ border-color:#2563eb; background:#f8fbff; }
.sentence-box{
  background:white; border-left:5px solid #2563eb; border-radius:14px;
  padding:18px; line-height:2.4; font-size:20px; color:#0f2744; margin:16px 0;
  touch-action: pan-y pinch-zoom; 
}
.word { 
  display:inline-block; cursor:pointer; transition:.15s; 
  padding:4px 8px; border-radius:6px; margin: 2px 1px;
}
.selected{ background:#ffd966; border-bottom:3px solid #d97706; }
.correct-highlight{ background:#bbf7d0; border-bottom:3px solid #059669; }

/* 语法解析框 */
.insight-box {
  background: #fffbeb; border-left: 4px solid #f59e0b; padding: 15px;
  border-radius: 8px; margin: 15px 0; display: none; font-size: 14px;
}

button{
  border:none; border-radius:999px; padding:12px 24px;
  background:#1f3f72; color:white; font-weight:700; cursor:pointer;
  transition:.2s; font-size:15px;
}
button:disabled { background:#94a3b8; }
button.secondary{ background:white; color:#1f3f72; border:2px solid #1f3f72; }

textarea{
  width:100%; min-height:100px; border:1px solid #cfd9ea;
  border-radius:14px; padding:14px; font-size:16px; margin-top:8px;
}
.detail-table{ width:100%; border-collapse:collapse; margin-top:16px; font-size:14px; }
.detail-table th,.detail-table td{ border:1px solid #d1d5db; padding:10px; text-align:left; }
.pass{ color:#10b981; font-weight:bold; }
.fail{ color:#ef4444; font-weight:bold; }

@media(max-width:640px){
  body{ padding:10px; }
  .sentence-box{ font-size:19px; line-height: 2.8; }
  .word { padding: 6px 4px; }
}
</style>
</head>
<body>

<div class="app">
  <h1>📘 高考英语结构专家</h1>
  
  <div class="ai-status-bar">
    <div id="aiDot" class="status-dot"></div>
    <label style="flex:1; font-weight:700;">AI 语义分析模式</label>
    <input type="checkbox" id="modeToggle" style="width:20px; height:20px;">
  </div>

  <div id="mainView">
    <div style="text-align:center; padding:40px;">正在载入题库...</div>
  </div>
</div>

<script type="module">
// --- 1. 完全保留 translate6.html 的 Web Worker 代码（含镜像切换） ---
const workerBlobCode = `
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
let embedder = null;
env.allowLocalModels = false;
const MIRROR_HOSTS = ['https://hf-mirror.com', 'https://huggingface.co'];

self.onmessage = async (e) => {
  const { type, textA, textB } = e.data;
  if (type === 'init') {
    for (const host of MIRROR_HOSTS) {
      try {
        env.remoteHost = host;
        embedder = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2', {
          progress_callback: (p) => { if(p.status === 'progress') self.postMessage({ type: 'progress', progress: p.progress }); }
        });
        self.postMessage({ type: 'done' }); return;
      } catch (err) {}
    }
    self.postMessage({ type: 'error' });
  }
  if (type === 'compare') {
    const [embA, embB] = await Promise.all([
      embedder(textA, { pooling: 'mean', normalize: true }),
      embedder(textB, { pooling: 'mean', normalize: true }),
    ]);
    let dot = 0;
    for (let i = 0; i < embA.data.length; i++) dot += embA.data[i] * embB.data[i];
    self.postMessage({ type: 'res', similarity: dot });
  }
};`;

// --- 2. 状态管理 (加入历史进度) ---
const AppState = {
  questions: [],
  currentIndex: -1,
  currentTaskIndex: 0,
  selectedTokens: [],
  divideResults: [],
  divideWrongCounts: [],
  partsUserInput: [],
  partsDetail: [],
  fullUserInput: '',
  currentTokens: [],
  history: JSON.parse(localStorage.getItem('eng_expert_progress') || '{}'),
  aiWorker: null,
  isAIReady: false,
  aiCallback: null
};

// --- 3. 核心工具 (包含你原本的 Levenshtein 性能优化版) ---
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function tokenize(sentence){
  const regex = /([A-Za-z]+(?:[-'][A-Za-z]+)*|\d+|[.,!?;:()—-])|(\s+)/g;
  const tokens = [];
  let match;
  while((match = regex.exec(sentence)) !== null){
    tokens.push({ text: match[1] || match[2], isWord: !!match[1], index: tokens.length });
  }
  return tokens;
}

// 保留你原本的高性能 Levenshtein
function levenshteinRatio(a, b) {
  if (!a || !b) return 0;
  if (a === b) return 1;
  if (a.length < b.length) [a, b] = [b, a];
  let prevRow = Array.from({ length: b.length + 1 }, (_, i) => i);
  let currRow = new Array(b.length + 1).fill(0);
  for (let i = 1; i <= a.length; i++) {
    currRow[0] = i;
    for (let j = 1; j <= b.length; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      currRow[j] = Math.min(currRow[j - 1] + 1, prevRow[j] + 1, prevRow[j - 1] + cost);
    }
    [prevRow, currRow] = [currRow, prevRow];
  }
  return 1 - (prevRow[b.length] / Math.max(a.length, b.length));
}

// --- 4. AI 逻辑 ---
function initAI() {
  if (AppState.aiWorker) return;
  const blob = new Blob([workerBlobCode], { type: 'text/javascript' });
  AppState.aiWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });
  AppState.aiWorker.onmessage = (e) => {
    const dot = document.getElementById('aiDot');
    if (e.data.type === 'done') {
      AppState.isAIReady = true;
      dot.classList.add('active');
    } else if (e.data.type === 'res' && AppState.aiCallback) {
      AppState.aiCallback(e.data.similarity);
    }
  };
  AppState.aiWorker.postMessage({ type: 'init' });
}

async function getSimilarity(a, b) {
  const s1 = a.replace(/[^\u4e00-\u9fa5]/g,''), s2 = b.replace(/[^\u4e00-\u9fa5]/g,'');
  if (!document.getElementById('modeToggle').checked || !AppState.isAIReady) {
    return levenshteinRatio(s1, s2);
  }
  AppState.aiWorker.postMessage({ type: 'compare', textA: a, textB: b });
  return new Promise(res => AppState.aiCallback = res);
}

// --- 5. 完全保留 translate6.html 的滑动选择吸附逻辑 ---
let touchActive = false, touchLastIdx = -1;

function getWordIndexAtPoint(x, y) {
  const el = document.elementFromPoint(x, y);
  if (el && el.closest('.word')) return parseInt(el.closest('.word').dataset.index);
  
  // 吸附逻辑
  let closestIdx = -1, minDist = Infinity;
  document.querySelectorAll('.word').forEach(wordEl => {
    const rect = wordEl.getBoundingClientRect();
    const dist = Math.hypot(x - (rect.left + rect.width/2), y - (rect.top + rect.height/2));
    if (dist < 40 && dist < minDist) { minDist = dist; closestIdx = parseInt(wordEl.dataset.index); }
  });
  return closestIdx;
}

window.handleTouchStart = (e) => {
  const idx = getWordIndexAtPoint(e.touches[0].clientX, e.touches[0].clientY);
  if (idx !== -1) { touchActive = true; touchLastIdx = idx; }
};

window.handleTouchMove = (e) => {
  if (!touchActive) return;
  if (e.cancelable) e.preventDefault(); 
  const idx = getWordIndexAtPoint(e.touches[0].clientX, e.touches[0].clientY);
  if (idx !== -1 && idx !== touchLastIdx) {
    const from = Math.min(touchLastIdx, idx), to = Math.max(touchLastIdx, idx);
    for (let i = from; i <= to; i++) {
      if (AppState.currentTokens[i].isWord && !AppState.selectedTokens.includes(i)) AppState.selectedTokens.push(i);
    }
    touchLastIdx = idx;
    updateSelectionUI();
  }
};

function updateSelectionUI() {
  document.querySelectorAll('.word').forEach(el => {
    el.classList.toggle('selected', AppState.selectedTokens.includes(parseInt(el.dataset.index)));
  });
}

// --- 6. 视图渲染 (包含分项评分表格) ---

window.renderQuestionList = () => {
  let html = `<div class="card"><h2>题库列表</h2>`;
  AppState.questions.forEach((q, i) => {
    const score = AppState.history[q.id || i]?.score;
    html += `
      <div class="list-item" onclick="startQuestion(${i})">
        <div><strong>${escapeHtml(q.sentence)}</strong></div>
        <div style="font-weight:bold; color:#2563eb;">${score ? score+'%' : '未练习'}</div>
      </div>`;
  });
  html += `</div>`;
  document.getElementById('mainView').innerHTML = html;
};

window.startQuestion = (idx) => {
  AppState.currentIndex = idx;
  AppState.currentTaskIndex = 0;
  AppState.selectedTokens = [];
  AppState.divideResults = [];
  AppState.divideWrongCounts = new Array(AppState.questions[idx].tasks.length).fill(0);
  AppState.partsUserInput = [];
  AppState.currentTokens = tokenize(AppState.questions[idx].sentence);
  renderDivide();
};

function renderDivide() {
  const q = AppState.questions[AppState.currentIndex];
  const task = q.tasks[AppState.currentTaskIndex];
  const wrong = AppState.divideWrongCounts[AppState.currentTaskIndex];
  const isDead = wrong >= 3;

  let html = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; color:#666; font-size:13px;">
        <span>任务 ${AppState.currentTaskIndex+1}/${q.tasks.length}</span>
        <span>机会: ${3-wrong}/3</span>
      </div>
      <h3 style="margin:15px 0;">请选出：<span style="color:#2563eb;">${escapeHtml(task.title)}</span></h3>
      <div class="sentence-box" id="sBox">`;

  AppState.currentTokens.forEach((t, i) => {
    if(t.isWord) {
      let cls = 'word';
      if(AppState.selectedTokens.includes(i)) cls += ' selected';
      if(isDead && task.indices.includes(i)) cls += ' correct-highlight';
      html += `<span class="${cls}" data-index="${i}" onclick="toggleWord(${i})">${escapeHtml(t.text)}</span>`;
    } else html += escapeHtml(t.text);
  });

  html += `</div>
      <div id="insight" class="insight-box"><strong>解析：</strong>${escapeHtml(task.explanation || '请注意该成分在句中的功能。')}</div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button id="btnSub" onclick="submitDivide()">提交划分</button>
        <button class="secondary" onclick="AppState.selectedTokens=[];updateSelectionUI();">清空</button>
        <button class="secondary" onclick="renderQuestionList()">退出</button>
      </div>
    </div>`;

  document.getElementById('mainView').innerHTML = html;
  
  // 绑定拦截事件
  const box = document.getElementById('sBox');
  box.addEventListener('touchstart', window.handleTouchStart, {passive:false});
  box.addEventListener('touchmove', window.handleTouchMove, {passive:false});
  box.addEventListener('touchend', () => touchActive = false);
}

window.toggleWord = (idx) => {
  const p = AppState.selectedTokens.indexOf(idx);
  if(p > -1) AppState.selectedTokens.splice(p, 1);
  else AppState.selectedTokens.push(idx);
  updateSelectionUI();
};

window.submitDivide = () => {
  const q = AppState.questions[AppState.currentIndex];
  const task = q.tasks[AppState.currentTaskIndex];
  const isOk = JSON.stringify([...AppState.selectedTokens].sort((a,b)=>a-b)) === JSON.stringify([...task.indices].sort((a,b)=>a-b));

  if (isOk || AppState.divideWrongCounts[AppState.currentTaskIndex] >= 2) {
    AppState.divideResults.push(isOk);
    document.getElementById('btnSub').disabled = true;
    document.getElementById('insight').style.display = 'block';
    speak(task.indices.map(i=>AppState.currentTokens[i].text).join(' ')); // 正确时朗读
    
    setTimeout(() => {
      AppState.currentTaskIndex++;
      AppState.selectedTokens = [];
      if(AppState.currentTaskIndex < q.tasks.length) renderDivide();
      else renderParts();
    }, 1500);
  } else {
    AppState.divideWrongCounts[AppState.currentTaskIndex]++;
    alert('划分不完全正确，再试一次！');
    AppState.selectedTokens = []; updateSelectionUI();
  }
};

function renderParts() {
  const q = AppState.questions[AppState.currentIndex];
  let html = `<div class="card"><h2>成分翻译</h2>`;
  q.tasks.forEach((t, i) => {
    const eng = t.indices.map(idx => AppState.currentTokens[idx].text).join(' ');
    html += `
      <div style="margin-bottom:20px;">
        <div style="font-weight:bold;">${escapeHtml(t.title)} <span style="cursor:pointer" onclick="speak('${escapeHtml(eng)}')">🔊</span></div>
        <div style="color:#2563eb; margin:5px 0;">${escapeHtml(eng)}</div>
        <textarea id="part-${i}" placeholder="输入翻译..."></textarea>
      </div>`;
  });
  html += `<button onclick="submitParts()">提交并进入整句翻译</button></div>`;
  document.getElementById('mainView').innerHTML = html;
}

window.submitParts = () => {
  const q = AppState.questions[AppState.currentIndex];
  for(let i=0; i<q.tasks.length; i++) AppState.partsUserInput.push(document.getElementById(`part-${i}`).value);
  renderFull();
};

function renderFull() {
  const q = AppState.questions[AppState.currentIndex];
  document.getElementById('mainView').innerHTML = `
    <div class="card">
      <h2>整句翻译</h2>
      <div class="sentence-box">${escapeHtml(q.sentence)} <span style="cursor:pointer" onclick="speak('${escapeHtml(q.sentence)}')">🔊</span></div>
      <div style="margin-bottom:10px; font-size:13px; color:#666;">参考词块：${AppState.partsUserInput.join(' / ')}</div>
      <textarea id="fullInput" placeholder="写出连贯的整句翻译..."></textarea>
      <button id="btnFinal" style="margin-top:20px;" onclick="calculateFinal()">查看报告</button>
    </div>`;
}

window.calculateFinal = async () => {
  document.getElementById('btnFinal').disabled = true;
  const q = AppState.questions[AppState.currentIndex];
  const fullUser = document.getElementById('fullInput').value;
  
  // 评分逻辑
  let partPoints = 0;
  AppState.partsDetail = [];
  for(let i=0; i<q.tasks.length; i++) {
    const sim = await getSimilarity(AppState.partsUserInput[i], q.tasks[i].translation);
    const ok = sim > 0.65;
    if(ok) partPoints++;
    AppState.partsDetail.push(ok);
  }
  
  const fullSim = await getSimilarity(fullUser, q.fullTranslation);
  const divideScore = Math.round((AppState.divideResults.filter(r=>r).length/q.tasks.length)*100);
  const partScore = Math.round((partPoints/q.tasks.length)*100);
  const finalScore = Math.round(divideScore*0.3 + partScore*0.3 + fullSim*40);

  // 记录进度
  AppState.history[q.id || AppState.currentIndex] = { score: finalScore };
  localStorage.setItem('eng_expert_progress', JSON.stringify(AppState.history));

  // 渲染结果表
  let tableHtml = `<table class="detail-table"><tr><th>成分</th><th>划分</th><th>翻译</th><th>参考</th></tr>`;
  q.tasks.forEach((t, i) => {
    tableHtml += `<tr><td>${t.title}</td><td class="${AppState.divideResults[i]?'pass':'fail'}">${AppState.divideResults[i]?'✅':'❌'}</td><td>${AppState.partsUserInput[i]}</td><td>${t.translation}</td></tr>`;
  });
  tableHtml += `</table>`;

  document.getElementById('mainView').innerHTML = `
    <div class="card">
      <div style="text-align:center; margin-bottom:20px;">
        <div style="font-size:48px; font-weight:bold; color:#2563eb;">${finalScore}%</div>
      </div>
      <div style="background:#f1f5f9; padding:15px; border-radius:10px; margin-bottom:15px;">
        <strong>标准答案：</strong><br>${q.fullTranslation}
      </div>
      ${tableHtml}
      <button style="margin-top:20px;" onclick="renderQuestionList()">返回列表</button>
    </div>`;
};

// --- 7. 初始化 ---
fetch('./questions.json').then(r => r.json()).then(data => {
  AppState.questions = data;
  renderQuestionList();
  document.getElementById('modeToggle').addEventListener('change', (e) => { if(e.target.checked) initAI(); });
});
</script>
</body>
</html>
