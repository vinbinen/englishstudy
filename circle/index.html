<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
  <title>句子结构划分与翻译 · 可复盘版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f2f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .app {
      width: 100%;
      max-width: 640px;
      background: #fff;
      border-radius: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      max-height: 90vh;
      overflow-y: auto;
    }
    h1 { font-size: 1.5rem; font-weight: 650; color: #13294b; display: flex; align-items: center; gap: 0.4rem; }
    
    .sentence-list { display: flex; flex-direction: column; gap: 0.6rem; max-height: 60vh; overflow-y: auto; }
    .sentence-item {
      border: 1.5px solid #e2e8f0; border-radius: 1rem; padding: 0.9rem 1rem;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: 0.2s; background: #fff;
    }
    .sentence-item:hover { border-color: #2563eb; background: #f8faff; }
    .sentence-item .text { flex: 1; font-size: 0.95rem; color: #1e293b; font-weight: 500; margin-right: 0.8rem; }
    .sentence-item .progress-tag {
      background: #e7edf8; color: #1d3b6c; padding: 0.25rem 0.8rem;
      border-radius: 2rem; font-weight: 600; font-size: 0.8rem; white-space: nowrap;
    }
    .sentence-item.completed .progress-tag { background: #d1fae5; color: #065f46; }
    
    .practice-area { display: flex; flex-direction: column; gap: 0.8rem; }
    .sentence-display {
      background: #f8faff; border-left: 5px solid #2563eb; padding: 1rem;
      border-radius: 1rem; font-size: 1.05rem; line-height: 1.7; color: #0f2744;
    }
    .task-nav { display: flex; gap: 0.3rem; margin-bottom: 0.5rem; }
    .task-dot {
      width: 28px; height: 28px; border-radius: 50%; background: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 650; color: #475569;
    }
    .task-dot.done { background: #10b981; color: white; }
    .task-dot.current { background: #2563eb; color: white; transform: scale(1.1); }
    .task-dot.locked { opacity: 0.5; }
    .token-box { display: flex; flex-wrap: wrap; gap: 0.2rem; margin: 0.5rem 0; }
    .token {
      border-radius: 6px; padding: 0.15rem 0.3rem; transition: 0.15s;
      cursor: pointer; user-select: none;
    }
    .token.word { cursor: pointer; font-weight: 500; }
    .token.word:hover { background: #e9efff; }
    .token.word.selected { background: #ffd966; border-bottom: 2.5px solid #d97706; font-weight: 600; }
    .token.word.correct-reveal { background: #a7f3d0; border-bottom: 2.5px solid #059669; font-weight: 600; }
    .token.punctuation, .token.space { cursor: default; pointer-events: none; }
    .info-row { display: flex; justify-content: space-between; font-size: 0.9rem; color: #475569; }
    .action-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
    .btn {
      border: 1.5px solid #cdd9f0; background: #f5f8ff; padding: 0.5rem 1.2rem;
      border-radius: 2rem; font-weight: 600; cursor: pointer; color: #1e3b6b; transition: 0.2s;
    }
    .btn:disabled { opacity: 0.45; pointer-events: none; }
    .btn-primary { background: #1e3a6b; border-color: #1e3a6b; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #102a4c; }
    .feedback { font-size: 0.9rem; font-weight: 500; min-height: 1.6rem; }
    
    .translation-list { list-style: none; margin: 0.5rem 0; }
    .translation-item { margin-bottom: 0.8rem; }
    .translation-label { font-weight: 600; color: #1e3b6b; margin-bottom: 0.2rem; }
    .translation-prompt { background: #f5f7fa; padding: 0.4rem; border-radius: 0.5rem; margin-bottom: 0.3rem; font-size: 0.9rem; color: #5f6b7a; }
    .translation-input { width: 100%; padding: 0.5rem; border-radius: 0.8rem; border: 1px solid #cfddee; font-size: 0.95rem; resize: vertical; font-family: inherit; }
    .translation-input:focus { border-color: #2563eb; outline: none; }
    .snippet-list { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.5rem; }
    .snippet { background: #e8f0fe; padding: 0.2rem 0.5rem; border-radius: 999px; cursor: pointer; font-size: 0.85rem; }
    
    .result-card { background: #f3f7ff; border-radius: 1.5rem; padding: 1.8rem; text-align: center; max-height: 80vh; overflow-y: auto; }
    .detail-table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.85rem; table-layout: fixed; }
    .detail-table td, .detail-table th { padding: 0.4rem; border-bottom: 1px solid #e2e8f0; text-align: left; word-break: break-word; }
    .detail-table th { color: #1e3b6b; font-weight: 600; }
    .pass { color: #10b981; } .fail { color: #ef4444; }
    .hidden { display: none; }
    .sentence-block { margin-bottom: 1.5rem; background: #fff; border-radius: 1rem; padding: 1rem; text-align: left; }
    .sentence-block h3 { margin-bottom: 0.5rem; color: #0f2744; }
  </style>
</head>
<body>
<div class="app" id="app">
  <h1>📘 句子结构划分与翻译</h1>
  <div id="viewContainer"></div>
  <div id="finalResult" class="result-card hidden">
    <h2>🎯 全部完成</h2>
    <p style="font-size:1.5rem;font-weight:700;" id="finalScoreText"></p>
    <div id="finalDetail" style="text-align:left; margin-top:1rem;"></div>
    <p id="finalMsg"></p>
    <button class="btn btn-primary" id="restartBtn">⟳ 重新开始</button>
  </div>
</div>

<script>
  (function() {
    let sentenceGroups = [];
    let sentenceStates = [];
    let currentSentenceIdx = -1;
    let currentPhase = 'divide';
    let currentTaskIdx = 0;
    let selectedTokens = [];
    let revealMode = false;
    let currentTokens = [];
    let partsUserInput = [];
    let fullUserInput = '';
    let partScores = 0;
    let orderScore = 0;
    let finalSimilarity = 0;
    let partsDetail = [];
    let orderDetails = [];

    const viewContainer = document.getElementById('viewContainer');
    const finalResult = document.getElementById('finalResult');
    const finalScoreText = document.getElementById('finalScoreText');
    const finalMsg = document.getElementById('finalMsg');
    const finalDetail = document.getElementById('finalDetail');
    const restartBtn = document.getElementById('restartBtn');

    function tokenize(s) {
      const tokens = [];
      const regex = /([a-zA-Z0-9]+|[.,!?;:])|(\s+)/g;
      let match;
      while ((match = regex.exec(s)) !== null) {
        if (match[1]) {
          const text = match[1];
          const isWord = /^[a-zA-Z0-9]+$/.test(text);
          tokens.push({ text, isWord, index: tokens.length });
        } else if (match[2]) {
          tokens.push({ text: match[2], isWord: false, index: tokens.length });
        }
      }
      return tokens;
    }

    function getCorrectIndices(sentenceIdx, taskIdx) {
      const task = sentenceGroups[sentenceIdx].tasks[taskIdx];
      return task.indices || [];
    }

    function getTaskEnglish(sentenceIdx, taskIdx) {
      const group = sentenceGroups[sentenceIdx];
      const task = group.tasks[taskIdx];
      if (!task.indices) return '';
      const tokens = tokenize(group.sentence);
      return task.indices.map(i => tokens[i].text).join(' ');
    }

    function containsCoreWords(userStr, standardStr) {
      if (!userStr || !standardStr) return false;
      const keywords = standardStr.match(/[\u4e00-\u9fa5]{2,}/g) || [];
      if (keywords.length === 0) {
        return userStr.trim().replace(/\s+/g, '') === standardStr.trim().replace(/\s+/g, '');
      }
      const cleanUser = userStr.replace(/\s+/g, '');
      return keywords.every(kw => cleanUser.includes(kw));
    }

    function checkComponentOrder(userFullText, standardParts) {
      let orderCount = 0;
      const details = [];
      let lastPos = -1;
      const cleanUser = userFullText.replace(/\s+/g, '');
      for (const part of standardParts) {
        const keywords = part.match(/[\u4e00-\u9fa5]{2,}/g) || [];
        let pos = -1;
        if (keywords.length > 0) {
          pos = cleanUser.indexOf(keywords[0]);
        } else {
          pos = cleanUser.indexOf(part.replace(/\s+/g, ''));
        }
        const found = pos > lastPos;
        details.push(found);
        if (found) {
          orderCount++;
          lastPos = pos;
        }
      }
      return { score: orderCount, details };
    }

    function similarityScore(str1, str2) {
      const s1 = str1.replace(/\s+/g, '');
      const s2 = str2.replace(/\s+/g, '');
      let matches = 0;
      const len = Math.min(s1.length, s2.length);
      for (let i = 0; i < len; i++) if (s1[i] === s2[i]) matches++;
      return matches / Math.max(s1.length, s2.length);
    }

    async function loadData() {
      try {
        const resp = await fetch('./questions.json');
        if (!resp.ok) throw new Error('加载失败');
        sentenceGroups = await resp.json();
        initSentenceStates();
        renderSentenceList();
      } catch (e) {
        viewContainer.innerHTML = `<p style="color:red;text-align:center;">题库加载失败：${e.message}</p>`;
      }
    }

    function initSentenceStates() {
      sentenceStates = sentenceGroups.map(() => ({
        taskResults: null,
        divideDone: false,
        transPartsDone: false,
        transFullDone: false,
        partScore: 0,
        orderScore: 0,
        fullSimilarity: 0,
        transScore: 0,
        partsDetail: [],
        orderDetails: [],
        userParts: [],      // 用户填写的成分译文
        userFull: ''        // 用户填写的整句译文
      }));
    }

    function getTaskStatus(sIdx, tIdx) {
      if (!sentenceStates[sIdx].taskResults) {
        sentenceStates[sIdx].taskResults = new Array(sentenceGroups[sIdx].tasks.length).fill(null);
      }
      return sentenceStates[sIdx].taskResults[tIdx];
    }

    function setTaskStatus(sIdx, tIdx, val) {
      if (!sentenceStates[sIdx].taskResults) {
        sentenceStates[sIdx].taskResults = new Array(sentenceGroups[sIdx].tasks.length).fill(null);
      }
      sentenceStates[sIdx].taskResults[tIdx] = val;
    }

    function isDivideComplete(sIdx) {
      const tasks = sentenceGroups[sIdx].tasks;
      return tasks.every((_, idx) => getTaskStatus(sIdx, idx) !== null);
    }

    function showSentenceList() {
      finalResult.classList.add('hidden');
      viewContainer.style.display = 'block';
      renderSentenceList();
    }

    function renderSentenceList() {
      let html = '<div class="sentence-list">';
      sentenceGroups.forEach((group, idx) => {
        const state = sentenceStates[idx];
        const totalTasks = group.tasks.length;
        let divCompleted = state.taskResults ? state.taskResults.filter(r => r !== null).length : 0;
        const transOk = !group.translation || (state.transPartsDone && state.transFullDone);
        const allDone = divCompleted === totalTasks && transOk;
        html += `
          <div class="sentence-item ${allDone ? 'completed' : ''}" data-idx="${idx}">
            <span class="text">${group.sentence}</span>
            <span class="progress-tag">${divCompleted}/${totalTasks} ${transOk ? '✓' : '⋯'}</span>
          </div>`;
      });
      html += '</div>';
      viewContainer.innerHTML = html;
      document.querySelectorAll('.sentence-item').forEach(item => {
        item.addEventListener('click', () => enterSentence(parseInt(item.dataset.idx)));
      });
    }

    function enterSentence(sIdx) {
      currentSentenceIdx = sIdx;
      const state = sentenceStates[sIdx];
      // 如果句子已完成，显示复盘结果
      if (state.divideDone && (!sentenceGroups[sIdx].translation || (state.transPartsDone && state.transFullDone))) {
        renderSentenceResult(sIdx);
        return;
      }
      // 否则进入练习流程
      const group = sentenceGroups[sIdx];
      currentTokens = tokenize(group.sentence);
      if (!state.divideDone) {
        currentPhase = 'divide';
        currentTaskIdx = 0;
        for (let i = 0; i < group.tasks.length; i++) {
          if (getTaskStatus(sIdx, i) === null) { currentTaskIdx = i; break; }
        }
        selectedTokens = [];
        revealMode = false;
        if (!window._divideWrongCount) window._divideWrongCount = [];
      } else if (!state.transPartsDone && group.translation) {
        currentPhase = 'transParts';
        partsUserInput = new Array(group.translation.parts.length).fill('');
      } else if (!state.transFullDone && group.translation) {
        currentPhase = 'transFull';
        fullUserInput = '';
        partScores = state.partScore;
        partsDetail = state.partsDetail || [];
        orderScore = 0;
        orderDetails = [];
        finalSimilarity = 0;
      }
      renderPractice();
    }

    function renderPractice() {
      if (currentPhase === 'divide') renderDividePhase();
      else if (currentPhase === 'transParts') renderTransPartsPhase();
      else if (currentPhase === 'transFull') renderTransFullPhase();
    }

    // ---------- 划词阶段 ----------
    function renderDividePhase() {
      const group = sentenceGroups[currentSentenceIdx];
      const task = group.tasks[currentTaskIdx];
      const status = getTaskStatus(currentSentenceIdx, currentTaskIdx);
      const wrongCount = (window._divideWrongCount && window._divideWrongCount[currentTaskIdx]) || 0;
      const remaining = Math.max(0, 3 - wrongCount);
      const correctIndices = getCorrectIndices(currentSentenceIdx, currentTaskIdx);

      let html = `
        <div class="practice-area">
          <button class="btn back-btn" id="backToListBtn">← 返回列表</button>
          <div class="sentence-display">${group.sentence}</div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:600;">${currentTaskIdx+1}. ${task.title}</span>
            <div class="task-nav">`;
      for (let i = 0; i < group.tasks.length; i++) {
        let cls = 'task-dot';
        if (i === currentTaskIdx) cls += ' current';
        else if (getTaskStatus(currentSentenceIdx, i) !== null) cls += ' done';
        else cls += ' locked';
        html += `<div class="${cls}">${i+1}</div>`;
      }
      html += `</div></div>
        <div class="info-row"><span>剩余机会：<strong>${remaining}</strong> / 3</span></div>
        <div class="token-box" id="tokenContainer">`;

      currentTokens.forEach((tok, idx) => {
        let cls = 'token';
        if (tok.isWord) cls += ' word';
        else cls += (tok.text.trim() ? ' punctuation' : ' space');
        if (revealMode && correctIndices.includes(idx)) cls += ' correct-reveal';
        else if (!revealMode && status === null && selectedTokens.includes(idx)) cls += ' selected';
        else if (status === true && correctIndices.includes(idx)) cls += ' correct-reveal';
        html += `<span class="${cls}" data-idx="${idx}">${tok.text}</span>`;
      });

      html += `</div>
        <div class="feedback" id="feedbackArea"></div>
        <div class="action-row">
          <button class="btn" id="prevTaskBtn" ${currentTaskIdx===0?'disabled':''}>◀ 上一成分</button>
          <button class="btn btn-primary" id="submitBtn" ${status !== null || revealMode ? 'disabled' : ''}>提交</button>
        </div>
      </div>`;

      viewContainer.innerHTML = html;
      document.getElementById('backToListBtn').addEventListener('click', showSentenceList);
      document.getElementById('prevTaskBtn').addEventListener('click', () => {
        if (currentTaskIdx > 0) { currentTaskIdx--; selectedTokens = []; revealMode = false; renderDividePhase(); }
      });
      document.getElementById('submitBtn').addEventListener('click', handleDivideSubmit);
      if (status === null && !revealMode) {
        document.querySelectorAll('#tokenContainer .token.word').forEach(span => {
          span.addEventListener('click', () => toggleToken(parseInt(span.dataset.idx)));
        });
      }
    }

    function toggleToken(idx) {
      const pos = selectedTokens.indexOf(idx);
      if (pos > -1) selectedTokens.splice(pos, 1);
      else selectedTokens.push(idx);
      document.querySelectorAll('#tokenContainer .token.word').forEach(span => {
        const i = parseInt(span.dataset.idx);
        span.classList.toggle('selected', selectedTokens.includes(i));
      });
      document.getElementById('submitBtn').disabled = selectedTokens.length === 0;
    }

    function handleDivideSubmit() {
      if (getTaskStatus(currentSentenceIdx, currentTaskIdx) !== null || revealMode) return;
      const correct = getCorrectIndices(currentSentenceIdx, currentTaskIdx);
      const sortedSel = [...selectedTokens].sort((a,b)=>a-b);
      const sortedCor = [...correct].sort((a,b)=>a-b);
      const isCorrect = arraysEqual(sortedSel, sortedCor);
      const fb = document.getElementById('feedbackArea');
      if (!window._divideWrongCount) window._divideWrongCount = [];

      if (isCorrect) {
        setTaskStatus(currentSentenceIdx, currentTaskIdx, true);
        selectedTokens = []; revealMode = false;
        if (fb) fb.textContent = '✅ 正确！';
        if (isDivideComplete(currentSentenceIdx)) advanceAfterDivide();
        else { currentTaskIdx = nextUnfinished(); renderDividePhase(); }
      } else {
        window._divideWrongCount[currentTaskIdx] = (window._divideWrongCount[currentTaskIdx]||0) + 1;
        const left = 3 - window._divideWrongCount[currentTaskIdx];
        if (left <= 0) {
          setTaskStatus(currentSentenceIdx, currentTaskIdx, false);
          revealMode = true;
          renderDividePhase();
          if (fb) fb.textContent = '❌ 机会用完，正确答案已高亮，自动进入下一题';
          setTimeout(() => {
            revealMode = false;
            if (isDivideComplete(currentSentenceIdx)) advanceAfterDivide();
            else { currentTaskIdx = nextUnfinished(); renderDividePhase(); }
          }, 1500);
        } else {
          if (fb) fb.textContent = `❌ 错误，剩余 ${left} 次机会`;
          selectedTokens = [];
          document.querySelectorAll('#tokenContainer .token.word').forEach(s => s.classList.remove('selected'));
          document.getElementById('submitBtn').disabled = true;
        }
      }
    }

    function nextUnfinished() {
      const tasks = sentenceGroups[currentSentenceIdx].tasks;
      for (let i = 0; i < tasks.length; i++) if (getTaskStatus(currentSentenceIdx, i) === null) return i;
      return -1;
    }

    function advanceAfterDivide() {
      const group = sentenceGroups[currentSentenceIdx];
      if (!group.translation) {
        sentenceStates[currentSentenceIdx].divideDone = true;
        showSentenceList();
        checkAllComplete();
        return;
      }
      sentenceStates[currentSentenceIdx].divideDone = true;
      currentPhase = 'transParts';
      partsUserInput = new Array(group.translation.parts.length).fill('');
      renderTransPartsPhase();
    }

    // ---------- 成分翻译（保存用户输入）----------
    function renderTransPartsPhase() {
      const group = sentenceGroups[currentSentenceIdx];
      let html = `
        <div class="practice-area">
          <button class="btn back-btn" id="backToListBtn">← 返回列表</button>
          <div class="sentence-display">${group.sentence}</div>
          <div style="font-weight:600;">🔤 请翻译出句子的各个成分</div>
          <ul class="translation-list">`;
      group.tasks.forEach((task, idx) => {
        const eng = getTaskEnglish(currentSentenceIdx, idx);
        html += `
          <li class="translation-item">
            <div class="translation-label">${task.title}</div>
            <div class="translation-prompt">${eng}</div>
            <textarea class="translation-input" id="partInput-${idx}" placeholder="请输入中文翻译">${escapeHtml(partsUserInput[idx]||'')}</textarea>
          </li>`;
      });
      html += `</ul>
        <button class="btn btn-primary" id="submitPartsBtn">提交翻译</button>
        <div class="feedback" id="feedbackArea"></div>
      </div>`;
      viewContainer.innerHTML = html;
      document.getElementById('backToListBtn').addEventListener('click', showSentenceList);
      group.tasks.forEach((_, idx) => {
        const el = document.getElementById(`partInput-${idx}`);
        if (el) el.addEventListener('input', () => { partsUserInput[idx] = el.value; });
      });
      document.getElementById('submitPartsBtn').addEventListener('click', submitParts);
    }

    function submitParts() {
      const group = sentenceGroups[currentSentenceIdx];
      const trans = group.translation;
      partScores = 0;
      partsDetail = [];
      trans.parts.forEach((ans, i) => {
        const user = partsUserInput[i] || '';
        const ok = containsCoreWords(user, ans);
        if (ok) partScores++;
        partsDetail.push(ok);
      });
      // 保存用户输入
      sentenceStates[currentSentenceIdx].userParts = [...partsUserInput];
      sentenceStates[currentSentenceIdx].partScore = partScores;
      sentenceStates[currentSentenceIdx].partsDetail = partsDetail;
      document.getElementById('feedbackArea').textContent = `成分翻译得分：${partScores}/${trans.parts.length}（核心词匹配）`;
      sentenceStates[currentSentenceIdx].transPartsDone = true;
      currentPhase = 'transFull';
      fullUserInput = '';
      orderScore = 0;
      orderDetails = [];
      finalSimilarity = 0;
      renderTransFullPhase();
    }

    // ---------- 整句翻译（不自动跳转，保留返回按钮）----------
    function renderTransFullPhase() {
      const group = sentenceGroups[currentSentenceIdx];
      const trans = group.translation;
      const snippets = partsUserInput.map((val, i) => val.trim() || trans.parts[i]);
      let html = `
        <div class="practice-area">
          <button class="btn back-btn" id="backToListBtn">← 返回列表</button>
          <div style="font-weight:600;">📝 请按照公式将句子翻译出来</div>
          <p style="color:#5f6b7a;">点击下方你的译文片段，可填入输入框（可修改）</p>
          <div class="snippet-list" id="snippetContainer">`;
      snippets.forEach(text => {
        html += `<span class="snippet" data-text="${escapeHtml(text)}">${escapeHtml(text)}</span>`;
      });
      html += `</div>
        <textarea class="translation-input" id="fullTransInput" rows="3" placeholder="点击上方碎片或自由输入整句翻译">${escapeHtml(fullUserInput)}</textarea>
        <button class="btn btn-primary" id="submitFullBtn">提交整句翻译</button>
        <div class="feedback" id="feedbackArea"></div>
        <div id="afterSubmitActions"></div>
      </div>`;
      viewContainer.innerHTML = html;
      document.getElementById('backToListBtn').addEventListener('click', showSentenceList);
      const ta = document.getElementById('fullTransInput');
      ta.addEventListener('input', () => { fullUserInput = ta.value; });
      document.querySelectorAll('#snippetContainer .snippet').forEach(sp => {
        sp.addEventListener('click', () => {
          ta.value = ta.value ? ta.value + sp.dataset.text : sp.dataset.text;
          fullUserInput = ta.value;
          ta.focus();
        });
      });
      document.getElementById('submitFullBtn').addEventListener('click', submitFull);
    }

    function submitFull() {
      const group = sentenceGroups[currentSentenceIdx];
      const trans = group.translation;
      const orderResult = checkComponentOrder(fullUserInput, trans.parts);
      orderScore = orderResult.score;
      orderDetails = orderResult.details;
      finalSimilarity = similarityScore(fullUserInput, trans.full);
      const similarityBonus = finalSimilarity >= 0.8 ? 2 : 0;
      const totalTransScore = partScores + orderScore + similarityBonus;
      const maxTransScore = trans.parts.length * 2 + 2;
      const percent = Math.round((totalTransScore / maxTransScore) * 100);
      const passed = percent >= 60;

      // 保存用户整句输入
      sentenceStates[currentSentenceIdx].userFull = fullUserInput;
      sentenceStates[currentSentenceIdx].orderScore = orderScore;
      sentenceStates[currentSentenceIdx].orderDetails = orderDetails;
      sentenceStates[currentSentenceIdx].fullSimilarity = finalSimilarity;
      sentenceStates[currentSentenceIdx].transScore = totalTransScore;
      sentenceStates[currentSentenceIdx].transFullDone = true;

      document.getElementById('feedbackArea').innerHTML = `
        ✅ 成分翻译：${partScores}/${trans.parts.length} | 
        🔀 顺序正确：${orderScore}/${trans.parts.length} | 
        📊 整句相似度：${Math.round(finalSimilarity*100)}%${similarityBonus ? '（+2分）' : ''}<br>
        🎯 翻译总分：${totalTransScore}/${maxTransScore} (${percent}%) → ${passed ? '✔️ 通过' : '❌ 未通过'}
      `;

      // 添加返回按钮，不自动跳转
      const afterActions = document.getElementById('afterSubmitActions');
      if (afterActions) {
        afterActions.innerHTML = '<button class="btn btn-primary" id="manualBackBtn" style="margin-top:1rem;">📋 返回句子列表</button>';
        document.getElementById('manualBackBtn').addEventListener('click', showSentenceList);
      }
    }

    // ---------- 单个句子复盘 ----------
    function renderSentenceResult(sIdx) {
      const g = sentenceGroups[sIdx];
      const s = sentenceStates[sIdx];
      const divCor = s.taskResults ? s.taskResults.filter(r => r === true).length : 0;
      let html = `
        <div class="practice-area">
          <button class="btn back-btn" id="backToListBtn">← 返回列表</button>
          <div class="sentence-display">${g.sentence}</div>
          <div class="sentence-block">
            <h3>📌 句子${sIdx+1} 详细结果</h3>
            <p><strong>划分题得分：${divCor}/${g.tasks.length}</strong></p>`;

      if (s.taskResults) {
        html += '<table class="detail-table"><tr><th>成分</th><th>结果</th></tr>';
        g.tasks.forEach((task, tIdx) => {
          const correct = s.taskResults[tIdx];
          const icon = correct === true ? '✅' : (correct === false ? '❌' : '⚪');
          html += `<tr><td>${task.title}</td><td class="${correct === true ? 'pass' : 'fail'}">${icon}</td></tr>`;
        });
        html += '</table>';
      }

      if (g.translation) {
        const maxTrans = g.translation.parts.length * 2 + 2;
        const transTotal = (s.partScore || 0) + (s.orderScore || 0) + (s.fullSimilarity >= 0.8 ? 2 : 0);
        html += `<p><strong>翻译得分：${transTotal}/${maxTrans}</strong></p>`;
        html += '<p>🔤 成分翻译：</p><table class="detail-table"><tr><th>成分</th><th>标准答案</th><th>你的输入</th><th>核心词匹配</th></tr>';
        g.tasks.forEach((task, tIdx) => {
          const std = g.translation.parts[tIdx];
          const user = s.userParts?.[tIdx] || '';
          const ok = (s.partsDetail && s.partsDetail[tIdx]) || false;
          html += `<tr><td>${task.title}</td><td>${std}</td><td>${escapeHtml(user)}</td><td class="${ok ? 'pass' : 'fail'}">${ok ? '✅' : '❌'}</td></tr>`;
        });
        html += '</table>';

        if (s.orderDetails) {
          html += '<p>🔀 成分顺序检测：</p><table class="detail-table"><tr><th>成分</th><th>顺序正确</th></tr>';
          g.tasks.forEach((task, tIdx) => {
            const ok = s.orderDetails[tIdx] || false;
            html += `<tr><td>${task.title}</td><td class="${ok ? 'pass' : 'fail'}">${ok ? '✅' : '❌'}</td></tr>`;
          });
          html += '</table>';
        }

        html += `<p>📝 你的整句翻译：${escapeHtml(s.userFull || '（未填写）')}</p>`;
        html += `<p>📊 整句相似度：${Math.round(s.fullSimilarity*100)}% ${s.fullSimilarity >= 0.8 ? '(+2分)' : ''}</p>`;
      }

      html += `</div></div>`;
      viewContainer.innerHTML = html;
      document.getElementById('backToListBtn').addEventListener('click', showSentenceList);
    }

    // ---------- 全局完成（与之前一致）----------
    function checkAllComplete() {
      const done = sentenceGroups.every((g, idx) => {
        const s = sentenceStates[idx];
        return s.divideDone && (!g.translation || (s.transPartsDone && s.transFullDone));
      });
      if (done) {
        finalResult.classList.remove('hidden');
        viewContainer.style.display = 'none';
        let totalScore = 0;
        let grandTotal = 0;
        let detailHtml = '';
        sentenceGroups.forEach((g, idx) => {
          const s = sentenceStates[idx];
          const divCor = s.taskResults ? s.taskResults.filter(r => r === true).length : 0;
          totalScore += divCor;
          grandTotal += g.tasks.length;
          detailHtml += `<div class="sentence-block">
            <h3>📌 句子${idx+1}</h3>
            <p><strong>划分题得分：${divCor}/${g.tasks.length}</strong></p>`;
          if (s.taskResults) {
            detailHtml += '<table class="detail-table"><tr><th>成分</th><th>结果</th></tr>';
            g.tasks.forEach((task, tIdx) => {
              const correct = s.taskResults[tIdx];
              const icon = correct === true ? '✅' : (correct === false ? '❌' : '⚪');
              detailHtml += `<tr><td>${task.title}</td><td class="${correct === true ? 'pass' : 'fail'}">${icon}</td></tr>`;
            });
            detailHtml += '</table>';
          }
          if (g.translation) {
            const maxTrans = g.translation.parts.length * 2 + 2;
            const transTotal = (s.partScore || 0) + (s.orderScore || 0) + (s.fullSimilarity >= 0.8 ? 2 : 0);
            totalScore += transTotal;
            grandTotal += maxTrans;
            detailHtml += `<p><strong>翻译得分：${transTotal}/${maxTrans}</strong></p>`;
            detailHtml += '<p>🔤 成分翻译：</p><table class="detail-table"><tr><th>成分</th><th>标准答案</th><th>你的输入</th><th>核心词匹配</th></tr>';
            g.tasks.forEach((task, tIdx) => {
              const std = g.translation.parts[tIdx];
              const user = s.userParts?.[tIdx] || '';
              const ok = (s.partsDetail && s.partsDetail[tIdx]) || false;
              detailHtml += `<tr><td>${task.title}</td><td>${std}</td><td>${escapeHtml(user)}</td><td class="${ok ? 'pass' : 'fail'}">${ok ? '✅' : '❌'}</td></tr>`;
            });
            detailHtml += '</table>';
            if (s.orderDetails) {
              detailHtml += '<p>🔀 成分顺序检测：</p><table class="detail-table"><tr><th>成分</th><th>顺序正确</th></tr>';
              g.tasks.forEach((task, tIdx) => {
                const ok = s.orderDetails[tIdx] || false;
                detailHtml += `<tr><td>${task.title}</td><td class="${ok ? 'pass' : 'fail'}">${ok ? '✅' : '❌'}</td></tr>`;
              });
              detailHtml += '</table>';
            }
            detailHtml += `<p>📝 你的整句翻译：${escapeHtml(s.userFull || '（未填写）')}</p>`;
            detailHtml += `<p>📊 整句相似度：${Math.round(s.fullSimilarity*100)}% ${s.fullSimilarity >= 0.8 ? '(+2分)' : ''}</p>`;
          }
          detailHtml += `</div>`;
        });
        const finalPercent = Math.round((totalScore / grandTotal) * 100);
        finalScoreText.textContent = `总得分：${totalScore} / ${grandTotal} (${finalPercent}%)`;
        finalMsg.textContent = finalPercent >= 60 ? '🏆 整体通过！' : '💪 继续练习可以更好！';
        finalDetail.innerHTML = detailHtml;
      }
    }

    function escapeHtml(s) { return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
    function arraysEqual(a,b) { return a.length === b.length && a.every((v,i)=> v===b[i]); }

    restartBtn.addEventListener('click', () => {
      initSentenceStates();
      window._divideWrongCount = [];
      showSentenceList();
    });

    loadData();
  })();
</script>
</body>
</html>
