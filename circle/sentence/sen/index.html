<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>句子结构划分与翻译 · 智能评分</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f6fb;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 820px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 10px 35px rgba(0,0,0,.08);
      padding: 24px;
    }
    h1 { font-size: 30px; color: #15345c; margin-bottom: 20px; }
    h2 { font-size: 22px; color: #1e3b6b; margin-bottom: 16px; }
    .card {
      background: #f8fbff;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .list-item {
      background: white;
      border: 1px solid #d8e4f5;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: .18s;
    }
    .list-item:hover { border-color: #2563eb; background: #f8fbff; }
    .list-title { font-size: 17px; line-height: 1.8; color: #183250; }
    .list-sub { margin-top: 8px; color: #64748b; font-size: 14px; }
    .sentence-box {
      background: white;
      border-left: 5px solid #2563eb;
      border-radius: 14px;
      padding: 16px;
      line-height: 2;
      font-size: 19px;
      color: #0f2744;
      margin: 16px 0;
    }
    .token { display: inline-block; padding: 3px 7px; border-radius: 7px; transition: .15s; user-select: none; }
    .word { cursor: pointer; font-weight: 500; }
    .word:hover { background: #e8f0ff; }
    .selected { background: #ffd966; border-bottom: 3px solid #d97706; }
    .correct-highlight { background: #b7f7d4; border-bottom: 3px solid #059669; }
    .task-title { margin-bottom: 16px; font-size: 19px; font-weight: 700; color: #173860; }
    .feedback { min-height: 28px; margin-top: 14px; font-weight: 700; color: #1e3b6b; }
    .controls { margin-top: 18px; display: flex; gap: 12px; flex-wrap: wrap; }
    button {
      border: none;
      border-radius: 999px;
      padding: 11px 24px;
      background: #1f3f72;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: .18s;
      font-size: 16px;
    }
    button:hover { background: #15315a; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.secondary {
      background: white;
      color: #1f3f72;
      border: 2px solid #1f3f72;
    }
    button.secondary:hover { background: #f0f4ff; }
    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      border: 1px solid #cfdaeb;
      border-radius: 16px;
      padding: 14px;
      margin-top: 8px;
      font-size: 16px;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #2563eb; }
    .result {
      background: #f6fffb;
      border: 1px solid #d1fae5;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }
    .score { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
    .detail-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 15px; }
    .detail-table td, .detail-table th { padding: 10px 14px; border: 1px solid #d1d5db; text-align: left; }
    .detail-table th { background: #eef2ff; color: #1e3b6b; }
    .pass { color: #10b981; font-weight: bold; }
    .fail { color: #ef4444; font-weight: bold; }
    .progress-bar { width: 100%; height: 16px; background: #e5edf8; border-radius: 999px; overflow: hidden; margin: 12px 0; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2563eb, #10b981); border-radius: 999px; transition: width .3s; }
    .loading-text { font-size: 15px; color: #5f6b7a; }
    .mode-buttons { display: flex; gap: 16px; flex-wrap: wrap; margin: 24px 0; }
    .mode-buttons button { flex: 1; min-width: 200px; padding: 16px 24px; }
    .config-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
    .config-row input { flex: 1; padding: 10px; border: 1px solid #cfdaeb; border-radius: 12px; font-size: 14px; }
    @media(max-width:640px) {
      body { padding: 10px; }
      .app { padding: 18px; }
      h1 { font-size: 24px; }
      .sentence-box { font-size: 17px; }
    }
  </style>
  <!-- 静态加载 TensorFlow 库，确保 use 对象可用 -->
  <script src="https://unpkg.com/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://unpkg.com/@tensorflow-models/universal-sentence-encoder@1.3.3/dist/universal-sentence-encoder.min.js"></script>
</head>
<body>
<div class="app" id="app">
  <h1>📘 句子结构划分与翻译</h1>
  <div id="mainView"></div>
</div>

<script>
  // ==================== 全局状态 ====================
  let questions = [];
  let encoderModel = null;
  let modelReady = false;
  let useAI = false;                // 是否使用本地智能模型
  let useCloud = false;             // 是否使用云端 API
  let currentIndex = -1;
  let currentTaskIndex = 0;
  let selectedTokens = [];
  let divideResults = [];
  let divideWrongCounts = [];
  let partsUserInput = [];
  let fullUserInput = '';
  let currentPhase = 'divide';
  let partsDetail = [];
  // 云端 API 配置
  let baiduAccessToken = '';

  // ★ 默认模型地址改为 jsDelivr 镜像
  const DEFAULT_MODEL_URL = 'https://cdn.jsdelivr.net/gh/jaeyk/universal-sentence-encoder-lite@master/model.json';

  // ==================== 工具函数 ====================
  function tokenize(sentence) {
    const regex = /([A-Za-z]+(?:[-'][A-Za-z]+)*|\d+|[.,!?;:()—-])|(\s+)/g;
    const tokens = [];
    let match;
    while ((match = regex.exec(sentence)) !== null) {
      if (match[1]) tokens.push({ text: match[1], isWord: true, index: tokens.length });
      else if (match[2]) tokens.push({ text: match[2], isWord: false, index: tokens.length });
    }
    return tokens;
  }

  function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function arraysEqual(a, b) { return JSON.stringify(a) === JSON.stringify(b); }

  function diceSimilarity(a, b) {
    a = a.replace(/\s+/g, ''); b = b.replace(/\s+/g, '');
    if (!a || !b) return 0;
    const bigrams = s => { const arr = []; for (let i = 0; i < s.length - 1; i++) arr.push(s.slice(i, i + 2)); return arr; };
    const pa = bigrams(a), pb = bigrams(b);
    let hit = 0; pa.forEach(x => { if (pb.includes(x)) hit++; });
    return (2 * hit) / (pa.length + pb.length);
  }

  // ==================== 语义相似度计算 ====================
  async function semanticSimilarityLocal(a, b) {
    if (!modelReady || !encoderModel) return -1;
    try {
      const embeddings = await encoderModel.embed([a, b]);
      const arr = await embeddings.array();
      const x = arr[0], y = arr[1];
      let dot = 0, nx = 0, ny = 0;
      for (let i = 0; i < x.length; i++) { dot += x[i] * y[i]; nx += x[i] * x[i]; ny += y[i] * y[i]; }
      return dot / (Math.sqrt(nx) * Math.sqrt(ny));
    } catch (e) { return -1; }
  }

  async function semanticSimilarityCloud(a, b) {
    if (!baiduAccessToken) return -1;
    try {
      const resp = await fetch(`https://aip.baidubce.com/rpc/2.0/nlp/v2/simnet?charset=UTF-8&access_token=${baiduAccessToken}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text_1: a, text_2: b })
      });
      const data = await resp.json();
      return data.score || -1;
    } catch (e) { return -1; }
  }

  // ==================== 模型加载（带进度） ====================
  async function downloadModelWithProgress(modelUrl) {
    return new Promise(async (resolve, reject) => {
      const progressBar = document.getElementById('progressFill');
      const statusText = document.getElementById('statusText');
      let simulatedProgress = 0;
      const progressInterval = setInterval(() => {
        simulatedProgress += Math.random() * 15;
        if (simulatedProgress > 90) simulatedProgress = 90;
        if (progressBar) progressBar.style.width = simulatedProgress + '%';
      }, 1000);
      try {
        statusText.textContent = '正在下载 AI 模型（约 5MB），请稍候...';
        encoderModel = await Promise.race([
          use.load({ modelUrl }),
          new Promise((_, reject) => setTimeout(() => reject(new Error('模型加载超时')), 25000))
        ]);
        clearInterval(progressInterval);
        if (progressBar) progressBar.style.width = '100%';
        statusText.textContent = '模型加载成功！';
        modelReady = true;
        resolve();
      } catch (err) {
        clearInterval(progressInterval);
        modelReady = false;
        useAI = false;
        statusText.textContent = '模型加载失败，请检查网络或切换到其他模式';
        reject(err);
      }
    });
  }

  // ==================== 数据加载 ====================
  async function loadQuestions() {
    try {
      const resp = await fetch('./questions.json');
      if (!resp.ok) throw new Error('加载失败');
      questions = await resp.json();
    } catch (e) {
      document.getElementById('mainView').innerHTML = `<div class="card"><div style="color:red;">❌ 题库加载失败：${e.message}</div></div>`;
    }
  }

  // ==================== 模式选择页 ====================
  function renderModeSelection() {
    const savedModelUrl = localStorage.getItem('modelUrl') || DEFAULT_MODEL_URL;
    const savedApiKey = localStorage.getItem('baiduApiKey') || '';
    const savedSecretKey = localStorage.getItem('baiduSecretKey') || '';

    document.getElementById('mainView').innerHTML = `
      <div class="card">
        <h2>选择翻译评分模式</h2>
        <p style="color:#475569; margin-bottom:16px;">默认使用轻量智能模型（约 5MB），若网络不佳可切换到云端 API 或基础评分。</p>
        <div class="mode-buttons">
          <button onclick="startWithLocalAI()" style="background:#1f3f72;">🤖 智能评分（推荐）<br><small style="opacity:0.8;">远程加载轻量模型</small></button>
          <button onclick="startWithCloud()" class="secondary">☁️ 云端大模型<br><small style="opacity:0.7;">需百度 API 密钥</small></button>
          <button onclick="startBasic()" class="secondary">⚡ 基础评分<br><small style="opacity:0.7;">离线可用</small></button>
        </div>
        <div class="config-row" style="margin-top:20px;">
          <label style="font-weight:600; white-space:nowrap;">模型地址：</label>
          <input type="text" id="modelUrlInput" value="${escapeHtml(savedModelUrl)}" placeholder="轻量模型的 model.json 地址" />
          <button onclick="saveModelUrl()">保存</button>
        </div>
        <div class="config-row">
          <label style="font-weight:600; white-space:nowrap;">百度 API Key：</label>
          <input type="text" id="apiKeyInput" value="${escapeHtml(savedApiKey)}" placeholder="API Key" />
        </div>
        <div class="config-row">
          <label style="font-weight:600; white-space:nowrap;">百度 Secret Key：</label>
          <input type="password" id="secretKeyInput" value="${escapeHtml(savedSecretKey)}" placeholder="Secret Key" />
          <button onclick="saveCloudKeys()">保存</button>
        </div>
      </div>
    `;
  }

  window.saveModelUrl = function() {
    const url = document.getElementById('modelUrlInput').value.trim();
    localStorage.setItem('modelUrl', url);
    alert('模型地址已保存');
  };

  window.saveCloudKeys = function() {
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    const secretKey = document.getElementById('secretKeyInput').value.trim();
    localStorage.setItem('baiduApiKey', apiKey);
    localStorage.setItem('baiduSecretKey', secretKey);
    alert('密钥已保存');
  };

  // 获取百度 access_token
  async function getBaiduToken() {
    const apiKey = localStorage.getItem('baiduApiKey');
    const secretKey = localStorage.getItem('baiduSecretKey');
    if (!apiKey || !secretKey) { alert('请先填写百度 API Key 和 Secret Key'); return false; }
    try {
      const resp = await fetch(`https://aip.baidubce.com/oauth/2.0/token?grant_type=client_credentials&client_id=${apiKey}&client_secret=${secretKey}`, { method: 'POST' });
      const data = await resp.json();
      if (data.access_token) {
        baiduAccessToken = data.access_token;
        return true;
      } else {
        alert('获取百度 token 失败：' + JSON.stringify(data));
        return false;
      }
    } catch (e) {
      alert('网络错误，无法获取百度 token');
      return false;
    }
  }

  window.startWithLocalAI = async function() {
    useAI = true; useCloud = false; modelReady = false;
    const modelUrl = localStorage.getItem('modelUrl') || DEFAULT_MODEL_URL;
    document.getElementById('mainView').innerHTML = `
      <div class="card" style="text-align:center;">
        <h2>正在准备智能评分引擎</h2>
        <div class="progress-container">
          <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%;"></div></div>
          <div class="loading-text" id="statusText">准备下载...</div>
        </div>
      </div>
    `;
    try {
      await downloadModelWithProgress(modelUrl);
    } catch (e) {
      useAI = false;
      alert('本地模型加载失败，已回退，请尝试云端或基础模式');
    }
    renderQuestionList();
  };

  window.startWithCloud = async function() {
    const ok = await getBaiduToken();
    if (!ok) return;
    useCloud = true; useAI = false; modelReady = false;
    renderQuestionList();
  };

  window.startBasic = function() {
    useAI = false; useCloud = false; modelReady = false;
    renderQuestionList();
  };

  // ==================== 句子列表 ====================
  function renderQuestionList() {
    let html = '';
    questions.forEach((q, i) => {
      html += `<div class="list-item" onclick="startQuestion(${i})">
        <div class="list-title">${escapeHtml(q.sentence)}</div>
        <div class="list-sub">共 ${q.tasks.length} 个结构成分</div>
      </div>`;
    });
    document.getElementById('mainView').innerHTML = html;
  }

  window.startQuestion = function(index) {
    currentIndex = index;
    currentTaskIndex = 0;
    selectedTokens = [];
    divideResults = new Array(questions[index].tasks.length).fill(null);
    divideWrongCounts = new Array(questions[index].tasks.length).fill(0);
    partsUserInput = new Array(questions[index].tasks.length).fill('');
    fullUserInput = '';
    partsDetail = [];
    currentPhase = 'divide';
    renderDivide();
  };

  // ==================== 划分题 ====================
  function renderDivide() {
    const q = questions[currentIndex];
    const task = q.tasks[currentTaskIndex];
    const tokens = tokenize(q.sentence);
    const wrongCount = divideWrongCounts[currentTaskIndex] || 0;
    const remaining = Math.max(0, 3 - wrongCount);
    const showCorrect = divideResults[currentTaskIndex] === false && remaining === 0;

    let html = `<div class="card">
      <div class="task-title">第 ${currentTaskIndex + 1} 题：请选择【${task.title}】</div>
      <div class="info-row"><span>剩余机会：${remaining} / 3</span></div>
      <div class="sentence-box">`;
    tokens.forEach((tok, idx) => {
      if (tok.isWord) {
        let cls = 'token word';
        if (showCorrect && task.indices.includes(idx)) cls += ' correct-highlight';
        else if (selectedTokens.includes(idx)) cls += ' selected';
        html += `<span class="${cls}" onclick="toggleToken(${idx})">${escapeHtml(tok.text)}</span>`;
      } else {
        html += `<span>${escapeHtml(tok.text)}</span>`;
      }
    });
    html += `</div>
      <div class="info-row"><span>进度：${currentTaskIndex + 1}/${q.tasks.length}</span></div>
      <div class="controls">
        <button onclick="submitDivide()" ${divideResults[currentTaskIndex] !== null ? 'disabled' : ''}>提交答案</button>
        <button class="secondary" onclick="renderQuestionList()">返回列表</button>
      </div>
      <div class="feedback">${showCorrect ? '❌ 机会用完，正确答案已标绿' : ''}</div>
    </div>`;
    document.getElementById('mainView').innerHTML = html;
  }

  window.toggleToken = function(idx) {
    if (divideResults[currentTaskIndex] !== null) return;
    const pos = selectedTokens.indexOf(idx);
    if (pos >= 0) selectedTokens.splice(pos, 1);
    else selectedTokens.push(idx);
    renderDivide();
  };

  window.submitDivide = function() {
    if (divideResults[currentTaskIndex] !== null) return;
    const q = questions[currentIndex];
    const task = q.tasks[currentTaskIndex];
    const correct = [...task.indices].sort((a, b) => a - b);
    const user = [...selectedTokens].sort((a, b) => a - b);
    const ok = arraysEqual(correct, user);
    if (ok) {
      divideResults[currentTaskIndex] = true;
      document.querySelector('.feedback').innerHTML = '✅ 正确';
      setTimeout(() => {
        currentTaskIndex++;
        selectedTokens = [];
        if (currentTaskIndex >= q.tasks.length) { currentPhase = 'parts'; renderParts(); }
        else renderDivide();
      }, 500);
    } else {
      divideWrongCounts[currentTaskIndex]++;
      const left = 3 - divideWrongCounts[currentTaskIndex];
      if (left <= 0) {
        divideResults[currentTaskIndex] = false;
        renderDivide();
        setTimeout(() => {
          currentTaskIndex++;
          selectedTokens = [];
          if (currentTaskIndex >= q.tasks.length) { currentPhase = 'parts'; renderParts(); }
          else renderDivide();
        }, 1500);
      } else {
        document.querySelector('.feedback').innerHTML = `❌ 错误，剩余 ${left} 次机会`;
        selectedTokens = [];
        renderDivide();
      }
    }
  };

  // ==================== 成分翻译 ====================
  function renderParts() {
    const q = questions[currentIndex];
    const tokens = tokenize(q.sentence);
    let html = `<div class="card"><h2>🔤 请翻译出句子的各个成分</h2><div class="sentence-box">${escapeHtml(q.sentence)}</div>`;
    q.tasks.forEach((task, idx) => {
      let englishPart = '';
      if (task.indices) englishPart = task.indices.map(i => tokens[i]?.text || '').join(' ');
      html += `<div style="margin-bottom:24px;">
        <label style="font-weight:700;">${task.title}</label>
        ${englishPart ? `<div style="background:#f1f5f9;color:#334155;font-weight:500;padding:6px 12px;border-radius:8px;margin-bottom:8px;">${escapeHtml(englishPart)}</div>` : ''}
        <textarea id="partInput-${idx}" placeholder="请输入中文翻译">${escapeHtml(partsUserInput[idx] || '')}</textarea>
      </div>`;
    });
    html += `<div class="controls"><button onclick="submitParts()">提交成分翻译</button><button class="secondary" onclick="renderQuestionList()">返回列表</button></div><div class="feedback" id="partsFeedback"></div></div>`;
    document.getElementById('mainView').innerHTML = html;
    q.tasks.forEach((_, idx) => {
      document.getElementById(`partInput-${idx}`).addEventListener('input', e => { partsUserInput[idx] = e.target.value; });
    });
  }

  window.submitParts = async function() {
    const q = questions[currentIndex];
    let correctCount = 0;
    const tempDetail = [];
    for (let i = 0; i < q.tasks.length; i++) {
      const user = partsUserInput[i] ? partsUserInput[i].trim() : '';
      const std = q.tasks[i].translation || '';
      let match = false;
      if (std) {
        if (diceSimilarity(user, std) > 0.6) match = true;
        else if (useAI && modelReady) {
          const sem = await semanticSimilarityLocal(user, std);
          match = sem > 0.7;
        } else if (useCloud && baiduAccessToken) {
          const sem = await semanticSimilarityCloud(user, std);
          match = sem > 0.7;
        }
      } else match = true;
      if (match) correctCount++;
      tempDetail.push(match);
    }
    partsDetail = tempDetail;
    document.getElementById('partsFeedback').innerHTML = `成分翻译匹配：${correctCount} / ${q.tasks.length}`;
    setTimeout(() => { currentPhase = 'full'; renderFull(); }, 800);
  };

  // ==================== 整句翻译 ====================
  function renderFull() {
    const q = questions[currentIndex];
    let html = `<div class="card"><h2>📝 请按照公式将句子翻译出来</h2><div class="sentence-box">${escapeHtml(q.sentence)}</div><div>点击下方你输入的成分译文片段可填入输入框</div><div style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;">`;
    partsUserInput.forEach(text => { if (text.trim()) html += `<span class="token" style="background:#e8f0fe;cursor:pointer;padding:4px 16px;border-radius:999px;" onclick="appendSnippet('${escapeHtml(text).replace(/'/g, "&#39;")}')">${escapeHtml(text)}</span>`; });
    html += `</div><textarea id="fullTranslationInput" placeholder="请输入整句中文翻译">${escapeHtml(fullUserInput)}</textarea><div class="controls"><button onclick="submitFull()">提交整句翻译</button><button class="secondary" onclick="renderQuestionList()">返回列表</button></div><div class="feedback" id="fullFeedback"></div></div>`;
    document.getElementById('mainView').innerHTML = html;
    document.getElementById('fullTranslationInput').addEventListener('input', e => { fullUserInput = e.target.value; });
  }

  window.appendSnippet = function(text) {
    const ta = document.getElementById('fullTranslationInput');
    if (ta) { ta.value = ta.value ? ta.value + text : text; fullUserInput = ta.value; }
  };

  window.submitFull = async function() {
    const q = questions[currentIndex];
    const input = fullUserInput.trim();
    const fb = document.getElementById('fullFeedback');
    if (!input) { fb.innerHTML = '请输入整句翻译'; return; }
    fb.innerHTML = '<span style="color:#1f3f72;">正在评分...</span>';
    const standard = q.fullTranslation || '';
    let finalScore, aiScore = -1, baseScore = standard ? diceSimilarity(input, standard) : 1;
    let aiUsed = false;
    if (useAI && modelReady) {
      aiScore = await semanticSimilarityLocal(input, standard);
      aiUsed = true;
    } else if (useCloud && baiduAccessToken) {
      aiScore = await semanticSimilarityCloud(input, standard);
      aiUsed = true;
    }
    if (aiScore >= 0) {
      finalScore = Math.round(aiScore * 90 + baseScore * 10);
    } else {
      finalScore = Math.round(baseScore * 100);
    }
    const divideCorrect = divideResults.filter(r => r === true).length;
    const translateCorrect = partsDetail.filter(Boolean).length;
    let level = finalScore >= 90 ? '🌟 非常优秀' : (finalScore >= 80 ? '✅ 良好' : (finalScore >= 60 ? '⚠️ 基本正确' : '❌ 需改进'));
    let tableHtml = '<table class="detail-table"><tr><th>成分</th><th>划分</th><th>你的翻译</th><th>参考答案</th><th>匹配</th></tr>';
    q.tasks.forEach((task, idx) => {
      const divOk = divideResults[idx] === true ? '✅' : (divideResults[idx] === false ? '❌' : '—');
      const userTrans = partsUserInput[idx] || '（空）';
      const refTrans = task.translation || '';
      const transOk = partsDetail[idx] ? '✅' : '❌';
      tableHtml += `<tr><td>${task.title}</td><td class="${divideResults[idx] ? 'pass' : 'fail'}">${divOk}</td><td>${escapeHtml(userTrans)}</td><td>${escapeHtml(refTrans)}</td><td class="${partsDetail[idx] ? 'pass' : 'fail'}">${transOk}</td></tr>`;
    });
    tableHtml += '</table>';
    fb.innerHTML = `<div class="result"><div class="score">整句翻译综合得分：${finalScore}% (${level})</div>
      ${aiUsed ? '<div style="color:#2563eb;">🤖 智能评分生效 (AI 权重 90%)</div>' : '<div style="color:#64748b;">基础评分模式</div>'}
      ${aiScore >= 0 ? `<div>🧠 AI 语义分：${Math.round(aiScore * 100)}% &nbsp; | &nbsp; 📄 字符匹配分：${Math.round(baseScore * 100)}%</div>` : ''}
      <div style="margin-top:12px;"><strong>标准译文：</strong>${escapeHtml(standard)}</div>
      <div><strong>你的整句：</strong>${escapeHtml(input)}</div>
      <div style="margin-top:16px;font-weight:bold;">📘 结构划分正确：${divideCorrect} / ${q.tasks.length}</div>
      <div style="font-weight:bold;">🔤 成分翻译匹配：${translateCorrect} / ${q.tasks.length}</div>
      <div style="overflow-x:auto;">${tableHtml}</div>
      <div class="controls"><button onclick="renderQuestionList()">返回题库</button><button onclick="startQuestion(${currentIndex})">重新练习</button></div></div>`;
  };

  // ==================== 启动 ====================
  async function init() {
    await loadQuestions();
    renderModeSelection();
  }
  init();
</script>
</body>
</html>
