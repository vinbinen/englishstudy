<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>英语句子结构划分与翻译 · 全功能智能评分</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f6fb;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 820px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 10px 35px rgba(0,0,0,.08);
      padding: 24px;
    }
    h1 { font-size: 30px; color: #15345c; margin-bottom: 20px; }
    .status {
      background: #eef5ff;
      color: #1d3f70;
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    .card {
      background: #f8fbff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 18px;
    }
    .list-item {
      background: white;
      border: 1px solid #d8e4f5;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: .18s;
    }
    .list-item:hover { border-color: #2563eb; background: #f8fbff; }
    .list-title { font-size: 17px; line-height: 1.8; color: #183250; }
    .list-sub { margin-top: 8px; color: #64748b; font-size: 14px; }
    .sentence-box {
      background: white;
      border-left: 5px solid #2563eb;
      border-radius: 14px;
      padding: 16px;
      line-height: 2;
      font-size: 19px;
      color: #0f2744;
    }
    .token { display: inline-block; padding: 3px 7px; border-radius: 7px; transition: .15s; user-select: none; }
    .word { cursor: pointer; }
    .word:hover { background: #e8f0ff; }
    .selected { background: #ffd966; border-bottom: 3px solid #d97706; }
    .correct { background: #b7f7d4; border-bottom: 3px solid #059669; }
    .wrong { background: #ffd9d9; }
    .task-title { margin-bottom: 16px; font-size: 19px; font-weight: 700; color: #173860; }
    .feedback { min-height: 28px; margin-top: 14px; font-weight: 700; }
    .controls { margin-top: 18px; display: flex; gap: 12px; flex-wrap: wrap; }
    button {
      border: none;
      border-radius: 999px;
      padding: 11px 20px;
      background: #1f3f72;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: .18s;
    }
    button:hover { background: #15315a; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      border: 1px solid #cfdaeb;
      border-radius: 16px;
      padding: 14px;
      margin-top: 8px;
      font-size: 16px;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #2563eb; }
    .result {
      background: #f6fffb;
      border: 1px solid #d1fae5;
      border-radius: 16px;
      padding: 16px;
      margin-top: 18px;
    }
    .score { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
    .loading {
      width: 16px;
      height: 16px;
      display: inline-block;
      border: 2px solid #ccc;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .hidden { display: none; }
    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e5edf8;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }
    .progress-fill { height: 100%; background: #2563eb; }
    .info-row { display: flex; justify-content: space-between; margin-top: 10px; color: #64748b; }
    .trans-item { margin-bottom: 20px; }
    .trans-item label { font-weight: 600; display: block; margin-bottom: 4px; }
    .snippet { background: #e8f0fe; padding: 4px 16px; border-radius: 999px; cursor: pointer; font-size: 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media(max-width:640px) {
      body { padding: 10px; }
      .app { border-radius: 20px; padding: 18px; }
      h1 { font-size: 24px; }
      .sentence-box { font-size: 17px; }
    }
  </style>
  <script src="https://unpkg.com/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://unpkg.com/@tensorflow-models/universal-sentence-encoder@1.3.3/dist/universal-sentence-encoder.min.js"></script>
</head>
<body>
<div class="app">
  <h1>📘 英语句子结构划分与翻译 · 智能评分</h1>
  <div class="status" id="modelStatus">正在初始化...</div>
  <div id="mainView"></div>
</div>

<script>
  // ==================== 全局变量 ====================
  let questions = [];
  let encoderModel = null;
  let modelReady = false;
  let currentIndex = -1;
  let currentTaskIndex = 0;
  let selectedTokens = [];
  let divideResults = [];          // 每个成分是否划分正确
  let divideWrongCounts = [];      // 每个成分的错误次数
  let partsUserInput = [];         // 成分翻译的用户输入
  let fullUserInput = '';          // 整句翻译的用户输入
  let currentPhase = 'divide';     // 'divide' | 'parts' | 'full'

  // ==================== AI 模型加载 ====================
  async function loadAIModel() {
    const status = document.getElementById('modelStatus');
    status.innerHTML = '<span class="loading"></span> 正在加载AI智能评分模型...';
    try {
      const timeoutPromise = new Promise((_, reject) => {
        setTimeout(() => { reject(new Error('模型加载超时')); }, 15000);
      });
      encoderModel = await Promise.race([use.load(), timeoutPromise]);
      await encoderModel.embed(['测试']);
      modelReady = true;
      status.innerHTML = '✅ AI智能评分模型已就绪';
    } catch (err) {
      console.error(err);
      modelReady = false;
      status.innerHTML = '⚠️ AI评分不可用，已自动切换基础评分模式';
    }
  }

  // ==================== 数据加载 ====================
  async function loadQuestions() {
    try {
      const response = await fetch('./questions.json');
      if (!response.ok) throw new Error('题库加载失败');
      questions = await response.json();
      renderQuestionList();
    } catch (err) {
      document.getElementById('mainView').innerHTML = `<div class="card"><div style="color:red;font-weight:700;">❌ questions.json 加载失败</div></div>`;
    }
  }

  // ==================== tokenizer ====================
  function tokenize(sentence) {
    const regex = /([A-Za-z]+(?:[-'][A-Za-z]+)*|\d+|[.,!?;:()—-])|(\s+)/g;
    const tokens = [];
    let match;
    while ((match = regex.exec(sentence)) !== null) {
      if (match[1]) {
        tokens.push({ text: match[1], isWord: true, index: tokens.length });
      } else if (match[2]) {
        tokens.push({ text: match[2], isWord: false, index: tokens.length });
      }
    }
    return tokens;
  }

  // ==================== 工具函数 ====================
  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function arraysEqual(a, b) {
    return JSON.stringify(a) === JSON.stringify(b);
  }

  function bigrams(str) {
    const arr = [];
    for (let i = 0; i < str.length - 1; i++) arr.push(str.slice(i, i + 2));
    return arr;
  }

  function diceSimilarity(a, b) {
    a = a.replace(/\s+/g, '');
    b = b.replace(/\s+/g, '');
    if (!a || !b) return 0;
    const pa = bigrams(a), pb = bigrams(b);
    let hit = 0;
    pa.forEach(x => { if (pb.includes(x)) hit++; });
    return (2 * hit) / (pa.length + pb.length);
  }

  async function semanticSimilarity(a, b) {
    if (!modelReady || !encoderModel) return -1;
    try {
      const embeddings = await encoderModel.embed([a, b]);
      const arr = await embeddings.array();
      const x = arr[0], y = arr[1];
      let dot = 0, nx = 0, ny = 0;
      for (let i = 0; i < x.length; i++) {
        dot += x[i] * y[i];
        nx += x[i] * x[i];
        ny += y[i] * y[i];
      }
      return dot / (Math.sqrt(nx) * Math.sqrt(ny));
    } catch (err) {
      return -1;
    }
  }

  // ==================== 题库列表 ====================
  function renderQuestionList() {
    let html = '';
    questions.forEach((q, i) => {
      html += `<div class="list-item" onclick="startQuestion(${i})">
        <div class="list-title">${escapeHtml(q.sentence)}</div>
        <div class="list-sub">共 ${q.tasks.length} 个结构成分</div>
      </div>`;
    });
    document.getElementById('mainView').innerHTML = html;
  }

  // ==================== 开始练习 ====================
  function startQuestion(index) {
    currentIndex = index;
    currentTaskIndex = 0;
    selectedTokens = [];
    divideResults = new Array(questions[index].tasks.length).fill(false);
    divideWrongCounts = new Array(questions[index].tasks.length).fill(0);
    partsUserInput = new Array(questions[index].tasks.length).fill('');
    fullUserInput = '';
    currentPhase = 'divide';
    renderDivide();
  }

  // ==================== 渲染划分题 ====================
  function renderDivide() {
    const q = questions[currentIndex];
    const task = q.tasks[currentTaskIndex];
    const tokens = tokenize(q.sentence);
    const wrongCount = divideWrongCounts[currentTaskIndex];
    const remaining = Math.max(0, 3 - wrongCount);

    let html = `<div class="card">
      <div class="task-title">第 ${currentTaskIndex+1} 题：请选择【${task.title}】</div>
      <div class="info-row"><span>剩余机会：${remaining} / 3</span></div>
      <div class="sentence-box">`;

    tokens.forEach((tok, idx) => {
      if (tok.isWord) {
        html += `<span class="token word ${selectedTokens.includes(idx) ? 'selected' : ''}" onclick="toggleToken(${idx})">${escapeHtml(tok.text)}</span>`;
      } else {
        html += `<span>${escapeHtml(tok.text)}</span>`;
      }
    });

    html += `</div>
      <div class="info-row"><span>进度：${currentTaskIndex+1}/${q.tasks.length}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${((currentTaskIndex+1)/q.tasks.length)*100}%"></div></div>
      <div class="controls">
        <button onclick="submitDivide()">提交答案</button>
        <button onclick="renderQuestionList()">返回题库</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>`;

    document.getElementById('mainView').innerHTML = html;
  }

  window.toggleToken = function(idx) {
    const pos = selectedTokens.indexOf(idx);
    if (pos >= 0) selectedTokens.splice(pos, 1);
    else selectedTokens.push(idx);
    renderDivide();
  };

  // ==================== 提交划分 ====================
  window.submitDivide = function() {
    const q = questions[currentIndex];
    const task = q.tasks[currentTaskIndex];
    const correct = [...task.indices].sort((a,b)=>a-b);
    const user = [...selectedTokens].sort((a,b)=>a-b);
    const ok = arraysEqual(correct, user);
    const fb = document.getElementById('feedback');

    if (ok) {
      divideResults[currentTaskIndex] = true;
      fb.innerHTML = '✅ 正确';
      setTimeout(() => {
        currentTaskIndex++;
        selectedTokens = [];
        if (currentTaskIndex >= q.tasks.length) {
          currentPhase = 'parts';
          renderParts();
        } else {
          renderDivide();
        }
      }, 800);
    } else {
      divideWrongCounts[currentTaskIndex]++;
      const left = 3 - divideWrongCounts[currentTaskIndex];
      if (left <= 0) {
        divideResults[currentTaskIndex] = false;
        fb.innerHTML = '❌ 机会用完，正确答案已标绿，自动进入下一题';
        setTimeout(() => {
          currentTaskIndex++;
          selectedTokens = [];
          if (currentTaskIndex >= q.tasks.length) {
            currentPhase = 'parts';
            renderParts();
          } else {
            renderDivide();
          }
        }, 1500);
      } else {
        fb.innerHTML = `❌ 错误，剩余 ${left} 次机会`;
        selectedTokens = [];
        renderDivide();
      }
    }
  };

  // ==================== 成分翻译 ====================
  function renderParts() {
    const q = questions[currentIndex];
    let html = `<div class="card">
      <div class="task-title">🔤 请翻译出句子的各个成分</div>
      <div class="sentence-box">${escapeHtml(q.sentence)}</div>`;

    q.tasks.forEach((task, idx) => {
      html += `<div class="trans-item">
        <label>${task.title}</label>
        <textarea id="partInput-${idx}" placeholder="请输入中文翻译">${escapeHtml(partsUserInput[idx]||'')}</textarea>
      </div>`;
    });

    html += `<div class="controls">
        <button onclick="submitParts()">提交成分翻译</button>
        <button onclick="renderQuestionList()">返回题库</button>
      </div>
      <div class="feedback" id="partsFeedback"></div>
    </div>`;

    document.getElementById('mainView').innerHTML = html;
    // 保存输入
    q.tasks.forEach((_, idx) => {
      document.getElementById(`partInput-${idx}`).addEventListener('input', function(e) {
        partsUserInput[idx] = e.target.value;
      });
    });
  }

  window.submitParts = async function() {
    const q = questions[currentIndex];
    const total = q.tasks.length;
    let correctCount = 0;
    const details = [];

    for (let i = 0; i < total; i++) {
      const user = partsUserInput[i] || '';
      const std = q.tasks[i].translation || '';
      if (!std) continue;
      const dice = diceSimilarity(user, std);
      let aiOk = false;
      if (dice < 0.6 && modelReady) {
        const semScore = await semanticSimilarity(user, std);
        aiOk = semScore > 0.7;
      }
      const ok = (dice > 0.6) || aiOk;
      if (ok) correctCount++;
      details.push(ok);
    }

    document.getElementById('partsFeedback').innerHTML = `成分翻译正确：${correctCount}/${total}`;
    // 存储细节
    window._partsDetail = details;
    window._partsCorrect = correctCount;

    setTimeout(() => {
      currentPhase = 'full';
      renderFull();
    }, 1200);
  };

  // ==================== 整句翻译 ====================
  function renderFull() {
    const q = questions[currentIndex];
    let html = `<div class="card">
      <div class="task-title">📝 请按照公式将句子翻译出来</div>
      <div>点击下方你输入的成分译文片段可填入输入框</div>
      <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;">`;

    partsUserInput.forEach((text, i) => {
      if (text.trim()) {
        html += `<span class="snippet" onclick="appendSnippet('${escapeHtml(text).replace(/'/g, "&#39;")}')">${escapeHtml(text)}</span>`;
      }
    });

    html += `</div>
      <textarea id="fullTranslationInput" placeholder="请输入整句中文翻译">${escapeHtml(fullUserInput)}</textarea>
      <div class="controls">
        <button onclick="submitFull()">提交整句翻译</button>
        <button onclick="renderQuestionList()">返回题库</button>
      </div>
      <div class="feedback" id="fullFeedback"></div>
    </div>`;

    document.getElementById('mainView').innerHTML = html;
    document.getElementById('fullTranslationInput').addEventListener('input', function(e) {
      fullUserInput = e.target.value;
    });
  }

  window.appendSnippet = function(text) {
    const ta = document.getElementById('fullTranslationInput');
    ta.value = ta.value ? ta.value + text : text;
    fullUserInput = ta.value;
  };

  window.submitFull = async function() {
    const q = questions[currentIndex];
    const input = fullUserInput.trim();
    const fb = document.getElementById('fullFeedback');

    if (!input) {
      fb.innerHTML = '请输入翻译';
      return;
    }

    fb.innerHTML = '<span class="loading"></span> 正在综合评分...';

    const standard = q.fullTranslation;
    let aiScore = -1;
    if (modelReady) {
      aiScore = await semanticSimilarity(input, standard);
    }
    const baseScore = diceSimilarity(input, standard);

    let totalScore;
    if (aiScore >= 0) {
      totalScore = Math.round(aiScore * 0.75 * 100 + baseScore * 0.25 * 100);
    } else {
      totalScore = Math.round(baseScore * 100);
    }

    const divideCorrect = divideResults.filter(Boolean).length;
    const partsCorrect = window._partsCorrect || 0;
    const partsTotal = (window._partsDetail && window._partsDetail.length) || q.tasks.length;

    let level = '';
    if (totalScore >= 90) level = '🌟 非常优秀';
    else if (totalScore >= 75) level = '✅ 良好';
    else if (totalScore >= 60) level = '⚠️ 基本正确';
    else level = '❌ 需改进';

    fb.innerHTML = `
      <div class="result">
        <div class="score">整句翻译综合得分：${totalScore}%</div>
        <div>${level}</div>
        <div style="margin-top:16px;">📘 结构划分正确：${divideCorrect}/${q.tasks.length}</div>
        <div>🔤 成分翻译正确：${partsCorrect}/${partsTotal}</div>
        ${aiScore >= 0 ? `<div style="margin-top:10px;">🧠 AI语义匹配：${Math.round(aiScore*100)}%</div>` : '<div style="margin-top:10px;color:#64748b;">当前使用基础评分模式</div>'}
        <div style="margin-top:18px;"><strong>标准答案：</strong></div>
        <div>${escapeHtml(standard)}</div>
        <div class="controls" style="margin-top:18px;">
          <button onclick="renderQuestionList()">返回题库</button>
          <button onclick="startQuestion(${currentIndex})">重新练习</button>
        </div>
      </div>`;
  };

  // ==================== 初始化 ====================
  async function init() {
    await loadQuestions();
    loadAIModel();
  }

  init();
</script>
</body>
</html>
