<style>

}

    padding:10px;
  }

  .app{
    border-radius:20px;

</style>

<!-- TensorFlow -->
<script src="https://unpkg.com/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

<!-- Universal Sentence Encoder -->
<script src="https://unpkg.com/@tensorflow-models/universal-sentence-encoder@1.3.3/dist/universal-sentence-encoder.min.js"></script>

</head>
<body>

<div class="app">

<h1>📘 英语句子结构划分与 AI 智能评分</h1>

<div class="status" id="modelStatus">
正在初始化...
</div>

<div id="mainView"></div>

</div>

<script>

////////////////////////////////////////////////////////
// 全局变量
////////////////////////////////////////////////////////

let questions = [];

let encoderModel = null;

let modelReady = false;

let currentIndex = -1;

const appState = {

  currentQuestion: 0,

  currentTaskIndex: 0,

  currentPhase: 'divide',

  divideResults: [],

  translationResults: [],

  fullTranslationResult: null,

  selectedTokens: [],

  score: {
    structure: 0,
    translation: 0,
    semantic: 0,
    final: 0
  }
}

let divideResults = [];

////////////////////////////////////////////////////////
// AI模型加载（彻底修复版）
////////////////////////////////////////////////////////

async function loadAIModel(){

  const status = document.getElementById('modelStatus');

  status.innerHTML =
    '<span class="loading"></span> 正在加载AI智能评分模型...';

  try{

    const timeoutPromise = new Promise((_, reject)=>{

      setTimeout(()=>{

        reject(new Error('模型加载超时'));

      }, 15000);

    });

    encoderModel = await Promise.race([
      use.load(),
      timeoutPromise
    ]);

    await encoderModel.embed(['测试']);

    modelReady = true;

    status.innerHTML =
      '✅ AI智能评分模型已就绪';

  }catch(err){

    console.error(err);

    modelReady = false;

    status.innerHTML =
      '⚠️ AI评分不可用，已自动切换基础评分模式';

  }

}

////////////////////////////////////////////////////////
// 数据加载
////////////////////////////////////////////////////////

async function loadQuestions(){

  try{

    const response =
      await fetch('./questions.json');

    if(!response.ok){
      throw new Error('题库加载失败');
    }

    questions = await response.json();

    renderQuestionList();

  }catch(err){

    console.error(err);

    document.getElementById('mainView').innerHTML = `
      <div class="card">
        <div style="color:red;font-weight:700;">
          ❌ questions.json 加载失败
        </div>
      </div>
    `;

  }

}

////////////////////////////////////////////////////////
// tokenizer（彻底修复版）
////////////////////////////////////////////////////////

function tokenize(sentence){

  const regex =
    /([A-Za-z]+(?:[-'][A-Za-z]+)*|\d+|[.,!?;:()—-])|(\s+)/g;

  const tokens = [];

  let match;

  while((match = regex.exec(sentence)) !== null){

    if(match[1]){

      tokens.push({
        text:match[1],
        isWord:true,
        index:tokens.length
      });

    }else if(match[2]){

      tokens.push({
        text:match[2],
        isWord:false,
        index:tokens.length
      });

    }

  }

  return tokens;

}

////////////////////////////////////////////////////////
// 工具函数
////////////////////////////////////////////////////////

function escapeHtml(str){

  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');

}

function arraysEqual(a,b){

  return JSON.stringify(a) === JSON.stringify(b);

}

function bigrams(str){

  const arr = [];

  for(let i=0;i<str.length-1;i++){
    arr.push(str.slice(i,i+2));
  }

  return arr;

}

function diceSimilarity(a,b){

  a = a.replace(/\s+/g,'');
  b = b.replace(/\s+/g,'');

  if(!a || !b) return 0;

  const pa = bigrams(a);
  const pb = bigrams(b);

  let hit = 0;

  pa.forEach(x=>{
    if(pb.includes(x)) hit++;
  });

  return (2 * hit) / (pa.length + pb.length);

}

async function semanticSimilarity(a,b){

  if(!modelReady || !encoderModel){
    return -1;
  }

  try{

    const embeddings =
      await encoderModel.embed([a,b]);

    const arr = await embeddings.array();

    const x = arr[0];
    const y = arr[1];

    let dot = 0;
    let nx = 0;
    let ny = 0;

    for(let i=0;i<x.length;i++){

      dot += x[i] * y[i];

      nx += x[i] * x[i];

      ny += y[i] * y[i];

    }

    return dot / (Math.sqrt(nx) * Math.sqrt(ny));

  }catch(err){

    console.error(err);

    return -1;

  }

}

////////////////////////////////////////////////////////
// 题库列表
////////////////////////////////////////////////////////

function renderQuestionList(){

  let html = '';

  questions.forEach((q,i)=>{

    html += `
      <div class="list-item"
           onclick="startQuestion(${i})">

        <div class="list-title">
          ${escapeHtml(q.sentence)}
        </div>

        <div class="list-sub">
          共 ${q.tasks.length} 个结构成分
        </div>

      </div>
    `;

  });

  document.getElementById('mainView').innerHTML = html;

}

////////////////////////////////////////////////////////
// 开始练习
////////////////////////////////////////////////////////

function startQuestion(index){

  currentIndex = index;

  currentTaskIndex = 0;

  selectedTokens = [];

  divideResults = [];

  renderTask();

}

////////////////////////////////////////////////////////
// 渲染结构划分
////////////////////////////////////////////////////////

function renderTask(){

  const q = questions[currentIndex];

  const task = q.tasks[currentTaskIndex];

  const tokens = tokenize(q.sentence);

  let html = `

    <div class="card">

      <div class="task-title">
        第 ${currentTaskIndex+1} 题：请选择【${task.title}】
      </div>

      <div class="sentence-box">
  `;

  tokens.forEach((token,index)=>{

    if(token.isWord){

      html += `
        <span
          class="token word ${selectedTokens.includes(index)?'selected':''}"
          onclick="toggleToken(${index})">

          ${escapeHtml(token.text)}

        </span>
      `;

    }else{

      html += `<span>${escapeHtml(token.text)}</span>`;

    }

  });

  html += `
      </div>

      <div class="info-row">
        <span>进度：${currentTaskIndex+1}/${q.tasks.length}</span>
      </div>

      <div class="progress-bar">
        <div class="progress-fill"
             style="width:${((currentTaskIndex+1)/q.tasks.length)*100}%">
        </div>
      </div>

      <div class="controls">

        <button onclick="submitDivide()">
          提交答案
        </button>

        <button onclick="renderQuestionList()">
          返回题库
        </button>

      </div>

      <div class="feedback" id="feedback"></div>

    </div>
  `;

  document.getElementById('mainView').innerHTML = html;

}

////////////////////////////////////////////////////////
// 选择token
////////////////////////////////////////////////////////

function toggleToken(index){

  const pos = selectedTokens.indexOf(index);

  if(pos >= 0){

    selectedTokens.splice(pos,1);

  }else{

    selectedTokens.push(index);

  }

  renderTask();

}

////////////////////////////////////////////////////////
// 提交结构划分
////////////////////////////////////////////////////////

function submitDivide(){

  const q = questions[currentIndex];

  const task = q.tasks[currentTaskIndex];

  const correct = [...task.indices].sort((a,b)=>a-b);

  const user = [...selectedTokens].sort((a,b)=>a-b);

  const ok = arraysEqual(correct,user);

  const tokens = tokenize(q.sentence);

  const correctText = correct
    .map(i=>tokens[i].text)
    .join(' ');

  appState.divideResults.push({
    title: task.title,
    correct: ok,
    correctText
  });

  if(ok){

    renderPartTranslation();

  }else{

    const feedback =
      document.getElementById('feedback');

    feedback.innerHTML = `
      ❌ 错误<br><br>
      正确答案：${correctText}
    `;

  }
}


////////////////////////////////////////////////////////
// 成份翻译页面
////////////////////////////////////////////////////////
  function renderPartTranslation(){

  const q = questions[currentIndex];

  const task = q.tasks[currentTaskIndex];

  const html = `

    <div class="card">

      <div class="task-title">
        请翻译该成分
      </div>

      <div class="sentence-box">
        ${task.title}
      </div>

      <textarea
        id="partTranslationInput"
        placeholder="请输入该成分翻译">
      </textarea>

      <div class="controls">

        <button onclick="submitPartTranslation()">
          提交翻译
        </button>

      </div>

      <div id="partTranslationFeedback"
           class="feedback"></div>

    </div>
  `;

  document.getElementById('mainView').innerHTML = html;
}

  ////////////////////////////////////////////////////////
// 成份翻译评分
////////////////////////////////////////////////////////

  async function submitPartTranslation(){

  const q = questions[currentIndex];

  const task = q.tasks[currentTaskIndex];

  const input =
    document.getElementById('partTranslationInput')
      .value
      .trim();

  const standard = task.translation;

  let score = 0;

  const semantic =
    await semanticSimilarity(input, standard);

  if(semantic >= 0){

    score = Math.round(semantic * 100);

  }else{

    score = Math.round(
      diceSimilarity(input, standard) * 100
    );

  }

  appState.translationResults.push({
    title: task.title,
    user: input,
    correct: standard,
    score
  });

  currentTaskIndex++;

  if(currentTaskIndex >= q.tasks.length){

    renderFullTranslation();

  }else{

    renderTask();

  }
}



  function renderFinalResult(){

  const q = questions[currentIndex];

  let html = `

    <div class="card">

      <div class="task-title">
        📊 详细结果反馈
      </div>
  `;

  ///////////////////////////////////////////////////////
  // 结构结果
  ///////////////////////////////////////////////////////

  html += `
    <div style="margin-top:20px;">
      <strong>结构划分结果：</strong>
    </div>
  `;

  appState.divideResults.forEach(item=>{

    html += `
      <div class="result">

        <div>
          ${item.title}
        </div>

        <div style="margin-top:8px;">
          ${item.correct ? '✅ 正确' : '❌ 错误'}
        </div>

        ${!item.correct ? `

        <div style="margin-top:8px;">
          正确答案：
          ${item.correctText}
        </div>

        ` : ''}

      </div>
    `;

  });

  ///////////////////////////////////////////////////////
  // 成分翻译结果
  ///////////////////////////////////////////////////////

  html += `
    <div style="margin-top:24px;">
      <strong>成分翻译结果：</strong>
    </div>
  `;

  appState.translationResults.forEach(item=>{

    html += `
      <div class="result">

        <div>
          ${item.title}
        </div>

        <div style="margin-top:8px;">
          你的答案：${item.user}
        </div>

        <div style="margin-top:8px;">
          标准答案：${item.correct}
        </div>

        <div style="margin-top:8px;">
          得分：${item.score}%
        </div>

      </div>
    `;

  });

  ///////////////////////////////////////////////////////
  // 整句翻译
  ///////////////////////////////////////////////////////

  html += `

    <div style="margin-top:24px;">
      <strong>整句翻译：</strong>
    </div>

    <div class="result">

      <div>
        你的答案：
      </div>

      <div style="margin-top:8px;">
        ${appState.fullTranslationResult.user}
      </div>

      <div style="margin-top:14px;">
        标准答案：
      </div>

      <div style="margin-top:8px;">
        ${q.fullTranslation}
      </div>

      <div style="margin-top:14px;">
        AI语义分：
        ${appState.fullTranslationResult.semantic}%
      </div>

      <div style="margin-top:8px;">
        综合得分：
        ${appState.fullTranslationResult.final}%
      </div>

    </div>
  `;

  ///////////////////////////////////////////////////////
  // AI反馈
  ///////////////////////////////////////////////////////

  html += `

    <div style="margin-top:24px;">
      <strong>AI错误分析：</strong>
    </div>

    <div class="result">
      ${generateFeedback()}
    </div>

  `;

  html += `</div>`;

  document.getElementById('mainView').innerHTML = html;
}

  function generateFeedback(){

  const result = appState.fullTranslationResult;

  let feedback = [];

  if(result.semantic < 60){

    feedback.push('整体语义偏差较大');

  }

  if(result.semantic >= 60 && result.semantic < 80){

    feedback.push('整体语义基本正确，但存在细节问题');

  }

  if(result.semantic >= 80){

    feedback.push('整体翻译较准确');

  }

  const wrongParts =
    appState.divideResults.filter(x=>!x.correct);

  if(wrongParts.length > 0){

    feedback.push(
      `有 ${wrongParts.length} 个结构划分错误`
    );

  }

  return feedback.join('；');
}

////////////////////////////////////////////////////////
// 翻译页面
////////////////////////////////////////////////////////

function renderTranslation(){

  const q = questions[currentIndex];

  const html = `

    <div class="card">

      <div class="task-title">
        📝 请翻译整句话
      </div>

      <div class="sentence-box">
        ${escapeHtml(q.sentence)}
      </div>

      <textarea
        id="translationInput"
        placeholder="请输入中文翻译">
      </textarea>

      <div class="controls">

        <button onclick="submitTranslation()">
          智能评分
        </button>

        <button onclick="renderQuestionList()">
          返回题库
        </button>

      </div>

      <div class="feedback" id="translationFeedback"></div>

    </div>
  `;

  document.getElementById('mainView').innerHTML = html;

}

////////////////////////////////////////////////////////
// 提交翻译
////////////////////////////////////////////////////////

async function submitTranslation(){

  const q = questions[currentIndex];

  const input =
    document.getElementById('translationInput')
      .value
      .trim();

  const semantic =
    await semanticSimilarity(
      input,
      q.fullTranslation
    );

  const structureScore =
    appState.divideResults.filter(x=>x.correct)
      .length
    /
    q.tasks.length;

  const semanticScore =
    semantic >= 0
      ? semantic
      : diceSimilarity(input, q.fullTranslation);

  const finalScore = Math.round(
    structureScore * 30
    + semanticScore * 70
  );

  appState.fullTranslationResult = {
    user: input,
    semantic: Math.round(semanticScore * 100),
    final: finalScore
  };

  renderFinalResult();
}
////////////////////////////////////////////////////////
// 初始化
////////////////////////////////////////////////////////

async function init(){

  await loadQuestions();

  loadAIModel();

}

init();

</script>
